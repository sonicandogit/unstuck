  {id:"r57",familia:"Géneros y restricciones formales",titulo:"La cadena",goal:450,mode:"rio",desc:`Cada párrafo empieza con la última palabra del anterior.`,teoria:`Las restricciones formales tienen una paradoja en su centro: al limitar las opciones del escritor, a menudo liberan la escritura. Cuando no puedes elegir libremente la primera palabra de un párrafo porque está determinada por la última del anterior, tu mente busca conexiones que no habría encontrado sin esa presión.

Este principio viene de la poética medieval del encadenamiento y tiene versiones en casi todas las tradiciones poéticas del mundo. Aplicado a la prosa produce efectos específicos: la repetición de una palabra en dos contextos distintos revela sus significados latentes.

La cadena impone una dirección al texto que no controla completamente el escritor: el texto va hacia donde van las palabras que se repiten. Esta pérdida parcial de control es productiva: obliga al escritor a seguir al texto en lugar de dirigirlo.

**Fragmento de referencia:**
*La lluvia cayó sobre el tejado. El tejado era viejo y dejaba pasar el agua. El agua formó un charco en el suelo. El suelo de madera absorbió todo lo que pudo. Todo lo que pudo fue poco.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Raymond Queneau — *Ejercicios de estilo*
- Georges Perec y el OULIPO — varios textos
- Julio Cortázar — *62: modelo para armar*
- Anne Carson — *Autobiography of Red*
- Harry Mathews — *The Solitary Twin*`},
  {id:"r58",familia:"Géneros y restricciones formales",titulo:"La historia en seis palabras (expandida)",goal:500,mode:"normal",desc:`Escribe la historia en seis palabras. Luego escribe todo lo que contiene.`,teoria:`La historia atribuida a Hemingway —'En venta: zapatos de bebé, sin usar'— es el ejemplo más célebre de narrativa de máxima compresión. Seis palabras que contienen una pérdida, una economía desesperada, una historia de la que no sabemos nada y sabemos todo. La fuerza del fragmento viene de lo que no dice.

Este reto tiene dos partes igualmente importantes. La primera es encontrar las seis palabras correctas: la historia mínima que contenga un universo. La brevedad extrema es paradójicamente uno de los ejercicios más difíciles.

La segunda parte es la expansión: tomar esa semilla y escribir todo lo que contiene. Esta expansión no es simplemente una explicación de las seis palabras: es el despliegue de toda la historia que implican. Los personajes que hay detrás. El tiempo que precede al momento. Lo que ocurrirá después.

**Fragmento de referencia:**
*'Mamá todavía busca su abrigo rojo.' (historia en seis palabras) → [la expansión: ¿quién es esa mamá? ¿qué significa el abrigo? ¿por qué lo busca todavía?]*

**Libros y autores recomendados:**
- Ernest Hemingway — *En nuestro tiempo*
- Raymond Carver — *Catedral*
- Grace Paley — *Los pequeños disturbios del hombre*
- Lydia Davis — *Can't and Won't*
- Antología *Flash Fiction* ed. James Thomas`},
  {id:"r59",familia:"Géneros y restricciones formales",titulo:"Sin pronombres",goal:400,mode:"rio",desc:`Todo el texto sin usar yo, él, ella, nosotros. Obliga a construir presencia de otra forma.`,teoria:`Los pronombres son el andamiaje más básico de la narración: sin 'yo', 'él', 'ella', 'nosotros', la frase pierde sus puntos de apoyo más obvios. Esta restricción produce una sensación de inestabilidad que puede ser productiva.

Las estrategias que emergen son diversas: usar el nombre propio repetidamente (con el efecto de alienación que produce), usar el sustantivo genérico ('el hombre', 'la mujer'), reestructurar las frases para evitar la necesidad del pronombre.

Marguerite Yourcenar en *Memorias de Adriano* usó la segunda persona del singular para crear una distancia particular. Pero hay también una tradición de escritura en que la ausencia del pronombre de primera persona crea una impersonalidad que paradójicamente puede ser más íntima que el 'yo' convencional.

**Fragmento de referencia:**
*El escritorio estaba lleno de papeles. La ventana abierta. Una persona que podría llamarse Rosa miraba afuera. El patio estaba vacío a esa hora.*

  {id:"r60",familia:"Géneros y restricciones formales",titulo:"El diario apócrifo",goal:550,mode:"normal",desc:`El diario de un personaje histórico, literario o inventado durante una semana concreta.`,teoria:`El diario apócrifo —el diario imaginado de alguien que no lo escribió— es un género que oscila entre la ficción histórica, la parodia y la exploración psicológica. Cuando imaginamos qué habría escrito Cervantes en sus últimos días, o qué escribía Emma Bovary en su diario íntimo antes de que comenzara la novela de Flaubert, estamos llenando los silencios de la historia con voces que no existieron pero podrían haber existido.

Colm Tóibín en *El maestro* —donde Henry James es el narrador de sus propios años de escritura— explora el diario apócrifo como forma de investigación psicológica.

La tentación de este género es el anacronismo: darle al personaje histórico ideas o vocabulario que no podrían haber tenido en su época. La disciplina es imaginar el mundo desde dentro de ese personaje, con sus categorías conceptuales y su vocabulario históricamente situados.

**Fragmento de referencia:**
*Lunes. Trabajé hasta tarde. La carta de mi editor llegó esta mañana y no he querido abrirla todavía. Por la tarde fui a caminar.*
— Fragmento de trabajo (diario apócrifo de un escritor)

**Libros y autores recomendados:**
- Colm Tóibín — *El maestro*
- Margaret Atwood — *El cuento de la criada*
- Hilary Mantel — *En la corte del lobo*
- Peter Carey — *Jack Maggs*

  {id:"r61",familia:"Poesía para prosistas",titulo:"La prosa que respira",goal:400,mode:"tunel",desc:`Reescribe un párrafo tuyo como prosa poética: solo ritmo, sin rima.`,teoria:`La distinción entre prosa y poesía es más porosa de lo que los géneros sugieren. La prosa poética —que abandona el verso pero conserva la atención al sonido, a la imagen, a la densidad de sentido que caracteriza el verso— tiene su propia historia desde Baudelaire hasta Lispector.

Para este reto, el punto de partida es tu propia escritura: toma un párrafo de algo que hayas escrito en prosa narrativa convencional y reescríbelo prestando atención exclusivamente al ritmo. Las palabras deben ser elegidas no solo por su sentido sino por su sonido. La longitud de las frases debe responder a un criterio musical.

No se trata de añadir artificios poéticos. Se trata de encontrar el ritmo que ya estaba latente en el texto y dejarlo emerger.

**Fragmento de referencia:**
*Prosa original: 'La lluvia cayó durante toda la noche y él no pudo dormir.'
Reescritura: 'Toda la noche, lluvia. Él abierto en la oscuridad, escuchando.'*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Charles Baudelaire — *Pequeños poemas en prosa*
- Arthur Rimbaud — *Las iluminaciones*
- Octavio Paz — *Águila o sol*
- Clarice Lispector — *La pasión según G.H.*
- Anne Carson — *Autobiografía del rojo*`},
  {id:"r62",familia:"Poesía para prosistas",titulo:"El poema instrucciones",goal:400,mode:"normal",desc:`Cómo hacer algo absurdo con precisión técnica y cadencia lírica.`,teoria:`La colisión entre el registro técnico de las instrucciones y el registro lírico de la poesía produce un efecto cómico y a la vez filosófico: revela el absurdo de intentar codificar en instrucciones lo que no puede ser codificado.

Cortázar exploró esta colisión; Francis Ponge describió objetos cotidianos con una precisión casi científica que producía un efecto de extrañeza poética.

El poema-instrucciones tiene como modelo el manual técnico, pero lo que quiere enseñar es inexplicable por ese medio: cómo olvidar a alguien, cómo entrar en un sueño, cómo no tener miedo. La precisión del lenguaje instruccional aplicada a un objeto imposible de sistematizar revela la brecha entre el lenguaje y la experiencia.

Las instrucciones deben ser sintácticamente correctas —imperativo, numeración, pasos lógicos— pero el contenido debe escaparse de esa lógica en algún punto. El punto donde la instrucción se vuelve imposible de seguir es donde el poema ocurre.

**Fragmento de referencia:**
*Instrucciones para ver por última vez: 1. No anunciarlo. 2. Mirar como si no se mirara. 3. Guardar la imagen sin hacer nada. Sin fotografía. Sin nota. 4. Irse antes de que sea demasiado tarde.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Julio Cortázar — *Cronopios y famas*
- Francis Ponge — *Le Parti pris des choses*
- Pablo Neruda — *Odas elementales*
- Mary Oliver — poemas de observación
- James Tate — poesía del absurdo cotidiano`},
  {id:"r63",familia:"Poesía para prosistas",titulo:"La elegía de lo ordinario",goal:400,mode:"tunel",desc:`Una lista que empieza siendo cotidiana y termina siendo una despedida.`,teoria:`La elegía es el género del lamento por algo o alguien perdido. Pero el objeto del lamento no tiene que ser grandioso. Auden en 'Funeral Blues' convirtió la muerte en lista de pérdidas cotidianas. Mary Oliver en muchos de sus poemas lamenta cosas tan pequeñas como una tarde de verano.

La lista como forma elegíaca tiene una eficacia particular: la acumulación de objetos cotidianos, de hábitos ordinarios, produce un efecto de presencia que la descripción directa de la pérdida a veces no puede lograr.

Para este reto, la transformación es gradual: la lista comienza siendo puramente descriptiva y elemento a elemento va adquiriendo el peso de la despedida. Sin anunciar el cambio. Sin explicar la pérdida.

El último elemento debe ser el que cambia todo lo anterior. Cuando el lector llega al final, los elementos previos se cargan retroactivamente de significado.

**Fragmento de referencia:**
*El despertador de las siete. La taza grande. La cucharilla con el mango doblado. El libro siempre en la mesita. La marca en la pared donde llegaba su mano cuando se levantaba. El olor del café que ya nadie prepara.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- W. H. Auden — *Funeral Blues*
- Mary Oliver — *New and Selected Poems*
- Wisława Szymborska — *Vista con grano de arena*
- Pablo Neruda — *Veinte poemas de amor*
- C. K. Williams — *Repair*`},
  {id:"r64",familia:"Poesía para prosistas",titulo:"El bestiario",goal:400,mode:"normal",desc:`Describe tres animales reales o imaginarios como si fueran emblemas de algo. Sin decir de qué.`,teoria:`El bestiario medieval era un libro de animales con moralejas: cada animal ilustraba una virtud o un vicio, una verdad sobre el mundo humano. La tradición continúa en la modernidad, aunque sin las moralejas explícitas.

Borges escribió un *Manual de zoología fantástica* con una erudición que oscila entre la parodia y el asombro genuino. Cortázar tenía sus propios animales fabulosos. Neruda tenía sus odas a los animales reales.

Para este reto, el bestiario no tiene moraleja explícita: los animales son emblemas de algo, pero ese algo no se nombra. El lector infiere el significado simbólico a partir de la descripción. La descripción debe ser precisa y concreta —el animal como animal antes que como símbolo— pero la selección de qué describir y cómo debe sugerir la dimensión simbólica.

Elige tres animales cuyos comportamientos naturales resuenen con algo de la experiencia humana que quieras explorar. Descríbelos. No expliques la resonancia.

**Fragmento de referencia:**

— Fragmento de trabajo (el cuervo como emblema del rencor, sin nombrarlo)

**Libros y autores recomendados:**
- Jorge Luis Borges — *Manual de zoología fantástica*
- Pablo Neruda — *Odas elementales*
- Julio Cortázar — *Bestiario*
- Ted Hughes — *Crow*
- Seamus Heaney — *Death of a Naturalist*`},

<script>
const trackEvent=(name,p={})=>{if(typeof gtag!=='undefined')gtag('event',name,p);};

const exportZip=async(user,library,reflections,projects)=>{
  if(typeof JSZip==='undefined'){alert('JSZip no disponible');return;}
  const zip=new JSZip();
  const dateStr=new Date().toISOString().slice(0,10);
  zip.file('backup_completo_'+dateStr+'.json',JSON.stringify({
    exportedAt:new Date().toISOString(),
    user:{name:user.name},
    entries:library,reflections,projects,
  },null,2));
  const textos=zip.folder('textos');
  library.forEach(e=>{
    if(!e.plain?.trim())return;
    const name=(e.title||'sin-titulo').replace(/[^a-z0-9áéíóúñ ]/gi,'').trim().slice(0,50)||'texto';
    textos.file((e.date||'sin-fecha')+'_'+name+'.txt',[
      '# '+(e.title||'Sin título'),
      'Fecha: '+(e.date||''),'Palabras: '+(e.word_count||e.wordCount||0),'',e.plain||''
    ].join('
'));
  });
  if(reflections.length){
    const refs=zip.folder('reflexiones');
    reflections.filter(r=>r.notes?.trim()).forEach(r=>{
      refs.file((r.date||'sin-fecha')+'_reflexion.txt',[
        'Sesión: '+(r.session_title||r.sessionTitle||''),
        'Valoración: '+(r.rating||0)+'/10','',r.notes||'',
        r.feedback?'
--- Claude ---
'+r.feedback:''
      ].join('
'));
    });
  }
  const blob=await zip.generateAsync({type:'blob'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='unstuck_backup_'+dateStr+'.zip';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
};
</script>

- Describe solo las sombras del espacio
- Describe solo las cosas que están fuera de sitio
- Describe solo los sonidos que escuchas`},

    {id:'obs2',title:'Lo que escuchas ahora',family:'Observación',
     desc:'Cierra los ojos 30 segundos y escucha. Luego escribe todo lo que has oído, en capas: cerca, lejos, muy lejos.',
     mode:'normal',modeReason:'Modo Normal: libertad total. Puedes corregir y afinar mientras escribes.',min:50,
     teoria:`INSTRUCCIONES DETALLADAS — Lo que escuchas ahora

La mayoría de la prosa es visual. Añadir capas sonoras a tu escritura cambia completamente la experiencia del lector. Este ejercicio entrena el oído narrativo.

CÓMO HACERLO:
1. Pon un temporizador de 30 segundos.
2. Cierra los ojos y escucha. No clasifiques los sonidos mientras los oyes. Solo percibe.
3. Cuando suene el temporizador, escribe todo lo que recuerdas haber escuchado.

Organízalos en capas de distancia:
— Lo que estaba dentro de la habitación (tu propia respiración, el ventilador, el teclado)
— Lo que venía de cerca (pasos en el pasillo, conversación al otro lado de la pared)
— Lo que venía de lejos (tráfico, pájaros, obras)

EJEMPLO:
"Cerca: el zumbido constante del ordenador, casi inaudible pero presente. Mi propia respiración, más rápida de lo que pensaba. Lejos: un motor de moto que pasó y se alejó. Más lejos: algo que podría ser lluvia o podría ser viento entre hojas. No estoy seguro. También, en algún momento, alguien tosió en otro cuarto."

POR QUÉ FUNCIONA:
El sonido ancla las escenas en el tiempo real. Una escena que describe solo lo visual flota. Una escena que también tiene sonido existe en el presente, tiene duración.`},

    {id:'mem1',title:'Un objeto de tu infancia',family:'Memoria',
     desc:'Elige un objeto que recuerdes de cuando eras pequeño. Descríbelo como si lo tuvieras delante: su peso, textura, olor, historia.',
     mode:'normal',modeReason:'Modo Normal: la memoria necesita espacio para desplegarse. Sin restricciones.',min:60,
     teoria:`INSTRUCCIONES DETALLADAS — Un objeto de tu infancia

Los objetos son cápsulas de tiempo. Contienen más información sobre una época que cualquier descripción directa. Proust lo entendió con la magdalena: no es el objeto en sí, es todo lo que activa.

CÓMO HACERLO:
Cierra los ojos y viaja mentalmente a algún espacio de tu infancia: una cocina, un dormitorio, un patio. Espera a que aparezca un objeto. No lo elijas con la cabeza. Deja que llegue solo.

Cuando lo tengas, descríbelo como si lo tuvieras en las manos ahora mismo:
— ¿Cuánto pesa? ¿Es frío o cálido al tacto?
— ¿Qué textura tiene? ¿Es rugoso, liso, quebradizo?
— ¿Tiene olor? ¿A qué?
— ¿Qué estado tenía? ¿Estaba nuevo, viejo, roto, arreglado con celo?
— ¿Dónde estaba siempre? ¿Quién lo usaba?

EJEMPLO:
"Una radio de plástico color crema, con un dial de frecuencia que costaba girar porque estaba pegajoso de años de dedos. Pesaba más de lo que parecía. La rejilla delantera tenía una mancha oscura en la esquina inferior que nunca supe qué era. Sonaba con un ligero silbido de fondo, siempre, incluso cuando el volumen estaba bajo."

POR QUÉ FUNCIONA:
Los detalles sensoriales concretos son los que hacen que el lector vea. No "una radio vieja" sino "una radio con el dial pegajoso de años de dedos".`},

    {id:'cop1',title:'Copia y continúa',family:'Imitación',
     desc:'Abre un libro al azar. Copia la primera frase de la página que abras. Luego continúa tú, manteniendo el ritmo y el tono del autor.',
     mode:'normal',modeReason:'Modo Normal: imitar requiere leer y releer. La libertad de edición ayuda.',min:60,
     teoria:`INSTRUCCIONES DETALLADAS — Copia y continúa

Este es uno de los ejercicios más antiguos para escritores: copiar a los maestros para aprender sus ritmos. No es plagio, es aprendizaje activo. Cuando copias una frase y luego intentas continuarla con el mismo tono, tu mano aprende algo que tu cabeza no puede enseñarse a sí misma.

CÓMO HACERLO:
1. Coge cualquier libro de tu estantería (o abre uno en el móvil). Ábrelo por una página al azar.
2. Lee la primera frase de esa página en voz alta. Una vez. Luego otra.
3. Cópiala literalmente en el editor.
4. Continúa desde donde el autor la dejó. Escribe al menos 5-6 frases más, intentando mantener: la longitud de las frases del autor, su nivel de detalle, si usa mucha o poca adjetivación, el tiempo verbal, el ritmo.

EJEMPLO:
Frase copiada (Carver): "Ella estaba en la cocina cuando él llegó a casa esa tarde."
Continuación propia: "La luz del techo zumbaba igual que siempre. Él dejó las llaves en el mueble del recibidor. En la cocina sonaba algo, una sartén quizás. Pensó que iba a decir algo cuando entrara, pero cuando entró no dijo nada."

POR QUÉ FUNCIONA:
La continuación revela cuánto has absorbido del ritmo del autor. Es un espejo: ves exactamente dónde tu voz se separa de la del maestro. Esa separación es tu punto de partida.`},

  mid:[
    {id:'voz1',title:'Tres registros',family:'Voz',
     desc:'Escribe la misma situación breve (alguien que llega tarde a casa) en tres registros diferentes: formal/burocrático, coloquial, y lírico/poético.',
     mode:'rio',modeReason:'Modo Río: sin borrar. Cada registro fluye de una vez. El objetivo es la diferencia entre ellos.',min:80,
     teoria:`INSTRUCCIONES DETALLADAS — Tres registros

El registro es la relación entre quien habla, a quién habla y en qué contexto. Cambiar el registro de una misma escena es como encender luces de colores distintos sobre el mismo objeto: lo que ves cambia completamente.

CÓMO HACERLO:
La situación es siempre la misma: alguien llega tarde a casa. No importa quién ni por qué. Escríbela tres veces:

REGISTRO 1 — FORMAL/BUROCRÁTICO:
Como si fuera un informe, un acta, una declaración. Sin emociones. Solo hechos y procedimiento.
Ejemplo: "El sujeto accedió al domicilio a las 23:47 horas, con un retraso de 107 minutos respecto al horario habitual. No se emitió comunicación previa. La otra parte se encontraba en el interior."

REGISTRO 2 — COLOQUIAL:
Como se lo contarías a un amigo. Con el vocabulario y el ritmo del habla real.
Ejemplo: "Llegué tardísimo, casi las doce, y mi madre estaba ahí sentada con la tele apagada, que es la señal. Sin decir nada, que es peor que si dijera algo."

REGISTRO 3 — LÍRICO:
Con atención a la imagen, el sonido, la resonancia emocional. Como si importara más cómo suena que lo que dice.
Ejemplo: "La llave entró en la cerradura con el cansancio de todas las noches anteriores. Dentro, el silencio tenía forma: la de alguien que llevaba horas esperando sin querer esperar."

REFLEXIÓN FINAL: ¿Cuál te sale más natural? ¿Cuál te resulta más difícil? ¿Cuál dice más sobre la situación?`},

    {id:'trans1',title:'Cambia el narrador',family:'Narrador',
     desc:'Escribe una escena breve de 3-4 líneas en primera persona. Luego reescríbela dos veces: en segunda persona (tú) y en tercera (él/ella).',
     mode:'tunel',modeReason:'Modo Túnel: cada reescritura es un nuevo intento. El túnel te empuja a avanzar.',min:100,
     teoria:`INSTRUCCIONES DETALLADAS — Cambia el narrador

El punto de vista no es solo una elección técnica. Cambia radicalmente la distancia emocional del lector, la responsabilidad del narrador y lo que es posible contar. Este ejercicio te hace sentir esa diferencia en el cuerpo, no solo entenderla con la cabeza.

CÓMO HACERLO:
Empieza con una escena sencilla y cotidiana: lavarte la cara, esperar un autobús, leer un mensaje en el móvil.

VERSIÓN 1 — PRIMERA PERSONA (yo):
"Me miré en el espejo más tiempo del necesario. Había algo en mi cara que no reconocía, o quizás era todo."

VERSIÓN 2 — SEGUNDA PERSONA (tú):
La segunda persona mete al lector dentro de la acción. Crea una extraña familiaridad, casi incómoda.
"Te miras en el espejo más tiempo del necesario. Hay algo en tu cara que no reconoces, o quizás es todo."

VERSIÓN 3 — TERCERA PERSONA (él/ella):
La tercera persona crea distancia. El personaje se vuelve observable desde fuera.
"Se miró en el espejo más tiempo del necesario. Había algo en su cara que no reconocía, o quizás era todo."

NOTA: La misma frase. Tres experiencias lectoras completamente distintas. ¿Cuál te parece más honesta para esta escena? ¿Cuál te resulta más incómoda? La incomodidad suele señalar algo interesante.`},

    {id:'trans2',title:'Sin adjetivos',family:'Estilo',
     desc:'Escribe un párrafo sobre cualquier cosa. Luego reescríbelo eliminando absolutamente todos los adjetivos. Verás qué queda.',
     mode:'rio',modeReason:'Modo Río: escribe sin borrar. Primero el párrafo libre, luego la versión sin adjetivos.',min:80,
     teoria:`INSTRUCCIONES DETALLADAS — Sin adjetivos

El adjetivo es la muleta más usada en la escritura. "Una tarde oscura y melancólica" es fácil de escribir y difícil de sentir. Eliminar los adjetivos obliga a encontrar el sustantivo exacto o el verbo que ya contenga lo que el adjetivo quería añadir.

CÓMO HACERLO:
Escribe primero un párrafo descriptivo de 5-8 frases sobre cualquier cosa: una persona, un lugar, un momento. Usa los adjetivos con libertad.

Luego reescríbelo eliminando todos y cada uno de los adjetivos. Está prohibido: grande, pequeño, bonito, triste, viejo, nuevo, oscuro, luminoso... cualquier palabra que describa una cualidad.

EJEMPLO CON ADJETIVOS:
"Era una calle estrecha y ruidosa, llena de tiendas pequeñas y sucias. La gente caminaba rápido, con caras cansadas. Un perro viejo dormía en la entrada de un portal oscuro."

MISMO PÁRRAFO SIN ADJETIVOS:
"Era una calle. Las tiendas se apilaban una contra otra. La gente caminaba. Un perro dormía en la entrada de un portal."

¿Notas lo que pasa? El párrafo sin adjetivos suena más seco. Pero también más honesto. Ahora el reto es añadir la vida de vuelta sin usar adjetivos: usa verbos más precisos, sustantivos más específicos, detalles concretos.

"Era una calle donde los toldos de las tiendas se rozaban. La gente caminaba mirando el suelo. Un perro respiraba en la entrada de un portal, sin levantarse cuando alguien pasaba."

¿Ves la diferencia? Los detalles hacen el trabajo que antes hacían los adjetivos.`},

    {id:'emoc1',title:'Una emoción sin nombrarla',family:'Descripción',
     desc:'Elige una emoción (miedo, alivio, vergüenza, euforia). Escribe una escena donde esté presente sin mencionar el nombre de la emoción ni nombrar partes del cuerpo que la expresen.',
     mode:'tunel',modeReason:'Modo Túnel: el foco en el párrafo actual te ayuda a no perderte en explicaciones.',min:100,
     teoria:`INSTRUCCIONES DETALLADAS — Una emoción sin nombrarla

"Estaba asustado" informa al lector. "Las llaves no entraban en la cerradura" hace que el lector sienta el miedo. Esta es la diferencia entre contar y mostrar: la emoción como información versus la emoción como experiencia.

LA REGLA DOBLE:
1. No puedes nombrar la emoción (prohibido: miedo, alivio, vergüenza, alegría, ansiedad...)
2. No puedes usar las expresiones corporales convencionales (prohibido: se le hizo un nudo en el estómago, el corazón le latía fuerte, se le heló la sangre...)

¿QUÉ PUEDES USAR?
— Acciones concretas e involuntarias del personaje
— Lo que el personaje percibe del entorno (y cómo lo percibe)
— Objetos y su relación con ellos
— El tiempo: cómo lo experimenta (lento, rápido, inexistente)

EJEMPLO — MIEDO (sin nombrarlo, sin el cuerpo):
Prohibido: "Tenía miedo. El corazón le latía con fuerza."
Permitido: "Contó los pasos hasta la puerta. Doce. Siempre doce. Las llaves no encontraban el agujero. Las probó todas, en orden, aunque sabía cuál era. Afuera, un coche frenó. Ella no se giró."

EJEMPLO — ALIVIO:
Prohibido: "Sintió un gran alivio."
Permitido: "Se sentó sin elegir la silla. Respiró y el aire le supo a otra cosa. Miró por la ventana sin buscar nada. En la cocina, el grifo goteaba. Lo había escuchado mil veces sin escucharlo."

EL RETO REAL: La especificidad. No "buscó algo que hacer" sino "apiló los platos, los desapiló, los volvió a apilar". Los gestos específicos e involuntarios son los que revelan la emoción sin nombrarla.`},

  high:[
    {id:'dial1',title:'Diálogo sin atribuciones',family:'Diálogos',
     desc:'Escribe una conversación entre dos personas sin usar nunca "dijo", "respondió", "preguntó" ni ningún verbo de habla. El lector debe saber quién habla solo por el tono y el contenido.',
     mode:'tunel',modeReason:'Modo Túnel: cada intervención es su propio momento. El foco te impide sobreexplicar.',min:120,
     teoria:`INSTRUCCIONES DETALLADAS — Diálogo sin atribuciones

Las etiquetas de diálogo ("dijo", "respondió") son una muleta. Cuando las eliminas, la única forma de que el lector sepa quién habla es hacer que las voces sean genuinamente distintas. Este ejercicio te obliga a construir dos personajes desde cero.

LA REGLA:
No puedes usar ningún verbo de habla ni ningun sinónimo. Prohibido: dijo, respondió, preguntó, exclamó, murmuró, contestó, explicó, añadió...

CÓMO HACER QUE LAS VOCES SEAN DISTINGUIBLES:
— Longitud de frases: una voz usa frases cortas, la otra largas
— Vocabulario: una usa lenguaje formal, la otra coloquial
— Lo que preguntan vs. lo que afirman: una pregunta, la otra nunca pregunta
— Temas: una habla de hechos, la otra de sentimientos
— Silencios: una deja espacio, la otra lo llena

EJEMPLO CORRECTO:
"—¿Cuándo vuelves?
—No lo sé todavía. Depende de varias cosas.
—¿De qué cosas?
—Del trabajo, sobre todo. Y de cómo estén las cosas aquí cuando termine.
—¿Y cómo crees que van a estar las cosas aquí?
—No lo sé.
—Eso es lo que dices siempre.
—Sí."

¿Puedes distinguir quién es quién sin etiquetas? Una voz hace preguntas directas y breves. La otra da respuestas largas que esquivan. El desequilibrio entre ambas ya dice algo sobre la relación.

EMPIEZA IN MEDIAS RES: No expliques quiénes son ni dónde están. Lánzate directamente a la conversación. El contexto se infiere.`},

    {id:'narr1',title:'Narrador no humano',family:'Narrador',
     desc:'Escribe desde el punto de vista de un objeto o animal. Sin revelar que eres ese narrador. Sin pensamientos humanos. Solo percepciones.',
     mode:'presion',modeReason:'Modo Presión: la urgencia te impide sobrepensar. Los narradores no humanos salen mejor cuando no los controlas demasiado.',min:150,
     teoria:`INSTRUCCIONES DETALLADAS — Narrador no humano

El reto de este ejercicio es genuino: ¿puedes imaginar una percepción del mundo radicalmente diferente a la tuya? No se trata de humanizar al objeto o al animal (el perro que "piensa en la injusticia de su situación"). Se trata de construir una percepción coherente con lo que ese ser puede percibir realmente.

DOS ESTRATEGIAS:

ESTRATEGIA 1 — EL OBJETO:
Un objeto no siente, no piensa, pero registra. Lleva historia. Ha cambiado de manos. Ha estado en momentos que las personas no recuerdan que él presenció.
Elige un objeto: una silla, una llave, un cuaderno, un abrigo. Escribe lo que "sabe": los pesos distintos que lo han usado, los cambios de luz que ha visto, lo que ha escuchado.
Ejemplo: "Fui afinado por última vez hace cuatro años. Antes de eso, cada semana. Ahora solo me tocan para quitar el polvo."

ESTRATEGIA 2 — EL ANIMAL:
Un animal percibe de forma distinta: el olfato como fuente de información narrativa, el movimiento como amenaza o invitación, el tiempo sin pasado ni futuro abstractos.
Ejemplo: "El olor de antes todavía estaba en el sofá pero era más débil. El olor nuevo era agrio. La puerta se había abierto dos veces desde que amaneció."

LO PROHIBIDO:
— Pensamientos humanos: "sabía que algo iba mal", "recordó tiempos mejores"
— Emociones humanas nombradas: "sentía soledad"
— Juicios morales

SIN REVELAR QUÉ ERES: El lector debe inferirlo por las percepciones, no porque tú lo declares.`},

    {id:'narr2',title:'Segunda persona, presente',family:'Narrador',
     desc:'Escribe en segunda persona del singular (tú) y en presente. Una escena cotidiana pero intensa. Sin explicar nada. Solo lo que ocurre ahora.',
     mode:'rio',modeReason:'Modo Río: la segunda persona en presente necesita impulso. Sin correcciones: fluye.',min:100,
     teoria:`INSTRUCCIONES DETALLADAS — Segunda persona, presente

La segunda persona del singular (tú) crea una extraña proximidad. El lector no puede ignorar lo que ocurre porque está escrito para él. El presente añade urgencia: esto no pasó, está pasando ahora, mientras lees.

EFECTOS DE ESTE PUNTO DE VISTA:
— Implicación forzada del lector
— Sensación de instrucciones o de destino
— Extrañeza: el "tú" puede ser el lector, puede ser el autor, puede ser un personaje

CÓMO USARLO:
Elige una situación cotidiana pero con carga emocional: esperar noticias, entrar a una habitación donde pasó algo, hacer algo por última vez sin saberlo.

EJEMPLO:
"Pones la cafetera. Escuchas el sonido que hace cuando el agua llega arriba. Sabes que tienes diez minutos antes de que tengas que decidir algo. Abres la ventana aunque no hace calor. En la calle, alguien llama a alguien por su nombre. No es el tuyo. Igual te giras."

CLAVES:
— No expliques lo que siente el "tú". Solo lo que hace y lo que percibe.
— El presente continuo crea tensión: todo está ocurriendo ahora mismo.
— Deja espacio en blanco: no todo tiene que estar explicado. Lo que falta es parte del texto.

VARIANTE: Escribe una escena que conoces de tu vida pero en segunda persona. Observa cómo cambia la distancia emocional.`},

    {id:'rest1',title:'Historia en seis palabras y expansión',family:'Restricción',
     desc:'Empieza escribiendo una historia en exactamente seis palabras. Luego úsala como primera línea y expándela hasta donde llegues.',
     mode:'presion',modeReason:'Modo Presión: la restricción del formato pide urgencia. Escribe sin frenarte.',min:120,
     teoria:`INSTRUCCIONES DETALLADAS — Historia en seis palabras y expansión

La historia de seis palabras más famosa se atribuye a Hemingway: "En venta: zapatos de bebé, sin usar." Seis palabras que contienen una pérdida, una economía desesperada, un duelo implícito. La fuerza viene de todo lo que no dice.

PASO 1 — LAS SEIS PALABRAS:
Escribe una historia completa en exactamente seis palabras. Debe implicar algo que ocurrió, aunque no lo cuente directamente.

EJEMPLOS:
— "Llamó dos veces. Nadie contestó. Bien." (alivio o resignación)
— "El abrigo de él, todavía aquí." (ausencia)
— "Ganamos. Él no lo vio." (pérdida)
— "Aprendí su nombre demasiado tarde." (arrepentimiento)
— "La última foto. Todos sonreímos." (ironía)

Tómate el tiempo que necesites con las seis palabras. Son la semilla. Si la semilla es débil, el árbol será débil.

PASO 2 — LA EXPANSIÓN:
Usa esas seis palabras como primera línea y expándelas. No las expliques. Deja que el texto abra el mundo que estaba comprimido en ellas.

¿Quiénes son estas personas? ¿Qué pasó antes de este momento? ¿Qué pasa después?

La expansión no debe "resolver" las seis palabras. Debe hacer que el lector sienta más, no que entienda más.`},

// Hook de tema: lee/escribe localStorage y aplica data-theme al <html>
const useTheme=()=>{
  const [theme,setTheme]=useState(()=>{
    try{return localStorage.getItem('pretexto_theme')||'light';}catch(e){return 'light';}
  });
  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',theme);
    try{localStorage.setItem('pretexto_theme',theme);}catch(e){}
  },[theme]);
  return [theme,setTheme];
};

const computeStats=(library,reflections)=>{
  // totalWords = sum of words_added across all entries
  // words_added stores the INCREMENT per session (new words only)
  // For old entries without words_added, fall back to word_count
  const totalWords=library.reduce((s,e)=>{
    const wa=e.words_added;
    return s+(wa!=null?wa:(e.word_count||e.wordCount||0));
  },0);
  // Active day = any entry with ≥100 effective words (words_added for projects, word_count for rest)
  // effectiveWc = how many NEW words were written in that session
  const effectiveWc=e=>{const wa=e.words_added;return wa!=null?wa:(e.word_count||e.wordCount||0);};
  const activeDayEntries=library.filter(e=>effectiveWc(e)>=100);
  const dates=[...new Set(activeDayEntries.map(e=>e.date?.slice(0,10)).filter(Boolean))].sort().reverse();
  let streak=0;const ref=new Date();ref.setHours(0,0,0,0);
  for(const d of dates){const dt=new Date(d);dt.setHours(0,0,0,0);const diff=Math.round((ref-dt)/(864e5));if(diff<=1){streak++;ref.setTime(dt.getTime())}else break}
  const weekAgo=new Date();weekAgo.setDate(weekAgo.getDate()-7);
  const thisWeek=new Set(activeDayEntries.filter(e=>e.date&&new Date(e.date?.slice(0,10))>=weekAgo).map(e=>e.date?.slice(0,10))).size;
  const avgRating=reflections.length?Math.round(reflections.reduce((s,r)=>s+r.rating,0)/reflections.length*10)/10:null;
  const _firstDay=library.length?library[library.length-1].date?.slice(0,10)||today():today();const last7=Array.from({length:7},(_,i)=>{const d=new Date(_firstDay+'T12:00:00');d.setDate(d.getDate()+i);return d.toISOString().slice(0,10)});
  const activeDates=new Set(activeDayEntries.map(e=>e.date?.slice(0,10)).filter(Boolean));
  const last7status=last7.map(d=>({date:d,done:activeDates.has(d)}));
  const weekElapsed=library.filter(e=>e.date&&new Date(e.date?.slice(0,10))>=weekAgo).reduce((s,e)=>s+(e.elapsed||0),0);
  const totalElapsed=library.reduce((s,e)=>s+(e.elapsed||0),0);
  return{totalWords,streak,thisWeek,avgRating,totalSessions:library.length,last7status,weekElapsed,totalElapsed};
};

const getApiKey=uid=>S.get('flujo:'+(uid||'_')+':apikey')||'';
const setApiKey=(uid,k)=>S.set('flujo:'+(uid||'_')+':apikey',k);
const callClaude=async(system,userMsg,maxTokens=600,uid)=>{
  const key=getApiKey(uid);
  if(!key)throw new Error('no_key');
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-opus-4-7',max_tokens:maxTokens,system,messages:[{role:'user',content:userMsg}]}),
  });
  if(r.status===401)throw new Error('invalid_key');
  if(!r.ok){let msg='Error HTTP '+r.status;try{const e=await r.json();msg=e.error?.message?e.error.message+' ('+r.status+')':msg}catch(e){}throw new Error(msg)}
  const d=await r.json();
  return d.content?.filter(b=>b.type==='text').map(b=>b.text).join('')||'';
};

/* ─── GOOGLE DRIVE ────────────────────────────────── */
const getOrigin=()=>{try{const o=window.location.origin;return o&&o!=='null'?o:''}catch(e){return''}};
const DRIVE_SCOPE='https://www.googleapis.com/auth/drive.appdata';

// OAuth via redirect — most compatible with mobile PWAs
// Returns a promise that resolves with {token, expires_at}
// Uses sessionStorage to store pending auth state
const oauthPopup=cid=>new Promise((res,rej)=>{
  if(!cid){rej(new Error('no_client_id'));return;}
  const origin=getOrigin();
  if(!origin){rej(new Error('no_origin'));return;}
  // Build redirect URI — current page
  const redirectUri=origin+window.location.pathname;
  // Store callback in sessionStorage so we can resolve after redirect
  // Use localStorage — more reliable than sessionStorage in PWA
  // Redirect to Google OAuth
  const url='https://accounts.google.com/o/oauth2/v2/auth?'+new URLSearchParams({
    client_id:cid,
    redirect_uri:redirectUri,
    response_type:'token',
    scope:DRIVE_SCOPE,
    prompt:'consent',
  });
  window.location.href=url;
  // Promise never resolves here — page will reload after redirect
  // Resolution happens in checkOAuthRedirect() below
});

// Check if we're returning from OAuth redirect — call on app load
const checkOAuthRedirect=()=>{
  const hash=window.location.hash;
  if(!hash||!hash.includes('access_token'))return null;
  const params=new URLSearchParams(hash.slice(1));
  const token=params.get('access_token');
  const expiresIn=parseInt(params.get('expires_in')||'3600');
  if(!token)return null;
  // Clean URL so token doesn't stay in address bar
  history.replaceState(null,'',window.location.pathname);
  // Get uid from localStorage (survives PWA reload)
  const uid=localStorage.getItem('flujo_oauth_uid')||'';
  localStorage.removeItem('flujo_oauth_uid');
  return{token,expires_at:Date.now()+expiresIn*1000,_uid:uid};
};

const df=async(url,opts,tok)=>{
  const r=await fetch(url,{...opts,headers:{Authorization:'Bearer '+tok,...(opts?.headers||{})}});
  if(r.status===401)throw Object.assign(new Error('expired'),{code:401});
  if(!r.ok)throw new Error('Drive '+r.status);
  return r.status===204?null:r.json();
};
const driveFindFile=async(name,tok)=>{
  const r=await df('https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q='+encodeURIComponent("name='"+name+"'")+'&fields=files(id,name)',{},tok);
  return r.files?.[0]||null;
};
const driveDownload=async(id,tok)=>{
  const r=await fetch('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media',{headers:{Authorization:'Bearer '+tok}});
  if(!r.ok)throw new Error('DL '+r.status);
  return r.json();
};
const driveUpload=async(name,content,fid,tok)=>{
  const data=JSON.stringify(content);
  if(fid){
    return df('https://www.googleapis.com/upload/drive/v3/files/'+fid+'?uploadType=media',
      {method:'PATCH',headers:{'Content-Type':'application/json'},body:data},tok);
  }else{
    const meta=JSON.stringify({name,mimeType:'application/json',parents:['appDataFolder']});
    const form=new FormData();
    form.append('metadata',new Blob([meta],{type:'application/json'}));
    form.append('file',new Blob([data],{type:'application/json'}));
    return df('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
      {method:'POST',body:form},tok);
  }
};


/* ─── DOCX ───────────────────────────────────────── */
const waitDocx=()=>new Promise(r=>{if(window.__docx){r(window.__docx);return}window.addEventListener('docxReady',()=>r(window.__docx),{once:true});setTimeout(()=>r(window.__docx||null),8000)});
const exportDocx=async(entry,fDocx,fSize,feedbackTxt)=>{
  const lib=await waitDocx();if(!lib){alert('No se pudo cargar la librería .docx');return}
  const {Document,Packer,Paragraph,TextRun,AlignmentType}=lib;
  const aMap={left:AlignmentType.LEFT,center:AlignmentType.CENTER,right:AlignmentType.RIGHT};
  const pA=aMap[entry.alignDir||'left']||AlignmentType.LEFT;
  const div=document.createElement('div');div.innerHTML=entry.html||'';
  const toR=(node,f={})=>{const runs=[];node.childNodes.forEach(c=>{if(c.nodeType===Node.TEXT_NODE){if(c.textContent)runs.push(new TextRun({text:c.textContent,bold:!!f.b,italics:!!f.i,underline:f.u?{}:undefined,font:fDocx,size:fSize*2}))}else if(c.nodeType===Node.ELEMENT_NODE){const t=c.tagName.toLowerCase();const nf={...f};if(t==='strong'||t==='b')nf.b=true;if(t==='em'||t==='i')nf.i=true;if(t==='u')nf.u=true;if(t==='br')runs.push(new TextRun({break:1}));else runs.push(...toR(c,nf))}});return runs};
  const paras=[];div.childNodes.forEach(node=>{if(node.nodeType===Node.TEXT_NODE){const t=node.textContent.trim();if(t)paras.push(new Paragraph({children:[new TextRun({text:t,font:fDocx,size:fSize*2})],alignment:pA}))}else if(node.nodeType===Node.ELEMENT_NODE){const t=node.tagName.toLowerCase();if(t==='p'||t==='div'){const runs=toR(node);paras.push(new Paragraph({children:runs.length?runs:[new TextRun('')],alignment:pA,spacing:{after:200}}))}}});
  if(!paras.length)paras.push(new Paragraph({children:[new TextRun('')]}));
  const feedbackParas=[];
  if(feedbackTxt&&feedbackTxt.trim()){
    feedbackParas.push(new Paragraph({children:[new TextRun({text:'',break:1})],spacing:{before:400}}));
    feedbackParas.push(new Paragraph({children:[new TextRun({text:'Revisión de Claude',bold:true,size:24,font:fDocx,color:'5550B8'})],spacing:{after:160}}));
    feedbackTxt.trim().split('\n').filter(l=>l.trim()).forEach(line=>{
      feedbackParas.push(new Paragraph({children:[new TextRun({text:line.trim(),size:fSize*2-2,font:fDocx,color:'444444'})],spacing:{after:120}}));
    });
  }
  const doc=new Document({styles:{default:{document:{run:{font:fDocx,size:fSize*2}}}},sections:[{properties:{page:{size:{width:11906,height:16838},margin:{top:1440,right:1440,bottom:1440,left:1440}}},children:[new Paragraph({children:[new TextRun({text:entry.title||'Pretexto',bold:true,size:36,font:fDocx})],spacing:{after:240}}),new Paragraph({children:[new TextRun({text:(entry.sessionLabel||'')+' · '+fmtDate(entry.date)+' · '+entry.wordCount+' palabras',size:18,color:'888888',font:'Arial'})],spacing:{after:480}}),...paras,...feedbackParas]}]});
  const blob=await Packer.toBlob(doc);const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=((entry.title||'unstuck').replace(/[^a-z0-9áéíóúñ ]/gi,'').trim()||'unstuck')+'.docx';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
};

const LeccionModal=({reto,onClose})=>{

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(10,27,61,0.5)',zIndex:120,display:'flex',alignItems:'center',justifyContent:'center',padding:20}} onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="fi" style={{background:CARD_BG,borderRadius:16,width:'100%',maxWidth:620,maxHeight:'90vh',overflow:'hidden',display:'flex',flexDirection:'column',boxShadow:'0 24px 60px -16px rgba(10,27,61,0.35)',position:'relative'}}>
        <Signo char="?" size={120} top={-16} right={2} color="azul"/>

        <div style={{flex:1,overflowY:'auto',padding:'20px 24px'}}>
          {lines.map((line,i)=>{
            const isBold=line.startsWith('**')&&line.endsWith('**');

            if(isBold)return <p key={i} style={{fontSize:13,fontWeight:600,color:TXT,marginBottom:8,marginTop:i>0?16:0}}>{line.replace(/\*\*/g,'')}</p>;
            if(isList)return <div key={i} style={{display:'flex',gap:8,marginBottom:5}}><span style={{color:MUTED,flexShrink:0}}>—</span><span style={{fontSize:13,color:MUTED,lineHeight:1.65}}>{line.slice(1).trim()}</span></div>;
            if(line.startsWith('#'))return null;
            return <p key={i} style={{fontSize:13,color:line.startsWith('*')&&!line.startsWith('**')?MUTED:TXT,lineHeight:1.75,marginBottom:10,fontStyle:line.startsWith('*')&&!line.startsWith('**')?'italic':'normal'}}>{line.replace(/^\*|\*$/g,'').replace(/\*\*/g,'')}</p>;
          })}

        <div style={{borderTop:'1px solid '+BDR,padding:'12px 24px',flexShrink:0,display:'flex',justifyContent:'flex-end',position:'relative',zIndex:1}}>
          <button onClick={onClose} style={{background:ADVANCE_BG,border:'none',borderRadius:9,padding:'10px 18px',fontSize:13,fontWeight:600,color:ADVANCE_TXT,cursor:'pointer',fontFamily:"'Source Sans 3',sans-serif"}}>Entendido</button>
        </div>
      </div>
    </div>
  );
};

/* ─── USER SELECT ────────────────────────────────── */
const AuthScreen=({onAuth})=>{
  const [mode,setMode]=useState('login');
  const [recoverSent,setRecoverSent]=useState(false); // 'login' | 'signup' | 'recover'
  const [name,setName]=useState('');
  const [email,setEmail]=useState('');
  const [password,setPassword]=useState('');
  const [ci,setCi]=useState(0);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [legalOk,setLegalOk]=useState(false);
  const [showPrivacy,setShowPrivacy]=useState(false);
  const [showTerms,setShowTerms]=useState(false);
  const [theme,setTheme]=useTheme();

  const submit=async()=>{
    if(mode==='recover'){
      if(!email.trim()){setError('Introduce tu email');return;}
      setLoading(true);setError('');
      try{await DB.resetPassword(email.trim());setRecoverSent(true);}
      catch(e){setError('No pudimos enviar el email. Comprueba que sea correcto.');}
      setLoading(false);return;
    }
    if(!email.trim()||!password.trim())return;
    if(mode==='signup'&&!name.trim()){setError('Añade tu nombre');return;}
    if(mode==='signup'&&password.length<6){setError('La contraseña debe tener al menos 6 caracteres');return;}
    if(mode==='signup'&&!legalOk){setError('Debes aceptar la política de privacidad y los términos de servicio');return;}
    setLoading(true);setError('');
    try{
      if(mode==='signup'){
        const c=USER_COLORS[ci];
        const meta={name:name.trim(),color_idx:ci,accent:c.accent,bg:c.bg,text_col:c.txt,initials:initials(name)};
        const {user}=await DB.signUp(email.trim(),password,meta);
        if(user){
          await new Promise(r=>setTimeout(r,800));
          const profile=await DB.getProfile(user.id);
          onAuth(profile||{id:user.id,...meta});
        }
      }else{
        const {user}=await DB.signIn(email.trim(),password);
        if(user){
          const profile=await DB.getProfile(user.id);
          onAuth(profile||{id:user.id,name:email.split('@')[0],initials:email[0].toUpperCase(),accent:'#1E9BF0',bg:'#EEEDFE',text_col:'#3C3489'});
        }
      }
    }catch(e){
      setError(e.message==='Invalid login credentials'?'Email o contraseña incorrectos':e.message);
    }finally{setLoading(false)}
  };

  const isLogin=mode==='login',isSignup=mode==='signup',isRecover=mode==='recover';

  return(
    <>
    {showPrivacy&&<PrivacyModal onClose={()=>setShowPrivacy(false)}/>}
    {showTerms&&<TermsModal onClose={()=>setShowTerms(false)}/>}
    <div style={{height:'var(--app-height,100dvh)',background:PAGE_BG,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'24px 16px',overflow:'auto',transition:'background 0.25s'}}>
      <div style={{width:'100%',maxWidth:400,position:'relative'}}>

        <div style={{background:CARD_BG,border:'1px solid '+BDR,borderRadius:18,overflow:'hidden',boxShadow:'0 32px 70px -28px rgba(10,27,61,0.35)',position:'relative'}}>
          <Signo char="&ldquo;" size={170} top={-12} left={6} color="azul"/>

          {/* Header: logo */}
          <div style={{position:'relative',zIndex:1,textAlign:'center',padding:'38px 32px 0'}}>
            <div style={{fontFamily:'"Playfair Display",serif',fontStyle:'italic',fontWeight:500,fontSize:25,color:TXT,marginBottom:26}}>Pretexto</div>

            {/* Tabs */}
            {!isRecover&&<div style={{display:'flex',marginBottom:26,borderBottom:'1px solid '+BDR}}>
              {[['login','Entrar'],['signup','Crear cuenta']].map(([m,l])=>(
                <button key={m} onClick={()=>{setMode(m);setError('');}} style={{flex:1,background:'transparent',border:'none',borderBottom:mode===m?'2px solid '+NAVY:'2px solid transparent',padding:'9px 0',fontSize:13.5,fontWeight:mode===m?600:400,color:mode===m?TXT:MUTED,cursor:'pointer',marginBottom:-1,fontFamily:"'Source Sans 3',sans-serif"}}>{l}</button>
              ))}
            </div>}
            {isRecover&&<div style={{fontSize:14,color:MUTED,marginBottom:24,lineHeight:1.5}}>Te enviaremos un enlace para crear una nueva contraseña.</div>}
          </div>

          {/* Form */}
          <div style={{position:'relative',zIndex:1,padding:'0 32px 28px'}}>

            {isSignup&&<>
              <label style={{display:'block',font:"600 11px/1 'Source Sans 3'",letterSpacing:'.1em',textTransform:'uppercase',color:FAINT,marginBottom:7}}>Nombre</label>
              <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Tu nombre" style={{marginBottom:12,width:'100%',padding:'12px 14px',fontSize:15,color:TXT,background:CARD_BG,border:'1px solid '+BDR,borderRadius:10,outline:'none'}}/>
              <div style={{display:'flex',gap:7,marginBottom:18}}>{USER_COLORS.map((c,i)=><button key={i} onClick={()=>setCi(i)} style={{width:25,height:25,borderRadius:'50%',background:c.accent,border:ci===i?'2px solid '+TXT:'2px solid transparent',cursor:'pointer',padding:0}}/>)}</div>
            </>}

            {!isRecover||isRecover?(
              <div style={{marginBottom:14}}>
                <label style={{display:'block',font:"600 11px/1 'Source Sans 3'",letterSpacing:'.1em',textTransform:'uppercase',color:FAINT,marginBottom:7}}>Email</label>
                <input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')submit()}} placeholder="tu@email.com" style={{width:'100%',padding:'12px 14px',fontSize:15,color:TXT,background:CARD_BG,border:'1px solid '+BDR,borderRadius:10,outline:'none'}}/>
              </div>
            ):null}

            {!isRecover&&<div style={{marginBottom:22}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:7}}>
                <label style={{font:"600 11px/1 'Source Sans 3'",letterSpacing:'.1em',textTransform:'uppercase',color:FAINT}}>Contraseña{isSignup&&' (mín. 6)'}</label>
                {isLogin&&<button onClick={()=>{setMode('recover');setError('');setRecoverSent(false);}} style={{font:"500 12px/1 'Source Sans 3'",color:AZULMED,background:'transparent',border:'none',cursor:'pointer',padding:0}}>¿La olvidaste?</button>}
              </div>
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')submit()}} placeholder="••••••••" style={{width:'100%',padding:'12px 14px',fontSize:15,color:TXT,background:CARD_BG,border:'1px solid '+BDR,borderRadius:10,outline:'none'}}/>
            </div>}

            {error&&<div style={{fontSize:12.5,color:DANGER,marginBottom:16,padding:'9px 12px',background:'rgba(197,34,31,0.07)',borderRadius:8,border:'1px solid rgba(197,34,31,0.2)'}}>{error}</div>}

            {isSignup&&<label style={{display:'flex',alignItems:'flex-start',gap:8,cursor:'pointer',marginBottom:18}}>
              <input type="checkbox" id="legal-check" checked={legalOk} onChange={e=>setLegalOk(e.target.checked)} style={{marginTop:2,flexShrink:0,cursor:'pointer'}}/>
              <span style={{fontSize:11.5,color:MUTED,lineHeight:1.6}}>
                He leído y acepto la{' '}
                <button type="button" onClick={e=>{e.preventDefault();setShowPrivacy(true);}} style={{background:'none',border:'none',color:AZULMED,cursor:'pointer',fontSize:11.5,padding:0,textDecoration:'underline'}}>Política de Privacidad</button>
                {' '}y los{' '}
                <button type="button" onClick={e=>{e.preventDefault();setShowTerms(true);}} style={{background:'none',border:'none',color:AZULMED,cursor:'pointer',fontSize:11.5,padding:0,textDecoration:'underline'}}>Términos de Servicio</button>
              </span>
            </label>}

            {/* CTA */}
            <button onClick={()=>{
              if(isSignup&&!document.getElementById('legal-check')?.checked){
                setError('Debes aceptar la Política de Privacidad y los Términos de Servicio');return;
              }
              submit();
            }} disabled={loading} style={{
              width:'100%',
              background:isSignup?NARANJA:ADVANCE_BG,
              border:'none',borderRadius:11,padding:'14px',
              fontSize:14.5,fontWeight:600,color:isSignup?'#fff':ADVANCE_TXT,
              cursor:'pointer',opacity:loading?0.6:1,
              boxShadow:isSignup?'0 8px 20px -8px rgba(241,90,36,0.65)':'none',
              fontFamily:"'Source Sans 3',sans-serif",
              marginBottom:16,
            }}>
              {loading?'…':isLogin?'Entrar →':isRecover?'Enviar enlace de recuperación':'Crear cuenta →'}
            </button>

            {recoverSent&&<div style={{background:'rgba(30,155,240,0.08)',border:'1px solid rgba(30,155,240,0.3)',borderRadius:9,padding:'13px 14px',marginBottom:14,fontSize:13,color:AZUL,lineHeight:1.5,textAlign:'center'}}>
              ✓ Te hemos enviado un email con el enlace para cambiar tu contraseña. Revisa también el spam.
            </div>}

            {isRecover&&<div style={{textAlign:'center',fontSize:13.5}}>
              <button onClick={()=>{setMode('login');setRecoverSent(false);setError('');}} style={{background:'transparent',border:'none',color:AZULMED,cursor:'pointer',fontSize:13.5,fontWeight:600}}>← Volver al inicio de sesión</button>
            </div>}

            {isLogin&&<div style={{textAlign:'center',fontSize:13.5,color:FAINT}}>
              ¿Aún no tienes cuenta?{' '}
              <button onClick={()=>setMode('signup')} style={{font:"600 13.5px/1 'Source Sans 3'",color:NARANJA,background:'transparent',border:'none',cursor:'pointer',padding:0}}>Créala gratis</button>
            </div>}

            {isSignup&&<div style={{textAlign:'center',fontSize:13.5,color:FAINT}}>
              ¿Ya tienes cuenta?{' '}
              <button onClick={()=>setMode('login')} style={{font:"600 13.5px/1 'Source Sans 3'",color:AZULMED,background:'transparent',border:'none',cursor:'pointer',padding:0}}>Entra aquí</button>
            </div>}
          </div>

          {/* Theme toggle */}
          <div style={{position:'relative',zIndex:1,display:'flex',justifyContent:'center',paddingBottom:22}}>
            <ThemeToggle theme={theme} setTheme={setTheme} small/>
          </div>
        </div>

        <div style={{textAlign:'center',marginTop:18,fontSize:12,color:FAINT}}>editor de escritura creativa</div>
      </div>
    </div>
    </>
  );
};

              {(()=>{

                const effectiveWc=e=>{const wa=e.words_added;return wa!=null?wa:(e.word_count||e.wordCount||0);};const activeDates=new Set(library.filter(e=>effectiveWc(e)>=100).map(e=>e.date?.slice(0,10)).filter(Boolean));
                const DAY_LABELS=['L','M','X','J','V','S','D'];

                  const d=new Date(monday);d.setDate(monday.getDate()+i);

                <div style={{fontSize:10,color:MUTED}}>días seguidos</div>

               stats.streak===1?'¡Primer día! El más difícil ya pasó.':
               stats.streak<7?'Llevas '+stats.streak+' días. ¡Sigue así! Completa 7 para ganar un comodín.':
               stats.streak===7?'🎉 ¡Semana completa! Has ganado un comodín.':
               stats.streak<14?'¡'+stats.streak+' días! Vas a por las dos semanas.':
               stats.streak<30?'⚡ ¡'+stats.streak+' días! Increíble constancia.':

            </div>

        {/* Followers widget */}
        {(()=>{
          const seenKey='pretexto:seen_followers:'+user.id;
          const seenIds=new Set(S.get(seenKey)||[]);
          const newFollowers=followers.filter(f=>!seenIds.has(f.id));

          return(
            <div className="fu" style={{background:CARD_BG,border:'1px solid '+BDR,borderRadius:14,padding:'16px 20px',marginBottom:16}}>

                    <span style={{fontSize:12,color:MUTED,marginLeft:6}}>{followers.length===1?'seguidor':'seguidores'}</span>
                  </div>
                  {newFollowers.length>0&&(
                    <div style={{background:'rgba(30,155,240,0.1)',border:'0.5px solid rgba(30,155,240,0.25)',borderRadius:20,padding:'2px 10px',fontSize:11,fontWeight:600,color:'#1E9BF0'}}>
                      +{newFollowers.length} nuevo{newFollowers.length>1?'s':''}
                    </div>
                  )}
                </div>
                {newFollowers.length>0&&(

                  </button>
                )}
              </div>
              {/* New followers cards */}
              {newFollowers.length>0&&(
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {newFollowers.map(f=>{
                    const isFollowing=following.includes(f.id);
                    return(
                      <div key={f.id} style={{display:'flex',alignItems:'center',gap:10,background:'rgba(30,155,240,0.04)',border:'0.5px solid rgba(30,155,240,0.12)',borderRadius:10,padding:'10px 14px'}}>
                        <UserAvatar user={f} size={36}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:600,color:TXT,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name||'Usuario'}</div>
                          <div style={{fontSize:11,color:MUTED}}>@{f.username||'sin_usuario'} ha empezado a seguirte</div>
                        </div>
                        <div style={{display:'flex',gap:6,flexShrink:0}}>
                          {!isFollowing&&(
                            <button onClick={async()=>{if(onFollow)await onFollow(f.id,false);}}
                              style={{background:'rgba(30,155,240,0.08)',border:'0.5px solid rgba(30,155,240,0.25)',borderRadius:6,padding:'5px 10px',fontSize:11,fontWeight:500,color:'#1E9BF0',cursor:'pointer'}}>
                              Seguir
                            </button>
                          )}
                          {isFollowing&&(
                            <span style={{fontSize:11,color:'#1E9BF0',fontWeight:500}}>✓ Siguiendo</span>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
              {followers.length===0&&(
                <div style={{fontSize:12,color:FAINT,marginTop:2}}>Aún no te sigue nadie. ¡Comparte tu perfil!</div>
              )}
            </div>
          );
        })()}

        {/* Stats chart */}
        {library.length>=3&&<StatsChart library={library}/>}

        {/* Stats */}
        <div className="fu resp-3col" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:8}}>
          <StatCard label="Palabras" value={stats.totalWords>=1000?(stats.totalWords/1000).toFixed(1)+'k':stats.totalWords||0} sub="escritas"/>
          <StatCard label="Esta semana" value={stats.thisWeek||0} sub="sesiones"/>
          <StatCard label="Valoración" value={stats.avgRating?stats.avgRating+'/10':'—'} sub="media" accent={stats.avgRating>=7?'#1E9BF0':TXT}/>
        </div>
        <div className="fu resp-3col" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:12}}>
          <StatCard label="Esta semana" value={fmtTime(stats.weekElapsed)||'—'} sub="tiempo escrito"/>
          <StatCard label="Total" value={fmtTime(stats.totalElapsed)||'—'} sub="desde el inicio"/>
          <StatCard label="Lecciones" value={lessonsRead+'/64'} sub={lessonsPct+'% leído'} accent={lessonsRead>0?'#1E9BF0':TXT}/>
        </div>


        {/* Recent notes */}
        {recentNotes.length>0&&<div className="fu" style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:500,color:FAINT,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10}}>Aprendizajes recientes</div>
          <div style={{display:'flex',flexDirection:'column',gap:7}}>
            {recentNotes.map((r,i)=><div key={i} style={{background:CARD_BG,border:'1px solid '+BDR,borderRadius:9,padding:'10px 14px',display:'flex',gap:10,alignItems:'flex-start'}}>
              <div style={{width:22,height:22,borderRadius:'50%',background:r.rating>=7?'rgba(30,155,240,0.1)':'rgba(0,0,0,0.04)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:600,color:r.rating>=7?'#1E9BF0':MUTED,flexShrink:0}}>{r.rating}</div>
              <div style={{flex:1}}><div style={{fontSize:13,color:TXT,lineHeight:1.5,fontStyle:'italic'}}>"{r.notes}"</div><div style={{fontSize:10,color:FAINT,marginTop:3}}>{fmtDate(r.date)} · {r.sessionTitle||r.sk}</div></div>
            </div>)}
          </div>
        </div>}

        {/* Recent texts */}
        {library.slice(0,3).length>0&&<div className="fu">
          <div style={{fontSize:11,fontWeight:500,color:FAINT,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10}}>Últimos textos</div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {library.slice(0,3).map(e=>{const sc={check:AZUL,reto:NARANJA,proyecto:AZULMED,cuento:'#A82020',dueto:'#1A6B8A'}[e.sk]||MUTED;return <div key={e.id} style={{background:CARD_BG,border:'1px solid '+BDR,borderRadius:9,padding:'10px 14px',display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:6,height:6,borderRadius:'50%',background:sc,flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:500,color:TXT,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.title}</div><div style={{fontSize:11,color:MUTED}}>{fmtDate(e.date)} · {e.wordCount} palabras</div></div>
              <button onClick={()=>{
                const v=e.visibility||'privado';

                {(e.visibility||'privado')==='privado'?'🔒':(e.visibility==='amigos'?'👥':'🌐')}

              <button onClick={()=>{if(window.confirm('¿Eliminar "'+e.title+'"?'))onDeleteEntry(e.id)}} style={{background:'transparent',border:'0.5px solid rgba(197,34,31,0.2)',borderRadius:6,padding:'3px 8px',fontSize:11,color:'rgba(197,34,31,0.5)',cursor:'pointer',flexShrink:0}}>✕</button>

/* ─── SESSION BRIEFING ───────────────────────────── */
const SectionCard=({accent,tag,title,children})=>(
  <div style={{background:CARD_BG,border:'1px solid '+BDR,borderRadius:14,overflow:'hidden',marginBottom:14,display:'flex',flexDirection:'column'}}>
    <div style={{padding:'14px 16px',borderBottom:'1px solid '+BDR,display:'flex',alignItems:'center',gap:10}}>
      <div style={{width:4,height:36,background:accent,borderRadius:2,flexShrink:0}}/>
      <div style={{minWidth:0}}>
        <div style={{font:"600 9.5px/1 'Source Sans 3'",letterSpacing:'.14em',textTransform:'uppercase',color:accent,marginBottom:4}}>{tag}</div>
        <div style={{fontSize:15,fontWeight:600,color:TXT,letterSpacing:'-0.01em',fontFamily:'"Playfair Display",serif',lineHeight:1.3}}>{title}</div>
      </div>
    </div>
    <div style={{flex:1,display:'flex',flexDirection:'column'}}>{children}</div>
  </div>
);

const SessionBriefing=({user,energy,library,projects,saveProject,onStart,onBack})=>{
  const todayCheck=S.get('flujo:check:'+user.id+':'+today())||
    library.some(e=>e.date?.slice(0,10)===today()&&(e.words_added!=null?e.words_added:(e.word_count||0))>=100);
  const usedCheckIds=S.list('flujo:check:'+user.id+':').map(k=>S.get(k)?.exerciseId).filter(Boolean);
  const [checkExercise]=useState(()=>pickExercise(energy,usedCheckIds));
  const checkDone=!!todayCheck?.done;
  const checkWc=todayCheck?.wordCount||0;

  const defaultChallenge=getRetoPorSemana();
  const savedChallenge=S.get('flujo:'+user.id+':reto:'+defaultChallenge.id)||{};
  const [reto,setReto]=useState({...defaultChallenge,...savedChallenge});
  const [editingReto,setEditingReto]=useState(false);
  const [retoEdit,setRetoEdit]=useState({title:reto.title,desc:reto.desc,goal:reto.goal});
  const [showLeccion,setShowLeccion]=useState(false);
  const [leccionReto,setLeccionReto]=useState(null);

  const retoEntries=library.filter(e=>e.sk==='reto'&&e.weekId===defaultChallenge.id);
  const retoWc=retoEntries.reduce((s,e)=>s+(e.wordCount||0),0);
  const retoPct=reto.goal>0?Math.min(100,Math.round(retoWc/reto.goal*100)):0;
  const saveReto=()=>{const updated={...reto,...retoEdit};setReto(updated);S.set('flujo:'+user.id+':reto:'+defaultChallenge.id,updated);setEditingReto(false)};

  // projects comes from props
  const lastProjectId=projects.length?projects[0].id:null;
  const lastProject=projects.find(p=>p.id===lastProjectId)||projects[0]||null;
  const [showOtherProjects,setShowOtherProjects]=useState(false);
  const [creatingProject,setCreatingProject]=useState(false);
  const [newProj,setNewProj]=useState({title:'',type:'Novela',goal:50000});
  const [selectedGenre,setSelectedGenre]=useState(null); // null=grid, 'Poesía'/'Relato'/'Novela'/'Ensayo'

  const createProject=async()=>{
    if(!newProj.title.trim())return;
    const p={id:uid(),title:newProj.title.trim(),type:newProj.type,goal:newProj.goal,created_at:today(),word_count:0};
    await saveProject(p);
    onStart({type:'proyecto',project:p});
  };
  const selectProject=p=>{const lastEntry=library.filter(e=>(e.project_id||e.projectId)===p.id).sort((a,b)=>b.ts-a.ts)[0]||null;onStart({type:'proyecto',project:p,initialHtml:lastEntry?.html||'',initialPlain:lastEntry?.plain||''});};

  // SectionCard defined outside — see below

  const openLeccion=r=>{
    setLeccionReto(r);setShowLeccion(true);
    const k='flujo:lessons:'+user.id;
    const prev=S.get(k)||[];if(!prev.includes(r.id)){S.set(k,[...prev,r.id]);DB.markLessonRead(user.id,r.id).catch(()=>{});}
  };

  return(
    <div style={{height:'var(--app-height,100dvh)',overflow:'auto',background:'transparent',display:'flex',flexDirection:'column'}}>
      {showLeccion&&<LeccionModal reto={leccionReto} onClose={()=>setShowLeccion(false)}/>}
      <div style={{display:'flex',alignItems:'center',padding:'0 20px',height:48,background:'var(--topbar-bg,#fff)',borderBottom:'1px solid '+BDR,flexShrink:0,gap:10}}>
        <button onClick={onBack} style={{background:'transparent',border:'none',cursor:'pointer',color:MUTED,fontSize:13,display:'flex',alignItems:'center',gap:4}}>← Volver</button>
        <div style={{fontSize:14,fontWeight:600,color:TXT,fontFamily:'"Playfair Display",Georgia,serif'}}>Pretexto</div>
        <div style={{flex:1}}/>
        <div style={{fontSize:12,color:MUTED}}>Energía <strong style={{color:TXT}}>{energy}/10</strong></div>
      </div>

                  <div style={{height:5,background:'rgba(10,27,61,0.08)',borderRadius:3,overflow:'hidden'}}>

                <button onClick={()=>onStart({type:'reto',weekId:defaultChallenge.id,reto})} style={{width:'100%',height:42,background:SESSION_BTN_BG,border:'none',borderRadius:9,color:SESSION_BTN_TXT,fontSize:13.5,fontWeight:600,cursor:'pointer',fontFamily:"'Source Sans 3',sans-serif"}}>

        </SectionCard>

        {/* CUENTO CONTRARELOJ */}

          <div style={{padding:'14px 16px',borderBottom:'1px solid '+BDR,display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:4,height:36,background:'#A82020',borderRadius:2,flexShrink:0}}/>
            <div style={{minWidth:0}}>
              <div style={{font:"600 9.5px/1 'Source Sans 3'",letterSpacing:'.14em',textTransform:'uppercase',color:'#A82020',marginBottom:4}}>Reto especial · 1 hora</div>

          <div style={{padding:'14px 16px'}}>
            <p style={{fontSize:13,color:MUTED,lineHeight:1.75,marginBottom:14}}>Escribe un cuento usando 5 palabras al azar antes de que se agote 1 hora. Solo puedes publicar si usas las 5 palabras y superas los 2.500 caracteres.</p>

/* ─── CREATE TEAM ────────────────────────────────── */
const CreateTeam=({user,onBack,onCreated})=>{
  const [name,setName]=useState('');
  const [desc,setDesc]=useState('');
  const [avatar,setAvatar]=useState(null);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');

  const pickImg=e=>{
    const file=e.target.files[0];if(!file)return;
    if(file.size>500000){setErr('La imagen debe pesar menos de 500KB');return;}
    const r=new FileReader();
    r.onload=ev=>setAvatar(ev.target.result);
    r.readAsDataURL(file);
  };

  const create=async()=>{
    if(!name.trim()){setErr('Ponle un nombre al equipo');return;}
    setLoading(true);setErr('');
    try{
      const code=Math.random().toString(36).slice(2,8).toUpperCase();
      const group=await DB.createGroup({name:name.trim(),description:desc.trim(),code,created_by:user.id,avatar:avatar||null});
      await DB.joinGroup(group.code,user.id);
      // Update role to admin
      onCreated(group);
    }catch(e){setErr(e.message);}
    finally{setLoading(false);}
  };

  return(
    <div style={{position:'fixed',inset:0,background:PAGE_BG,zIndex:200,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',padding:'0 20px',height:52,background:'var(--topbar-bg,#fff)',borderBottom:'1px solid '+BDR,flexShrink:0,gap:10}}>
        <button onClick={onBack} style={{background:'transparent',border:'none',cursor:'pointer',color:MUTED,fontSize:13}}>← Volver</button>
        <div style={{fontSize:15,fontWeight:700,color:TXT,fontFamily:'"Playfair Display",serif'}}>Crear equipo</div>
      </div>
      <div style={{flex:1,overflowY:'auto',maxWidth:500,width:'100%',margin:'0 auto',padding:'28px 20px 48px'}}>
        {/* Avatar picker */}
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{position:'relative',display:'inline-block'}}>
            {avatar
              ?<img src={avatar} style={{width:80,height:80,borderRadius:'50%',objectFit:'cover',border:'0.5px solid '+BDR}}/>
              :<div style={{width:80,height:80,borderRadius:'50%',background:'rgba(30,155,240,0.1)',border:'2px dashed rgba(30,155,240,0.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28}}>👥</div>}
            <label style={{position:'absolute',bottom:0,right:0,background:TXT,border:'none',borderRadius:'50%',width:26,height:26,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:12,color:'#fff'}}>
              +<input type="file" accept="image/*" onChange={pickImg} style={{display:'none'}}/>
            </label>
          </div>
          <div style={{fontSize:11,color:MUTED,marginTop:8}}>Foto del equipo (opcional)</div>
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div>
            <div style={{fontSize:11,fontWeight:500,color:MUTED,marginBottom:5}}>Nombre del equipo *</div>
            <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Los escribidores del martes…" style={{width:'100%'}}/>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:500,color:MUTED,marginBottom:5}}>Descripción (opcional)</div>
            <textarea value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Un grupo de amigos que escriben juntos cada semana…" rows={3} style={{width:'100%',resize:'vertical'}}/>
          </div>
          {err&&<div style={{fontSize:12,color:'#C5221F',padding:'8px 11px',background:'rgba(197,34,31,0.06)',borderRadius:7}}>{err}</div>}
          <Btn variant="primary" onClick={create} disabled={loading||!name.trim()} full style={{height:44,fontSize:14}}>
            {loading?'Creando…':'Crear equipo →'}
          </Btn>
        </div>
      </div>
    </div>
  );
};

/* ─── INVITE PANEL ───────────────────────────────── */
const InvitePanel=({user,team,onBack})=>{
  const [email,setEmail]=useState('');
  const [invLink,setInvLink]=useState('');
  const [status,setStatus]=useState('');
  const [loading,setLoading]=useState(false);

  const baseUrl=window.location.origin+window.location.pathname;

  const genLink=async()=>{
    setLoading(true);setStatus('');
    try{
      const inv=await DB.createInvitation(team.id,null,user.id);
      const link=baseUrl+'?team='+inv.code;
      setInvLink(link);
    }catch(e){setStatus('Error: '+e.message);}
    finally{setLoading(false);}
  };

  const copyLink=()=>{
    navigator.clipboard?.writeText(invLink).then(()=>setStatus('¡Enlace copiado!')).catch(()=>{
      prompt('Copia este enlace:',invLink);
    });
  };

  const sendByEmail=async()=>{
    if(!email.trim()){setStatus('Introduce un email');return;}
    setLoading(true);setStatus('');
    try{
      const inv=await DB.createInvitation(team.id,email.trim(),user.id);
      const link=baseUrl+'?team='+inv.code;
      const subject=encodeURIComponent(user.name+' te invita al equipo "'+team.name+'" en Pretexto');
      const body=encodeURIComponent('Hola,\n\n'+user.name+' te ha invitado a unirte al equipo "'+team.name+'" en Pretexto, un editor de escritura creativa.\n\nEntra con este enlace:\n'+link+'\n\nHasta pronto,\nEl equipo Pretexto');
      window.open('mailto:'+email.trim()+'?subject='+subject+'&body='+body);
      setStatus('¡Invitación preparada para '+email+'!');
      setEmail('');
    }catch(e){setStatus('Error: '+e.message);}
    finally{setLoading(false);}
  };

  return(
    <div style={{position:'fixed',inset:0,background:PAGE_BG,zIndex:200,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',padding:'0 20px',height:52,background:'var(--topbar-bg,#fff)',borderBottom:'1px solid '+BDR,flexShrink:0,gap:10}}>
        <button onClick={onBack} style={{background:'transparent',border:'none',cursor:'pointer',color:MUTED,fontSize:13}}>← Volver</button>
        <div style={{fontSize:15,fontWeight:700,color:TXT,fontFamily:'"Playfair Display",serif'}}>Invitar al equipo</div>
      </div>
      <div style={{flex:1,overflowY:'auto',maxWidth:500,width:'100%',margin:'0 auto',padding:'28px 20px 48px',display:'flex',flexDirection:'column',gap:16}}>
        {/* Link */}
        <div style={{background:CARD_BG,border:'1px solid '+BDR,borderRadius:12,padding:'18px 20px'}}>
          <div style={{fontSize:14,fontWeight:700,color:TXT,marginBottom:5,fontFamily:'"Playfair Display",serif'}}>Enlace de invitación</div>
          <div style={{fontSize:12,color:MUTED,marginBottom:14,lineHeight:1.6}}>Genera un enlace único y compártelo con quien quieras. Cada enlace es de un solo uso.</div>
          {invLink
            ?<div style={{display:'flex',gap:8,alignItems:'center'}}>
              <div style={{flex:1,background:'rgba(10,27,61,0.04)',borderRadius:8,padding:'8px 10px',fontSize:11,wordBreak:'break-all',color:MUTED,fontFamily:"'Courier New',monospace"}}>{invLink}</div>
              <button onClick={copyLink} style={{background:ADVANCE_BG,border:'none',borderRadius:8,padding:'8px 12px',fontSize:12,fontWeight:600,color:ADVANCE_TXT,cursor:'pointer',flexShrink:0}}>Copiar</button>
            </div>
            :<Btn onClick={genLink} disabled={loading} variant="primary">{loading?'Generando…':'Generar enlace'}</Btn>}
        </div>

        {/* Email */}
        <div style={{background:CARD_BG,border:'1px solid '+BDR,borderRadius:12,padding:'18px 20px'}}>
          <div style={{fontSize:14,fontWeight:700,color:TXT,marginBottom:5,fontFamily:'"Playfair Display",serif'}}>Invitar por email</div>
          <div style={{fontSize:12,color:MUTED,marginBottom:12,lineHeight:1.6}}>Se abrirá tu cliente de correo con el mensaje preparado.</div>
          <div style={{display:'flex',gap:8}}>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')sendByEmail()}} placeholder="email@ejemplo.com" style={{flex:1}}/>
            <button onClick={sendByEmail} disabled={loading||!email.trim()} style={{background:TXT,border:'none',borderRadius:7,padding:'8px 14px',fontSize:12,fontWeight:500,color:'#fff',cursor:'pointer',flexShrink:0,opacity:loading||!email.trim()?0.5:1}}>Enviar</button>
          </div>
        </div>

        {status&&<div style={{fontSize:12,color:status.startsWith('Error')?'#C5221F':'#1E9BF0',padding:'9px 12px',background:status.startsWith('Error')?'rgba(197,34,31,0.06)':'rgba(30,155,240,0.07)',borderRadius:8,border:'0.5px solid '+(status.startsWith('Error')?'rgba(197,34,31,0.2)':'rgba(30,155,240,0.2)')}}>{status}</div>}
      </div>
    </div>
  );
};

/* ─── TEAM DETAIL ────────────────────────────────── */
const TeamDetail=({user,team,onBack,onInvite})=>{
  const [members,setMembers]=useState([]);
  const [challenges,setChallenges]=useState([]);
  const [teamEntries,setTeamEntries]=useState([]);
  const [myEntries,setMyEntries]=useState([]);
  const [tab,setTab]=useState('reto'); // 'reto'|'miembros'
  const [showPropose,setShowPropose]=useState(false);
  const [proposalTitle,setProposalTitle]=useState('');
  const [proposalDesc,setProposalDesc]=useState('');
  const [loading,setLoading]=useState(true);
  const [sharing,setSharing]=useState(null);
  const [readingModal,setReadingModal]=useState(null); // entry being shared

  const activeChallenge=challenges.find(c=>c.active);
  const weekNum=Math.floor(Date.now()/(7*24*3600*1000));
  const myTurnIdx=weekNum%Math.max(members.length,1);
  const membersSorted=[...members].sort((a,b)=>a.joined_at>b.joined_at?1:-1);
  const myTurnMember=membersSorted[myTurnIdx];
  const isMyTurn=myTurnMember?.user_id===user.id;

  useEffect(()=>{
    const load=async()=>{
      setLoading(true);
      try{
        const [m,c,te]=await Promise.all([
          DB.getGroupMembers(team.id),
          DB.getGroupChallenges(team.id),
          DB.getTeamEntries(team.id),
        ]);
        setMembers(m);setChallenges(c);setTeamEntries(te);
        // My own unshared entries for sharing
        const session=await DB.getSession();
        if(session){
          const myE=await DB.getEntries(session.user.id);
          setMyEntries(myE.filter(e=>!e.shared_group_id).slice(0,20));
        }
      }catch(e){console.error(e);}
      finally{setLoading(false);}
    };
    load();
  },[team.id]);

  const propose=async()=>{
    if(!proposalTitle.trim())return;
    try{
      const ch=await DB.proposeChallenge({
        group_id:team.id,proposed_by:user.id,
        title:proposalTitle.trim(),description:proposalDesc.trim(),
        week_number:weekNum,proposer_name:user.name,active:true,
      });
      // Deactivate others
      await DB.activateChallenge(ch.id,team.id);
      setChallenges(prev=>[{...ch,active:true,profiles:{name:user.name}},...prev.map(c=>({...c,active:false}))]);
      setShowPropose(false);setProposalTitle('');setProposalDesc('');
    }catch(e){alert('Error: '+e.message);}
  };

  const shareEntry=async(entry)=>{
    try{
      await DB.shareEntry(entry.id,team.id);
      setTeamEntries(prev=>[{...entry,shared_group_id:team.id,profiles:{name:user.name,initials:user.initials,accent:user.accent,bg:user.bg}},...prev]);
      setMyEntries(prev=>prev.filter(e=>e.id!==entry.id));
      setSharing(null);
    }catch(e){alert('Error: '+e.message);}
  };

  return(
    <div style={{position:'fixed',inset:0,background:PAGE_BG,zIndex:200,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {readingModal&&<ReadingModal entry={readingModal} user={user} onClose={()=>setReadingModal(null)}/>}
      {/* Share modal */}
      {sharing&&<div style={{position:'fixed',inset:0,background:'rgba(10,27,61,0.5)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:20}} onClick={e=>{if(e.target===e.currentTarget)setSharing(null)}}>
        <div className="fi" style={{background:CARD_BG,borderRadius:14,width:'100%',maxWidth:440,maxHeight:'80vh',overflow:'hidden',display:'flex',flexDirection:'column',boxShadow:'0 16px 50px -16px rgba(10,27,61,0.3)'}}>
          <div style={{padding:'16px 20px',borderBottom:'1px solid '+BDR,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontSize:15,fontWeight:700,color:TXT,fontFamily:'"Playfair Display",serif'}}>Compartir con el equipo</div>
            <button onClick={()=>setSharing(null)} style={{background:'transparent',border:'none',fontSize:20,color:MUTED,cursor:'pointer'}}>×</button>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:16,display:'flex',flexDirection:'column',gap:8}}>
            {myEntries.length===0&&<p style={{fontSize:13,color:MUTED,textAlign:'center',padding:20}}>No tienes textos sin compartir aún.</p>}
            {myEntries.map(e=>(
              <button key={e.id} onClick={()=>shareEntry(e)} style={{background:'#F9F8F5',border:'0.5px solid '+BDR,borderRadius:9,padding:'10px 14px',cursor:'pointer',textAlign:'left',display:'flex',gap:10,alignItems:'center'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500,color:TXT,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.title||'Sin título'}</div>
                  <div style={{fontSize:11,color:MUTED}}>{e.date} · {e.word_count||0} palabras</div>
                </div>
                <span style={{fontSize:11,color:'#1E9BF0',fontWeight:500}}>Compartir →</span>
              </button>
            ))}
          </div>
        </div>
      </div>}

      <div style={{display:'flex',alignItems:'center',padding:'0 20px',height:52,background:'var(--topbar-bg,#fff)',borderBottom:'1px solid '+BDR,flexShrink:0,gap:10}}>
        <button onClick={onBack} style={{background:'transparent',border:'none',cursor:'pointer',color:MUTED,fontSize:13}}>← Equipos</button>
        <TeamAvatar team={team} size={26}/>
        <div style={{fontSize:15,fontWeight:700,color:TXT,fontFamily:'"Playfair Display",serif',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{team.name}</div>
        <button onClick={onInvite} style={{background:'rgba(30,155,240,0.08)',border:'1px solid rgba(30,155,240,0.25)',borderRadius:7,padding:'5px 11px',fontSize:11,fontWeight:600,color:AZUL,cursor:'pointer'}}>+ Invitar</button>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',background:'var(--topbar-bg,#fff)',borderBottom:'1px solid '+BDR,padding:'0 20px'}}>
        {[['reto','Reto semanal'],['miembros','Miembros ('+members.length+')']].map(([t,l])=>(
          <button key={t} onClick={()=>setTab(t)} style={{background:'transparent',border:'none',borderBottom:tab===t?'2px solid '+NAVY:'2px solid transparent',padding:'10px 14px',fontSize:13,fontWeight:tab===t?600:400,color:tab===t?TXT:MUTED,cursor:'pointer',marginBottom:-1,fontFamily:"'Source Sans 3',sans-serif"}}>{l}</button>
        ))}
      </div>

      <div style={{flex:1,overflowY:'auto',maxWidth:680,width:'100%',margin:'0 auto',padding:'20px 16px 48px'}}>
        {loading&&<div style={{textAlign:'center',padding:40,color:MUTED,fontSize:13}}>Cargando…</div>}

        {!loading&&tab==='reto'&&<>
          {/* Active challenge */}
          {activeChallenge?(
            <div className="fu" style={{background:CARD_BG,border:'1px solid '+BDR,borderRadius:14,overflow:'hidden',marginBottom:16,position:'relative'}}>
              <div style={{height:4,background:NARANJA}}/>
              <Signo char="!" size={110} top={-14} right={2} color="naranja"/>
              <div style={{padding:'18px 20px',position:'relative',zIndex:1}}>
                <div style={{fontSize:10,fontWeight:600,color:NARANJA,textTransform:'uppercase',letterSpacing:'.24em',marginBottom:8}}>Reto de esta semana · propuesto por {activeChallenge.proposer_name||activeChallenge.profiles?.name||'?'}</div>
                <div style={{fontSize:19,fontWeight:700,color:TXT,fontFamily:'"Playfair Display",serif',marginBottom:8,letterSpacing:'-0.01em'}}>{activeChallenge.title}</div>
                {activeChallenge.description&&<p style={{fontSize:13,color:MUTED,lineHeight:1.75,marginBottom:0}}>{activeChallenge.description}</p>}
              </div>
            </div>
          ):(
            <div className="fu" style={{background:'rgba(27,95,170,0.05)',border:'1px solid rgba(27,95,170,0.2)',borderRadius:14,padding:'18px 20px',marginBottom:16,textAlign:'center'}}>
              <div style={{fontSize:13,color:AZULMED,marginBottom:8}}>No hay reto activo esta semana.</div>
              {isMyTurn&&<div style={{fontSize:12,color:MUTED}}>Es tu turno de proponer el reto.</div>}
            </div>
          )}

          {/* Propose challenge */}
          {isMyTurn&&!showPropose&&<div style={{marginBottom:16}}>
            <Btn onClick={()=>setShowPropose(true)} variant="primary" full>{activeChallenge?'Cambiar reto':'Proponer reto de la semana'}</Btn>
          </div>}
          {showPropose&&<div className="fu" style={{background:CARD_BG,border:'1px solid rgba(30,155,240,0.3)',borderRadius:12,padding:'16px 18px',marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:500,color:TXT,marginBottom:10}}>Proponer reto</div>
            <input type="text" value={proposalTitle} onChange={e=>setProposalTitle(e.target.value)} placeholder="Título del reto…" style={{width:'100%',marginBottom:10}}/>
            <textarea value={proposalDesc} onChange={e=>setProposalDesc(e.target.value)} placeholder="Descripción, instrucciones, ejemplos…" rows={4} style={{width:'100%',resize:'vertical',marginBottom:10}}/>
            <div style={{display:'flex',gap:8}}>
              <Btn onClick={()=>setShowPropose(false)} variant="ghost" small>Cancelar</Btn>
              <Btn onClick={propose} variant="primary" disabled={!proposalTitle.trim()} small>Publicar reto</Btn>
            </div>
          </div>}

          {/* Team entries */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:500,color:FAINT,textTransform:'uppercase',letterSpacing:'.08em'}}>Textos del equipo ({teamEntries.length})</div>
            <button onClick={()=>setSharing(true)} style={{background:'rgba(30,155,240,0.08)',border:'0.5px solid rgba(30,155,240,0.25)',borderRadius:6,padding:'3px 10px',fontSize:11,color:'#1E9BF0',cursor:'pointer'}}>+ Compartir un texto</button>
          </div>

          {teamEntries.length===0&&<div style={{textAlign:'center',padding:'28px 20px',color:MUTED,fontSize:13,background:CARD_BG,borderRadius:12,border:'1px solid '+BDR}}>
            Ningún miembro ha compartido textos todavía.<br/>
            <span style={{fontSize:12,color:FAINT}}>Pulsa "+ Compartir un texto" para añadir el tuyo.</span>
          </div>}

          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {teamEntries.map(e=>(
              <div key={e.id} style={{background:CARD_BG,border:'1px solid '+BDR,borderRadius:12,overflow:'hidden'}}>
                <div style={{padding:'12px 16px',display:'flex',gap:10,alignItems:'flex-start'}}>
                  <div style={{width:32,height:32,borderRadius:'50%',background:e.profiles?.bg||'rgba(0,0,0,0.07)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:600,color:e.profiles?.accent||MUTED,flexShrink:0}}>{e.profiles?.initials||'?'}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:2}}>
                      <span style={{fontSize:12,fontWeight:500,color:TXT}}>{e.profiles?.name||'Miembro'}</span>
                      <span style={{fontSize:10,color:FAINT}}>{e.date}</span>
                    </div>
                    <div style={{fontSize:13,fontWeight:500,color:TXT,marginBottom:4}}>{e.title||'Sin título'}</div>
                    <div style={{fontSize:11,color:MUTED}}>{e.word_count||0} palabras · {(MODES.find(m=>m.id===e.mode)||MODES[0]).name}</div>
                  </div>
                </div>
                {e.plain&&<>
                  <div style={{padding:'0 16px 8px 58px',fontSize:12,color:MUTED,lineHeight:1.7,fontStyle:'italic',overflow:'hidden',display:'-webkit-box',WebkitLineClamp:3,WebkitBoxOrient:'vertical'}}>{e.plain.slice(0,300)}</div>
                  <div style={{padding:'0 16px 12px 58px'}}><button onClick={()=>setReadingModal(e)} style={{background:'transparent',border:'0.5px solid '+BDR,borderRadius:6,padding:'3px 10px',fontSize:11,color:MUTED,cursor:'pointer'}}>Leer completo</button></div>
                </>}
              </div>
            ))}
          </div>
        </>}

        {!loading&&tab==='miembros'&&<div style={{display:'flex',flexDirection:'column',gap:10}}>
          {membersSorted.map((m,i)=>{
            const isTurn=i===myTurnIdx;
            return<div key={m.user_id} style={{background:CARD_BG,border:'1px solid '+(isTurn?'rgba(27,95,170,0.4)':BDR),borderRadius:12,padding:'12px 16px',display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:38,height:38,borderRadius:'50%',background:m.profiles?.bg||'rgba(0,0,0,0.07)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:600,color:m.profiles?.accent||MUTED,flexShrink:0}}>{m.profiles?.initials||'?'}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:TXT}}>{m.profiles?.name||'Miembro'}</div>
                <div style={{fontSize:11,color:MUTED}}>{m.role==='admin'?'Admin':m.user_id===user.id?'Tú':'Miembro'}</div>
              </div>
              {isTurn&&<span style={{fontSize:11,color:AZULMED,fontWeight:600,background:'rgba(27,95,170,0.09)',border:'1px solid rgba(27,95,170,0.25)',borderRadius:6,padding:'3px 9px'}}>✎ turno esta semana</span>}
            </div>;
          })}
        </div>}
      </div>
    </div>
  );
};


/* ─── STATS CHART ────────────────────────────────── */
const StatsChart=({library})=>{
  const weeks=12;
  const now=new Date();
  const data=Array.from({length:weeks},(_,i)=>{
    const weekStart=new Date(now);
    weekStart.setDate(now.getDate()-(weeks-1-i)*7);
    weekStart.setHours(0,0,0,0);
    const weekEnd=new Date(weekStart);
    weekEnd.setDate(weekStart.getDate()+7);
    const label=weekStart.getDate()+'/'+(weekStart.getMonth()+1);
    const words=library.filter(e=>{
      const d=new Date(e.date);
      return d>=weekStart&&d<weekEnd;
    }).reduce((s,e)=>s+(e.word_count||e.wordCount||0),0);
    const sessions=library.filter(e=>{
      const d=new Date(e.date);
      return d>=weekStart&&d<weekEnd;
    }).length;
    return{label,words,sessions,isCurrentWeek:i===weeks-1};
  });
  const maxWords=Math.max(...data.map(d=>d.words),1);
  const totalWords=library.reduce((s,e)=>s+(e.word_count||e.wordCount||0),0);
  const avgWordsPerSession=library.length?Math.round(totalWords/library.length):0;

  return(
    <div style={{background:CARD_BG,border:'1px solid '+BDR,borderRadius:14,padding:'18px 20px',marginBottom:16}}>
      <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:500,color:TXT}}>Palabras por semana</div>
        <div style={{fontSize:11,color:MUTED}}>últimas 12 semanas</div>
      </div>
      {/* Bar chart */}
      <div style={{display:'flex',alignItems:'flex-end',gap:4,height:80,marginBottom:8}}>
        {data.map((d,i)=>{
          const h=maxWords>0?Math.max(2,(d.words/maxWords)*80):2;
          return(
            <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
              <div title={d.words+' palabras · '+d.sessions+' sesiones'} style={{
                width:'100%',height:h,
                background:d.isCurrentWeek?NARANJA:d.words>0?'rgba(30,155,240,0.35)':'rgba(10,27,61,0.06)',
                borderRadius:'3px 3px 0 0',
                transition:'height 0.4s ease',
                cursor:'default',
                minHeight:2,
              }}/>
            </div>
          );
        })}
      </div>
      {/* X axis labels — only show a few */}
      <div style={{display:'flex',gap:4}}>
        {data.map((d,i)=>(
          <div key={i} style={{flex:1,textAlign:'center',fontSize:9,color:d.isCurrentWeek?NARANJA:FAINT}}>
            {i===0||i===3||i===6||i===9||i===11?d.label:''}
          </div>
        ))}
      </div>
      {/* Summary stats */}
      <div style={{display:'flex',gap:16,marginTop:14,paddingTop:12,borderTop:'0.5px solid '+BDR}}>
        {[
          {l:'Total palabras',v:totalWords>=1000?(totalWords/1000).toFixed(1)+'k':totalWords},
          {l:'Sesiones',v:library.length},
          {l:'Media por sesión',v:avgWordsPerSession+' pal.'},
        ].map(s=>(
          <div key={s.l}>
            <div style={{fontSize:16,fontWeight:600,color:TXT,letterSpacing:'-0.02em'}}>{s.v}</div>
            <div style={{fontSize:10,color:FAINT}}>{s.l}</div>
          </div>
        ))}
      </div>
    </div>
  );
};


/* ─── READING MODAL (with comments + ratings) ───────────────── */
const ReadingModal=({entry,user,onClose,onVisibilityChange})=>{
  const [comments,setComments]=useState([]);
  const [ratings,setRatings]=useState([]);
  const [reactions,setReactions]=useState([]);
  const [vis,setVis]=useState(entry.visibility||'privado');
  const [myRating,setMyRating]=useState(0);
  const [hoverRating,setHoverRating]=useState(0);
  const [commentText,setCommentText]=useState('');
  const [submitting,setSubmitting]=useState(false);
  const [loadingData,setLoadingData]=useState(true);

  // Can the user interact? (not their own text, and user is logged in)
  const isOwn=entry.user_id===user?.id;
  const canInteract=user&&!isOwn&&entry.visibility!=='privado';

  useEffect(()=>{
    const load=async()=>{
      setLoadingData(true);
      try{
        const [c,r,rx]=await Promise.all([
          DB.getComments(entry.id),
          DB.getRatings(entry.id),
          DB.getReactions(entry.id).catch(()=>[]),
        ]);
        setComments(c);
        setRatings(r);
        setReactions(rx);
        if(user){
          const mine=r.find(x=>x.user_id===user.id);
          if(mine)setMyRating(mine.rating);
        }
      }catch(e){console.error(e);}
      setLoadingData(false);
    };
    load();
  },[entry.id]);

  const avgRating=ratings.length?Math.round(ratings.reduce((s,r)=>s+r.rating,0)/ratings.length*10)/10:null;

  const handleRating=async(r)=>{
    if(!canInteract)return;
    setMyRating(r);
    try{await DB.upsertRating(entry.id,user.id,r);}
    catch(e){console.error(e);}
    // Refresh ratings
    try{const rs=await DB.getRatings(entry.id);setRatings(rs);}catch(e){}
  };

  const handleComment=async()=>{
    if(!commentText.trim()||!canInteract)return;
    setSubmitting(true);
    try{
      await DB.addComment(entry.id,user.id,user.name||'Usuario',commentText.trim());
      setCommentText('');
      const c=await DB.getComments(entry.id);setComments(c);
    }catch(e){console.error(e);}
    setSubmitting(false);
  };

  const handleDeleteComment=async(id)=>{
    try{
      await DB.deleteComment(id);
      setComments(prev=>prev.filter(c=>c.id!==id));
    }catch(e){console.error(e);}
  };

  const handleReaction=async(emoji)=>{
    if(!canInteract)return;
    try{
      const added=await DB.toggleReaction(entry.id,user.id,emoji);
      setReactions(prev=>added?[...prev,{emoji,user_id:user.id}]:prev.filter(r=>!(r.emoji===emoji&&r.user_id===user.id)));
    }catch(e){console.error(e);}
  };

  const cycleVis=async()=>{
    const cycle={privado:'amigos',amigos:'abierto',abierto:'privado'};
    const next=cycle[vis]||'privado';
    setVis(next);
    try{
      await DB.updateVisibility(entry.id,next);
      onVisibilityChange&&onVisibilityChange(entry.id,next);
    }catch(e){console.error(e);}
  };

  const Stars=({value,hover,onHover,onLeave,onClick,readonly})=>(
    <div style={{display:'flex',gap:3}}>
      {[1,2,3,4,5].map(i=>(
        <span key={i}
          style={{fontSize:readonly?14:18,cursor:readonly?'default':'pointer',color:i<=(hover||value)?NARANJA:BDR,transition:'color 0.1s'}}
          onMouseEnter={!readonly?()=>onHover(i):undefined}
          onMouseLeave={!readonly?onLeave:undefined}
          onClick={!readonly?()=>onClick(i):undefined}>★</span>
      ))}
    </div>
  );

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(10,27,61,0.5)',zIndex:300,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'24px 16px',overflowY:'auto'}}>
      <div style={{background:CARD_BG,borderRadius:16,width:'100%',maxWidth:640,padding:'28px 28px 24px',position:'relative',boxShadow:'0 24px 60px -16px rgba(10,27,61,0.3)'}}>
        <button onClick={onClose} style={{position:'absolute',top:16,right:16,background:'transparent',border:'none',fontSize:18,cursor:'pointer',color:MUTED}}>✕</button>

        {/* Entry header */}
        <div style={{marginBottom:20}}>
          <div style={{fontSize:10,fontWeight:500,color:MUTED,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:4}}>
            {entry.session_label||entry.sessionLabel||entry.sk||'Texto'} · {fmtDate(entry.date)}
          </div>
          <div style={{fontSize:20,fontWeight:700,color:TXT,letterSpacing:'-0.02em',marginBottom:6}}>{entry.title||'Sin título'}</div>
          {!loadingData&&(
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:2}}>
              {avgRating&&<div style={{display:'flex',alignItems:'center',gap:5}}>
                <Stars value={Math.round(avgRating)} readonly/>
                <span style={{fontSize:11,color:MUTED}}>{avgRating}/5 ({ratings.length} valoración{ratings.length!==1?'es':''})</span>
              </div>}
              <span style={{fontSize:11,color:FAINT}}>{entry.word_count||entry.wordCount||0} palabras</span>
              {isOwn&&(
                <button onClick={cycleVis} title="Cambiar visibilidad"
                  style={{display:'flex',alignItems:'center',gap:5,border:'0.5px solid '+BDR,borderRadius:14,padding:'3px 10px',background:'rgba(0,0,0,0.03)',cursor:'pointer',fontSize:11,fontWeight:500}}>
                  <span>{vis==='privado'?'🔒 Privado':vis==='amigos'?'👥 Amigos':'🌐 Público'}</span>
                  <span style={{color:FAINT,fontSize:9}}>→ {vis==='privado'?'Amigos':vis==='amigos'?'Público':'Privado'}</span>
                </button>
              )}
            </div>
          )}
        </div>

        {/* Text content */}
        <div style={{fontSize:15,lineHeight:1.75,color:TXT,fontFamily:`${FONTS[entry.font_idx||entry.fontIdx||0]?.value||'inherit'}`,marginBottom:24,borderTop:'0.5px solid '+BDR,paddingTop:20}}
          dangerouslySetInnerHTML={{__html:entry.html||entry.plain?.replace(/\n/g,'<br>')||''}}/> 

        {/* Reactions row */}
        {(canInteract||reactions.length>0)&&(
          <div style={{display:'flex',gap:8,marginBottom:16,alignItems:'center'}}>
            {['👏','❤️','🔥'].map(emoji=>{
              const count=reactions.filter(r=>r.emoji===emoji).length;
              const mine=user&&reactions.some(r=>r.emoji===emoji&&r.user_id===user.id);
              return(
                <button key={emoji} onClick={()=>handleReaction(emoji)}
                  disabled={!canInteract}

/* ─── PROFILE SETTINGS ───────────────────────────── */
const ProfileSettings=({user,onClose,onSave})=>{
  const [avatar,setAvatar]=useState(user.avatar||null);
  const [name,setName]=useState(user.name||'');
  const [username,setUsername]=useState(user.username||'');
  const [checking,setChecking]=useState(false);
  const [usernameOk,setUsernameOk]=useState(true);
  const [usernameMsg,setUsernameMsg]=useState('');
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');

  const pickAvatar=e=>{
    const file=e.target.files[0];if(!file)return;
    if(file.size>800000){setErr('La imagen debe pesar menos de 800KB');return;}
    const reader=new FileReader();
    reader.onload=ev=>{
      // Compress to max ~300KB by drawing on canvas
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const MAX=400;
        let w=img.width,h=img.height;
        if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}
        else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        setAvatar(canvas.toDataURL('image/jpeg',0.82));
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const checkUsername=async(val)=>{
    setUsername(val);setUsernameOk(false);setUsernameMsg('');
    if(val===user.username){setUsernameOk(true);return;}
    if(val.length<3){setUsernameMsg('Mínimo 3 caracteres');return;}
    if(!/^[a-z0-9_]+$/.test(val)){setUsernameMsg('Solo letras minúsculas, números y _');return;}
    setChecking(true);
    try{
      const r=await DB.searchByUsername(val);
      const taken=r.find(u=>u.username===val&&u.id!==user.id);
      if(taken){setUsernameMsg('Ya está en uso');}
      else{setUsernameMsg('✓ Disponible');setUsernameOk(true);}
    }catch(e){}
    finally{setChecking(false);}
  };

  const save=async()=>{
    if(!name.trim()){setErr('El nombre no puede estar vacío');return;}
    setSaving(true);setErr('');
    try{
      const updates={name:name.trim(),avatar:avatar||null};
      if(username!==user.username&&usernameOk)updates.username=username;
      await getSB().from('profiles').update(updates).eq('id',user.id);
      onSave({...user,...updates});
      onClose();
    }catch(e){setErr(e.message);}
    finally{setSaving(false);}
  };

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(10,27,61,0.5)',zIndex:250,display:'flex',alignItems:'center',justifyContent:'center',padding:20}} onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="fi" style={{background:CARD_BG,borderRadius:16,width:'100%',maxWidth:400,maxHeight:'90vh',overflow:'auto',boxShadow:'0 16px 50px -16px rgba(10,27,61,0.35)'}}>
        <div style={{padding:'16px 20px',borderBottom:'1px solid '+BDR,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontSize:16,fontWeight:700,color:TXT,fontFamily:'"Playfair Display",serif'}}>Editar perfil</div>
          <button onClick={onClose} style={{background:'transparent',border:'none',fontSize:20,color:MUTED,cursor:'pointer'}}>×</button>
        </div>
        <div style={{padding:'20px',display:'flex',flexDirection:'column',gap:16}}>
          {/* Avatar */}
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>
            <div style={{position:'relative'}}>
              <UserAvatar user={{...user,avatar}} size={80}/>
              <label style={{position:'absolute',bottom:0,right:0,width:26,height:26,borderRadius:'50%',background:ADVANCE_BG,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:13,color:ADVANCE_TXT,border:'2px solid '+CARD_BG}}>
                📷<input type="file" accept="image/*" onChange={pickAvatar} style={{display:'none'}}/>
              </label>
            </div>
            {avatar&&avatar!==user.avatar&&<button onClick={()=>setAvatar(null)} style={{background:'transparent',border:'none',fontSize:11,color:MUTED,cursor:'pointer'}}>Quitar foto</button>}
            <div style={{fontSize:11,color:FAINT}}>Máx. 800KB · Se comprime automáticamente</div>
          </div>

          {/* Name */}
          <div>
            <div style={{fontSize:11,fontWeight:500,color:MUTED,marginBottom:5}}>Nombre</div>
            <input type="text" value={name} onChange={e=>setName(e.target.value)} style={{width:'100%'}}/>
          </div>

          {/* Username */}
          <div>
            <div style={{fontSize:11,fontWeight:500,color:MUTED,marginBottom:5}}>@Usuario</div>
            <div style={{display:'flex',alignItems:'center',gap:4}}>
              <span style={{fontSize:14,color:MUTED,fontWeight:500}}>@</span>
              <input type="text" value={username} onChange={e=>checkUsername(e.target.value.toLowerCase().replace(/[^a-z0-9_]/g,''))} style={{flex:1}}/>
            </div>
            {usernameMsg&&<div style={{fontSize:11,marginTop:4,color:usernameMsg.startsWith('✓')?'#1E9BF0':'#1B5FAA'}}>{checking?'Comprobando…':usernameMsg}</div>}
          </div>

          {err&&<div style={{fontSize:12,color:'#C5221F',padding:'8px 11px',background:'rgba(197,34,31,0.06)',borderRadius:7}}>{err}</div>}

          <div style={{display:'flex',gap:8}}>
            <Btn onClick={onClose} variant="ghost" full>Cancelar</Btn>
            <Btn onClick={save} variant="primary" disabled={saving||!name.trim()} full>{saving?'Guardando…':'Guardar cambios'}</Btn>
          </div>
        </div>
      </div>
    </div>
  );
};

                        setAddingToTeam(null);
                      }} style={{display:'flex',alignItems:'center',gap:8,width:'100%',background:'transparent',border:'none',padding:'9px 12px',cursor:'pointer',fontSize:12,color:TXT,borderBottom:'1px solid '+BDR}}>
                        <TeamAvatar team={t} size={20}/>
                        {t.name}
                      </button>
                    ))}
                  </div>}
                </div>}
              </div>
            </div>
          );
        })}

      {/* Following list */}
      {query.length===0&&following.length>0&&<>
        <div style={{fontSize:11,fontWeight:500,color:FAINT,textTransform:'uppercase',letterSpacing:'.07em',marginTop:4}}>A quién sigues</div>
        <div style={{fontSize:12,color:MUTED}}>Busca a alguien para ver su perfil y gestionar tu seguimiento.</div>

      {query.length===0&&following.length===0&&<div style={{textAlign:'center',padding:'24px 16px'}}>
        <div style={{fontSize:28,marginBottom:10}}>🔍</div>
        <div style={{fontSize:13,fontWeight:500,color:TXT,marginBottom:6}}>Busca escritores</div>
        <div style={{fontSize:12,color:MUTED,lineHeight:1.65}}>Escribe un nombre o @usuario para encontrar a alguien. Puedes seguirles para ver sus textos "Amigos" o invitarles a un equipo.</div>
      </div>}
    </div>
  );
};

/* ─── MIS TEXTOS ─────────────────────────────────── */
const MisTextos=({user,library,onVisibilityChange})=>{
  const [filter,setFilter]=useState('all');
  const [updating,setUpdating]=useState(null);
  const [readEntry,setReadEntry]=useState(null);
  const [activity,setActivity]=useState({});

  const myTexts=library.filter(e=>e.visibility!=='ejercicio');
  const filtered=myTexts.filter(e=>filter==='all'||e.visibility===filter||(!e.visibility&&filter==='privado'));

  // Carga comentarios/reacciones para los textos no-privados (igual que en Explorar)
  useEffect(()=>{
    const publicIds=myTexts.filter(e=>e.visibility&&e.visibility!=='privado').map(e=>e.id);
    if(!publicIds.length)return;
    DB.getActivityForEntries(publicIds).then(setActivity).catch(()=>{});
  },[myTexts.map(e=>e.id+e.visibility).join(',')]);

  const changeVis=async(entry,vis)=>{
    setUpdating(entry.id);
    try{
      await DB.updateVisibility(entry.id,vis);
      onVisibilityChange(entry.id,vis);
    }catch(e){alert('Error: '+e.message);}
    finally{setUpdating(null);}
  };

  const relTime=iso=>{
    if(!iso)return'';
    const d=new Date(iso?.slice?.(0,10)||iso);
    const days=Math.floor((Date.now()-d.getTime())/864e5);
    if(days<=0)return'hoy';
    if(days===1)return'hace 1 día';
    if(days<7)return'hace '+days+' días';
    if(days<14)return'1 semana';
    if(days<30)return Math.floor(days/7)+' semanas';
    if(days<60)return'1 mes';
    return Math.floor(days/30)+' meses';
  };

  // Igual que en la referencia: Privado = gris discreto, Amigos = azul medio, Público = naranja (énfasis)
  const VIS_META={
    privado:{label:'Privado',color:MUTED,bg:'rgba(10,27,61,0.06)',signo:';',signoColor:'navy'},
    amigos:{label:'Amigos',color:AZULMED,bg:'rgba(27,95,170,0.1)',signo:',',signoColor:'azul'},
    abierto:{label:'Público',color:NARANJA,bg:'rgba(241,90,36,0.1)',signo:'\u201c',signoColor:'naranja'},
  };

  const FILTERS=[['all','Todos'],['privado','Privados'],['amigos','Amigos'],['abierto','Abiertos']];

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      {readEntry&&<ReadingModal entry={readEntry} user={user} onClose={()=>setReadEntry(null)}/>}

      {/* Filter pills */}
      <div style={{display:'flex',gap:7,padding:'14px 16px 12px',flexShrink:0,flexWrap:'wrap'}}>
        {FILTERS.map(([v,l])=>{
          const count=myTexts.filter(e=>v==='all'||e.visibility===v||(!e.visibility&&v==='privado')).length;
          const active=filter===v;
          return(
            <button key={v} onClick={()=>setFilter(v)} style={{
              background:active?NAVY:'rgba(10,27,61,0.06)',
              color:active?'#fff':MUTED,
              border:'none',borderRadius:8,padding:'7px 14px',
              fontSize:11,fontWeight:600,cursor:'pointer',
              fontFamily:"'Source Sans 3',sans-serif",
              display:'flex',alignItems:'center',gap:5,
            }}>
              {l}{count>0&&<span style={{opacity:active?0.75:0.6,fontSize:10}}>({count})</span>}
            </button>
          );
        })}
      </div>

      {/* Grid de tarjetas — 3 columnas como en la referencia */}
      <div style={{flex:1,overflowY:'auto',padding:'4px 16px 24px'}}>
        {filtered.length===0&&<div style={{textAlign:'center',padding:32,color:MUTED,fontSize:13}}>No hay textos en esta categoría.</div>}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:14}}>
          {filtered.map(e=>{
            const vis=e.visibility||'privado';
            const meta=VIS_META[vis];
            const isUpdating=updating===e.id;
            const excerpt=(e.plain||'').slice(0,100);
            const isPublic=vis!=='privado';
            const act=activity[e.id];
            return(
              <div key={e.id} onClick={()=>setReadEntry(e)} style={{position:'relative',overflow:'hidden',background:CARD_BG,border:'1px solid '+BDR,borderRadius:13,padding:'16px',cursor:'pointer',display:'flex',flexDirection:'column',minHeight:165}}>
                <Signo char={meta.signo} size={60} top={-12} right={10} color={meta.signoColor}/>

                <div style={{position:'relative',display:'flex',flexDirection:'column',flex:1}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8,gap:6}}>
                    <span onClick={e2=>{
                        e2.stopPropagation();
                        if(isUpdating)return;
                        const cycle={privado:'amigos',amigos:'abierto',abierto:'privado'};
                        changeVis(e,cycle[vis]||'privado');
                      }}
                      title="Click para cambiar la visibilidad"
                      style={{font:"600 9px/1 'Source Sans 3'",letterSpacing:'.08em',textTransform:'uppercase',color:meta.color,background:meta.bg,padding:'4px 7px',borderRadius:5,whiteSpace:'nowrap',cursor:'pointer'}}>
                      {isUpdating?'…':meta.label}
                    </span>
                    <span style={{font:"500 11px/1 'Source Sans 3'",color:FAINT,whiteSpace:'nowrap'}}>{relTime(e.date)}</span>
                  </div>

                  <div style={{fontFamily:'"Playfair Display",serif',fontWeight:600,fontSize:16,lineHeight:1.28,color:TXT,marginBottom:6}}>{e.title||'Sin título'}</div>

                  {excerpt&&<div style={{fontSize:12.5,color:MUTED,lineHeight:1.5,marginBottom:10,flex:1,display:'-webkit-box',WebkitLineClamp:3,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{excerpt}</div>}
                  {!excerpt&&<div style={{flex:1}}/>}

                  <div style={{display:'flex',alignItems:'center'}}>
                    <span style={{font:"500 11px/1 'Source Sans 3'",color:FAINT}}>{e.word_count||e.wordCount||0} pal.</span>
                    {isPublic&&act&&(act.reactions>0||act.comments>0)&&<span style={{font:"500 11px/1 'Source Sans 3'",color:AZUL,marginLeft:'auto'}}>♥ {act.reactions} &nbsp;💬 {act.comments}</span>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

  const author=entry.profiles;
  const isMe=entry.user_id===currentUser?.id;
  const isFollowing=following.includes(entry.user_id);
  const catColor={check:AZUL,reto:NARANJA,proyecto:AZULMED,cuento:'#A82020',dueto:'#1A6B8A'}[entry.sk]||AZUL;

  return(
    <div style={{background:CARD_BG,border:'1px solid '+BDR,borderRadius:12,overflow:'hidden',position:'relative'}}>
      <div style={{height:3,background:catColor}}/>
      <Signo char="&rdquo;" size={70} top={2} right={10} color="azul"/>
      {/* Author */}
      <div style={{padding:'12px 16px 8px',display:'flex',alignItems:'center',gap:10,position:'relative',zIndex:1}}>
        <UserAvatar user={author} size={34}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:600,color:TXT}}>{author?.name||'Escritor'}</div>
          <div style={{fontSize:11,color:MUTED}}>@{author?.username||'?'} · {entry.date?.slice(0,10)||entry.date}</div>
        </div>
        {!isMe&&<button onClick={()=>onFollow(entry.user_id,isFollowing)} style={{background:isFollowing?'rgba(10,27,61,0.05)':'rgba(30,155,240,0.08)',border:'1px solid '+(isFollowing?BDR:'rgba(30,155,240,0.3)'),borderRadius:7,padding:'4px 10px',fontSize:11,fontWeight:600,color:isFollowing?MUTED:AZUL,cursor:'pointer',flexShrink:0}}>
          {isFollowing?'Siguiendo':'Seguir'}
        </button>}
      </div>
      {/* Text */}
      <div style={{padding:'0 16px 8px',position:'relative',zIndex:1}}>
        <div style={{fontSize:15,fontWeight:700,color:TXT,marginBottom:4,fontFamily:'"Playfair Display",serif',letterSpacing:'-0.01em'}}>{entry.title||'Sin título'}</div>
        <div style={{fontSize:12,color:MUTED,lineHeight:1.7,display:'-webkit-box',WebkitLineClamp:3,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{entry.plain?.slice(0,300)||''}</div>
      </div>
      {/* Footer */}
      <div style={{padding:'8px 16px 12px',display:'flex',alignItems:'center',gap:8,borderTop:'1px solid '+BDR,position:'relative',zIndex:1}}>
        <span style={{fontSize:11,color:FAINT}}>{entry.word_count||entry.wordCount||0} palabras</span>
        <span style={{fontSize:11,color:FAINT}}>·</span>
        <span style={{fontSize:11,color:FAINT}}>{entry.sk}</span>
        {activity&&activity.avgRating&&(
          <><span style={{fontSize:11,color:FAINT}}>·</span>
          <span style={{fontSize:11,color:'#1B5FAA',fontWeight:600}}>★{activity.avgRating}</span></>
        )}
        {activity&&activity.comments>0&&(
          <><span style={{fontSize:11,color:FAINT}}>·</span>
          <span style={{fontSize:11,color:'#1E9BF0',fontWeight:500}}>💬{activity.comments}</span></>
        )}
        {activity&&activity.reactions>0&&(
          <><span style={{fontSize:11,color:FAINT}}>·</span>
          <span style={{fontSize:11,color:MUTED}}>👏{activity.reactions}</span></>
        )}
        <div style={{flex:1}}/>
        <button onClick={()=>onRead(entry)} style={{background:'transparent',border:'0.5px solid '+BDR,borderRadius:6,padding:'4px 10px',fontSize:11,color:MUTED,cursor:'pointer'}}>Leer completo</button>
      </div>
    </div>
  );
};

/* ─── BIBLIOTECA SCREEN ──────────────────────────── */
const BibliotecaScreen=({user,library,onClose,onVisibilityChange})=>{
  const [tab,setTab]=useState('explorar'); // 'explorar'|'amigos'|'mis_textos'
  const [publicEntries,setPublicEntries]=useState([]);
  const [friendsEntries,setFriendsEntries]=useState([]);
  const [following,setFollowing]=useState([]); // array of user_ids
  const [loading,setLoading]=useState(false);
  const [readEntry,setReadEntry]=useState(null);
  const [page,setPage]=useState(0);
  const [myTeams,setMyTeams]=useState([]);
  const [activity,setActivity]=useState({});
  const [openChains,setOpenChains]=useState([]);
  const [claimingChain,setClaimingChain]=useState(null);
  useEffect(()=>{DB.getOpenNominations().then(setOpenChains).catch(()=>{});},[]);
  const PER_PAGE=20;

  const loadPublic=async(p=0)=>{
    setLoading(true);
    try{
      const data=await DB.getPublicEntries(PER_PAGE,p*PER_PAGE);
      setPublicEntries(prev=>p===0?data:[...prev,...data]);
      setPage(p);
      // Batch-fetch social activity for the cards
      try{
        const act=await DB.getActivityForEntries(data.map(e=>e.id));
        setActivity(prev=>({...prev,...act}));
      }catch(e){}
    }catch(e){console.error(e);}
    finally{setLoading(false);}
  };

  const loadFriends=async()=>{
    setLoading(true);
    try{const data=await DB.getFriendsEntries(user.id);setFriendsEntries(data);}
    catch(e){console.error(e);}
    finally{setLoading(false);}
  };

  const loadFollowing=async()=>{
    try{
      const data=await DB.getFollowing(user.id);
      setFollowing(data.map(f=>f.following_id));
    }catch(e){console.error(e);}
  };

  useEffect(()=>{
    loadPublic(0);
    loadFollowing();
    DB.getMyGroups(user.id).then(setMyTeams).catch(()=>{});
  },[]);

  useEffect(()=>{
    if(tab==='amigos')loadFriends();
  },[tab]);

  const handleFollow=async(targetId,isFollowing)=>{
    try{
      if(isFollowing){
        await DB.unfollow(user.id,targetId);
        setFollowing(prev=>prev.filter(id=>id!==targetId));
      }else{
        await DB.follow(user.id,targetId);
        setFollowing(prev=>[...prev,targetId]);
      }
    }catch(e){alert('Error: '+e.message);}
  };

  const tabs=[
    {id:'explorar',label:'Explorar',count:publicEntries.length},
    {id:'amigos',label:'Amigos',count:friendsEntries.length},
    {id:'buscar',label:'Buscar',count:0},
    {id:'mis_textos',label:'Mis textos',count:library.length},
  ];

  return(
    <div style={{position:'fixed',inset:0,background:PAGE_BG,zIndex:200,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {readEntry&&<ReadingModal entry={readEntry} user={user} onClose={()=>setReadEntry(null)}/>}

      {/* Header */}
      <div style={{display:'flex',alignItems:'center',padding:'0 20px',height:52,background:'var(--topbar-bg,#fff)',borderBottom:'1px solid '+BDR,flexShrink:0}}>
        <div style={{fontFamily:'"Playfair Display",serif',fontStyle:'italic',fontWeight:500,fontSize:16,color:TXT}}>Biblioteca</div>
        <div style={{flex:1}}/>
        <button onClick={onClose} style={{background:'transparent',border:'none',fontSize:20,color:MUTED,cursor:'pointer',lineHeight:1}}>×</button>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',background:'var(--topbar-bg,#fff)',borderBottom:'1px solid '+BDR,padding:'0 20px',flexShrink:0}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{background:'transparent',border:'none',borderBottom:tab===t.id?'2px solid '+NAVY:'2px solid transparent',padding:'10px 14px',fontSize:13,fontWeight:tab===t.id?600:400,color:tab===t.id?TXT:MUTED,cursor:'pointer',marginBottom:-1,display:'flex',alignItems:'center',gap:5,fontFamily:"'Source Sans 3',sans-serif"}}>
            {t.label}
            {t.count>0&&<span style={{fontSize:10,background:'rgba(10,27,61,0.07)',borderRadius:10,padding:'1px 6px',color:MUTED}}>{t.count}</span>}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:'auto',maxWidth:680,width:'100%',margin:'0 auto',padding:tab==='mis_textos'?0:'16px 16px 40px'}}>

        {/* EXPLORAR */}
        {tab==='explorar'&&<>
          {claimingChain&&<ChainEditor user={user} chain={claimingChain.chains} startingFresh={false} onClose={()=>setClaimingChain(null)} onUpdate={()=>DB.getOpenNominations().then(setOpenChains).catch(()=>{})}/>}

          {/* Encadenados disponibles */}
          {openChains.length>0&&(
            <div style={{marginBottom:24}}>
              <div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:10}}>
                <span style={{fontFamily:'"Playfair Display",serif',fontSize:16,fontWeight:700,color:TXT}}>⛓ Encadenados</span>
                <span style={{fontSize:12,color:FAINT}}>{openChains.length} disponible{openChains.length!==1?'s':''} para continuar</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:12}}>
                {openChains.map(n=>(
                  <div key={n.id} style={{background:CARD_BG,border:'1px solid rgba(27,95,170,0.25)',borderRadius:13,padding:'14px 16px',position:'relative',overflow:'hidden'}}>
                    <Signo char="," size={56} top={-10} right={8} color="azul"/>
                    <div style={{position:'relative'}}>
                      <div style={{font:"600 9px/1 'Source Sans 3'",letterSpacing:'.08em',textTransform:'uppercase',color:AZULMED,marginBottom:6}}>Capítulo {n.chapter_number}</div>
                      <div style={{fontFamily:'"Playfair Display",serif',fontWeight:600,fontSize:15,color:TXT,marginBottom:8,lineHeight:1.3}}>{n.chains?.title||'Relato encadenado'}</div>
                      {n.chains?.last_sentence&&<div style={{fontSize:12,color:MUTED,fontStyle:'italic',lineHeight:1.5,marginBottom:10}}>"…{n.chains.last_sentence.slice(0,90)}"</div>}
                      <button onClick={()=>setClaimingChain(n)} style={{width:'100%',background:AZULMED,border:'none',borderRadius:8,padding:'8px',fontSize:12,fontWeight:600,color:'#fff',cursor:'pointer',fontFamily:"'Source Sans 3',sans-serif"}}>Reclamar y escribir →</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {loading&&publicEntries.length===0&&<div style={{textAlign:'center',padding:40,color:MUTED,fontSize:13}}>Cargando textos…</div>}
          {!loading&&publicEntries.length===0&&<div style={{textAlign:'center',padding:40}}>
            <div style={{fontSize:32,marginBottom:12}}>📖</div>
            <div style={{fontSize:14,fontWeight:500,color:TXT,marginBottom:6}}>La biblioteca está vacía</div>
            <div style={{fontSize:13,color:MUTED,lineHeight:1.65}}>Nadie ha publicado textos todavía.<br/>Sé el primero — ve a "Mis textos" y cambia la visibilidad de alguno a "Abierto".</div>
          </div>}
          {(()=>{
            // Sort: recent activity first, then entry date
            const sorted=publicEntries.slice().sort((a,b)=>{
              const aAct=activity[a.id]?.lastActivity||0;
              const bAct=activity[b.id]?.lastActivity||0;
              const aScore=Math.max(aAct,a.ts||0);
              const bScore=Math.max(bAct,b.ts||0);
              return bScore-aScore;
            });
            // Weekly featured: best score among entries of last 7 days
            const weekAgo=Date.now()-7*24*3600*1000;
            let featured=null,bestScore=0;
            sorted.forEach(e=>{
              if((e.ts||0)<weekAgo)return;
              const a=activity[e.id]||{};
              const score=(a.comments||0)*2+(a.ratings||0)+(a.reactions||0);
              if(score>bestScore){bestScore=score;featured=e;}
            });
            const rest=featured?sorted.filter(e=>e.id!==featured.id):sorted;
            return(
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {featured&&(
                  <div>
                    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
                      <span style={{fontSize:13}}>⭐</span>
                      <span style={{fontSize:11,fontWeight:600,color:'#1B5FAA',textTransform:'uppercase',letterSpacing:'.07em'}}>Texto de la semana</span>
                    </div>
                    <div style={{border:'1px solid rgba(27,95,170,0.35)',borderRadius:13,boxShadow:'0 2px 12px rgba(27,95,170,0.08)'}}>
                      <PublicEntryCard entry={featured} currentUser={user} onRead={setReadEntry} onFollow={handleFollow} following={following} activity={activity[featured.id]}/>
                    </div>
                  </div>
                )}
                {rest.map(e=><PublicEntryCard key={e.id} entry={e} currentUser={user} onRead={setReadEntry} onFollow={handleFollow} following={following} activity={activity[e.id]}/>)}
              </div>
            );
          })()}
          {publicEntries.length>=PER_PAGE&&<div style={{textAlign:'center',marginTop:16}}>
            <Btn onClick={()=>loadPublic(page+1)} disabled={loading} variant="ghost">{loading?'Cargando…':'Ver más'}</Btn>
          </div>}
        </>}

        {/* AMIGOS */}
        {tab==='amigos'&&<>
          {following.length===0&&<div style={{background:'rgba(27,95,170,0.06)',border:'1px solid rgba(27,95,170,0.22)',borderRadius:12,padding:'16px 20px',marginBottom:12,fontSize:13,color:AZULMED,lineHeight:1.65}}>
            Sigue a otros escritores desde la pestaña "Explorar" para ver aquí sus textos compartidos con amigos.
          </div>}
          {loading&&<div style={{textAlign:'center',padding:32,color:MUTED,fontSize:13}}>Cargando…</div>}
          {!loading&&friendsEntries.length===0&&following.length>0&&<div style={{textAlign:'center',padding:32,color:MUTED,fontSize:13}}>Tus amigos no han compartido textos contigo todavía.</div>}
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {friendsEntries.map(e=><PublicEntryCard key={e.id} entry={e} currentUser={user} onRead={setReadEntry} onFollow={handleFollow} following={following}/>)}
          </div>
        </>}

        {/* BUSCAR */}
        {tab==='buscar'&&<UserSearchPanel user={user} following={following} onFollow={handleFollow} teams={myTeams} onAddToTeam={()=>{}}/>}

        {/* MIS TEXTOS */}
        {tab==='mis_textos'&&<MisTextos user={user} library={library} onVisibilityChange={onVisibilityChange}/>}
      </div>
    </div>
  );
};



/* ─── AMIGOS SCREEN ─────────────────────────────────────────── */
const AmigosScreen=({user,onClose})=>{
  const [friends,setFriends]=useState([]);       // users I follow
  const [followingIds,setFollowingIds]=useState([]); // set of ids
  const [totalUsers,setTotalUsers]=useState(null);
  const [query,setQuery]=useState('');
  const [searchResults,setSearchResults]=useState([]);
  const [searching,setSearching]=useState(false);
  const [viewingProfile,setViewingProfile]=useState(null);
  const [loading,setLoading]=useState(true);

  // Load friends + total count on mount
  useEffect(()=>{
    const init=async()=>{
      setLoading(true);
      try{
        const [following,total]=await Promise.all([
          DB.getFollowing(user.id),
          DB.getTotalUsers(),
        ]);
        const fids=following.map(f=>f.following_id);
        setFollowingIds(fids);
        // Build friend objects from the embedded profile data
        const friendList=following.map(f=>({
          id:f.following_id,
          ...(f.profiles||{}),
        })).filter(f=>f.name);
        setFriends(friendList);
        setTotalUsers(total);
      }catch(e){console.error(e);}
      setLoading(false);
    };
    init();
  },[user.id]);

  // Search with debounce
  useEffect(()=>{
    if(query.length<2){setSearchResults([]);return;}
    const t=setTimeout(async()=>{
      setSearching(true);
      try{
        const r=await DB.searchUsers(query);
        setSearchResults(r.filter(u=>u.id!==user.id));
      }catch(e){console.error(e);}
      setSearching(false);
    },300);
    return()=>clearTimeout(t);
  },[query]);

  const handleFollow=async(targetId,isFollowing,targetUser)=>{
    try{
      if(isFollowing){
        await DB.unfollowUser(user.id,targetId);
        setFollowingIds(prev=>prev.filter(id=>id!==targetId));
        setFriends(prev=>prev.filter(f=>f.id!==targetId));
      }else{
        await DB.followUser(user.id,targetId);
        setFollowingIds(prev=>[...prev,targetId]);
        // Add friend directly from the user object we already have
        if(targetUser){
          setFriends(prev=>{
            if(prev.find(f=>f.id===targetId))return prev;
            return [...prev,{...targetUser,id:targetId}];
          });
        }
      }
    }catch(e){console.error('follow error:',e);}
  };

  const FriendCard=({u,showUnfollow=false})=>(

        <div style={{fontSize:13,fontWeight:600,color:TXT,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.name}</div>

      </div>
      <div style={{display:'flex',gap:6,flexShrink:0}}>
        <button onClick={()=>setViewingProfile(u)}
          style={{background:'rgba(30,155,240,0.08)',border:'1px solid rgba(30,155,240,0.25)',borderRadius:7,padding:'5px 10px',fontSize:11,fontWeight:600,color:AZUL,cursor:'pointer'}}>
          Ver perfil
        </button>
        {showUnfollow&&(
          <button onClick={()=>handleFollow(u.id,true)}
            style={{background:'rgba(10,27,61,0.04)',border:'1px solid '+BDR,borderRadius:7,padding:'5px 8px',fontSize:11,color:MUTED,cursor:'pointer'}}>

      </div>
    </div>
  );

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(10,27,61,0.45)',zIndex:200,display:'flex',alignItems:'stretch',justifyContent:'center',padding:'0'}}>
      <div style={{background:PAGE_BG,width:'100%',maxWidth:860,display:'flex',flexDirection:'column',overflow:'hidden'}}>

        {/* Header */}
        <div style={{background:'var(--topbar-bg,#fff)',borderBottom:'1px solid '+BDR,padding:'16px 24px',display:'flex',alignItems:'center',gap:12,flexShrink:0,position:'relative',overflow:'hidden'}}>
          <Signo char="*" size={80} top={-22} left={250} color="naranja"/>
          <button onClick={onClose} style={{background:'transparent',border:'none',fontSize:20,cursor:'pointer',color:MUTED,padding:'0 4px',lineHeight:1,position:'relative',zIndex:1}}>←</button>
          <div style={{fontFamily:'"Playfair Display",serif',fontWeight:700,fontSize:17,color:TXT,letterSpacing:'-0.01em',position:'relative',zIndex:1}}>Amigos</div>
          {!loading&&<div style={{fontSize:12,color:MUTED,marginLeft:4,position:'relative',zIndex:1}}>{friends.length} {friends.length===1?'persona':'personas'} seguidas</div>}
        </div>

        {/* Body: two columns */}
        <div className="amigos-body" style={{flex:1,display:'flex',overflow:'hidden'}}>

          {/* LEFT: friends list */}
          <div style={{flex:1,overflowY:'auto',padding:'20px 16px 20px 20px'}}>
            {loading?(
              <div style={{textAlign:'center',padding:40,color:MUTED,fontSize:13}}>Cargando…</div>

/* ─── ESTADÍSTICAS ─────────────────────────────────────────── */
const EstadísticasScreen=({library,reflections,onClose,stats})=>{
  const {totalWords,totalSessions,totalElapsed,weekWords,weekSessions,avgRating}=stats;

  // Words per week (last 12 weeks) — same as StatsChart
  const weekBars=useMemo(()=>{
    const now=new Date();
    return Array.from({length:12},(_,i)=>{
      const d=new Date(now);d.setDate(d.getDate()-((11-i)*7));
      const wStart=new Date(d);wStart.setDate(d.getDate()-d.getDay());
      const wEnd=new Date(wStart);wEnd.setDate(wStart.getDate()+6);
      const ws=wStart.toISOString().slice(0,10);const we=wEnd.toISOString().slice(0,10);
      const words=library.filter(e=>{const dt=e.date?.slice(0,10)||'';return dt>=ws&&dt<=we;}).reduce((s,e)=>s+(e.word_count||e.wordCount||0),0);
      const label=wStart.toLocaleDateString('es-ES',{month:'short',day:'numeric'});
      return{label,words};
    });
  },[library]);
  const maxW=Math.max(...weekBars.map(b=>b.words),1);

  // Pie data: words by category (sk)
  const catWords={};const catMins={};
  library.forEach(e=>{
    const _sl=e.session_label||e.sessionLabel||'';
const k=e.sk==='dueto'?'A dos manos':e.sk==='cuento'&&_sl.toLowerCase().includes('dos manos')?'A dos manos':{check:'Check diario',reto:'Reto semanal',proyecto:'Proyecto',cuento:'Cuento contrareloj'}[e.sk]||'Otro';
    catWords[k]=(catWords[k]||0)+(e.word_count||e.wordCount||0);
    catMins[k]=(catMins[k]||0)+Math.round((e.elapsed||0)/60);
  });
  const catColors={'Check diario':'#1E9BF0','Reto semanal':'#F15A24','Proyecto':'#1B5FAA','Cuento contrareloj':'#A82020','A dos manos':'#1A6B8A','Otro':MUTED};
  const totalW=Object.values(catWords).reduce((s,v)=>s+v,0)||1;
  const totalM=Object.values(catMins).reduce((s,v)=>s+v,0)||1;
  const cats=Object.keys(catWords);

  // SVG pie chart helper
  const PieChart=({data,total,unit})=>{
    let angle=0;
    const slices=data.map(([k,v])=>{
      const pct=v/total;const a=pct*2*Math.PI;
      const x1=50+40*Math.sin(angle);const y1=50-40*Math.cos(angle);
      angle+=a;
      const x2=50+40*Math.sin(angle);const y2=50-40*Math.cos(angle);
      const large=pct>0.5?1:0;
      return{k,v,pct,d:`M50 50 L${x1} ${y1} A40 40 0 ${large} 1 ${x2} ${y2} Z`,color:catColors[k]};
    });
    return(
      <div style={{display:'flex',alignItems:'center',gap:20}}>
        <svg viewBox="0 0 100 100" style={{width:120,height:120,flexShrink:0}}>
          {slices.map(s=><path key={s.k} d={s.d} fill={s.color} stroke="#fff" strokeWidth="1"/>)}
        </svg>
        <div style={{display:'flex',flexDirection:'column',gap:5}}>
          {slices.map(s=>(
            <div key={s.k} style={{display:'flex',alignItems:'center',gap:6,fontSize:11}}>
              <div style={{width:8,height:8,borderRadius:2,background:s.color,flexShrink:0}}/>
              <span style={{color:MUTED}}>{s.k}</span>
              <span style={{fontWeight:500,color:TXT,marginLeft:'auto',paddingLeft:8}}>{s.v.toLocaleString()} {unit}</span>
            </div>
          ))}
        </div>
      </div>
    );
  };

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(10,27,61,0.5)',zIndex:200,overflowY:'auto',display:'flex',justifyContent:'center',alignItems:'flex-start',padding:'24px 16px'}}>
      <div style={{background:CARD_BG,borderRadius:16,width:'100%',maxWidth:640,padding:'28px 24px',position:'relative',overflow:'hidden'}}>
        <Signo char="*" size={130} top={-10} right={-6} color="naranja"/>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24,position:'relative',zIndex:1}}>
          <div style={{fontSize:21,fontWeight:700,letterSpacing:'-0.02em',color:TXT,fontFamily:'"Playfair Display",serif'}}>Estadísticas</div>
          <button onClick={onClose} style={{background:'transparent',border:'none',fontSize:20,cursor:'pointer',color:MUTED,padding:'0 4px'}}>✕</button>
        </div>

        {/* Stat cards */}
        <div className="resp-3col" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:24}}>
          <StatCard label="Palabras escritas" value={(totalWords||0).toLocaleString()} accent={NAVY}/>
          <StatCard label="Sesiones totales" value={totalSessions||0} accent={AZUL}/>
          <StatCard label="Tiempo escrito" value={totalElapsed>0?Math.round(totalElapsed/60)+'min':'—'} accent={AZUL}/>
          <StatCard label="Palabras esta semana" value={(weekWords||0).toLocaleString()} accent={NAVY}/>
          <StatCard label="Sesiones esta semana" value={weekSessions||0} accent={AZUL}/>
          <StatCard label="Valoración media" value={avgRating?avgRating+'/10':'—'} accent={NARANJA}/>
        </div>

        {/* Words per week chart */}
        <div style={{background:'rgba(10,27,61,0.035)',borderRadius:12,padding:'16px',marginBottom:20,position:'relative',zIndex:1}}>
          <div style={{fontSize:11,fontWeight:600,color:MUTED,textTransform:'uppercase',letterSpacing:'.16em',marginBottom:12}}>Palabras por semana</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:4,height:80}}>
            {weekBars.map((b,i)=>(
              <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                <div style={{width:'100%',background:i===weekBars.length-1?NARANJA:AZUL,borderRadius:'3px 3px 0 0',height:Math.max(2,Math.round((b.words/maxW)*72))+'px',opacity:b.words>0?1:0.15}}/>
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:4,marginTop:4}}>
            {weekBars.map((b,i)=>(
              <div key={i} style={{flex:1,textAlign:'center',fontSize:8,color:FAINT,overflow:'hidden'}}>{b.label.split(' ')[0]}</div>
            ))}
          </div>
        </div>

        {/* Pie charts */}
        {cats.length>0&&(
          <div className="resp-2col" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            <div style={{background:'rgba(10,27,61,0.035)',borderRadius:12,padding:'16px'}}>
              <div style={{fontSize:11,fontWeight:600,color:MUTED,textTransform:'uppercase',letterSpacing:'.16em',marginBottom:12}}>Palabras por tipo</div>
              <PieChart data={cats.map(k=>[k,catWords[k]])} total={totalW} unit="pal."/>
            </div>
            <div style={{background:'rgba(10,27,61,0.035)',borderRadius:12,padding:'16px'}}>
              <div style={{fontSize:11,fontWeight:600,color:MUTED,textTransform:'uppercase',letterSpacing:'.16em',marginBottom:12}}>Minutos por tipo</div>
              <PieChart data={cats.map(k=>[k,catMins[k]])} total={totalM} unit="min"/>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};



/* ─── SEND DUET MODAL ───────────────────────────────────────── */
const SendDuetModal=({user,onClose,onCreated})=>{
  const [query,setQuery]=useState('');

    if(query.length<2){setResults([]);return;}
    const t=setTimeout(async()=>{
      try{const r=await DB.searchUsers(query);setResults(r.filter(u=>u.id!==user.id));}catch(e){}
    },300);
    return()=>clearTimeout(t);
  },[query]);

        <div style={{padding:'18px 20px',display:'flex',flexDirection:'column',gap:16}}>

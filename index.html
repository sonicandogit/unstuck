<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pretexto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400;1,500;1,600&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="unstuckfavicon.png">
<link rel="apple-touch-icon" href="unstuckfavicon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pretexto">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FBF8F0">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;height:var(--app-height,100dvh);}body{height:100%;overflow:hidden}

/* ══ SIGNOS — DESIGN TOKENS & THEME ═══════════════════════ */
:root{
  --bg:#FBF8F0;
  --card-bg:#ffffff;
  --accent-card-bg:#ffffff;
  --text:#0A1B3D;
  --text2:#5B6478;
  --text3:#8A8578;
  --border:rgba(10,27,61,0.10);
  --btn-advance-bg:#0A1B3D;
  --btn-advance-text:#ffffff;
  --signo-opacity-min:0.08;
  --signo-opacity-max:0.14;
  --topbar-bg:#ffffff;
  --done-bg:#0A1B3D;
  --today-bg:transparent;
  --today-text:#0A1B3D;
  --prose-text:#1A1A1A;
  --header-navy-bg:#0A1B3D;
  --input-bg:#ffffff;
  --session-btn-bg:#0A1B3D;
  --session-btn-text:#ffffff;
  --subtle-fill:rgba(10,27,61,0.04);
}
[data-theme="dark"]{
  --bg:#0A1B3D;
  --card-bg:#142844;
  --accent-card-bg:#1B5FAA;
  --text:#ffffff;
  --text2:#AEBDD6;
  --text3:#5B7AA6;
  --border:rgba(255,255,255,0.14);
  --btn-advance-bg:#F15A24;
  --btn-advance-text:#ffffff;
  --signo-opacity-min:0.18;
  --signo-opacity-max:0.28;
  --topbar-bg:#0A1B3D;
  --done-bg:#1B5FAA;
  --today-bg:#F15A24;
  --today-text:#ffffff;
  --prose-text:#E8EEF5;
  --header-navy-bg:#1B5FAA;
  --input-bg:rgba(255,255,255,0.07);
  --session-btn-bg:#1E9BF0;
  --session-btn-text:#0A1B3D;
  --subtle-fill:rgba(255,255,255,0.05);
}
html{background:var(--bg);transition:background 0.25s}
/* Signo decorativo — gran signo tipográfico translúcido de fondo */
.signo{position:absolute;font-family:'Playfair Display',serif;font-weight:700;line-height:1;pointer-events:none;user-select:none;z-index:0}
.signo-azul{color:rgba(30,155,240,var(--signo-opacity-min))}
.signo-naranja{color:rgba(241,90,36,var(--signo-opacity-min))}
.signo-navy{color:rgba(10,27,61,var(--signo-opacity-min))}
[data-theme="dark"] .signo-navy{color:rgba(255,255,255,var(--signo-opacity-min))}
.signo-strong{opacity:1.4}
/* Theme toggle pill */
.theme-toggle{display:inline-flex;background:rgba(10,27,61,.06);border-radius:9px;padding:3px;gap:2px}
[data-theme="dark"] .theme-toggle{background:rgba(255,255,255,.08)}
.theme-toggle button{font:600 11px/1 'Source Sans 3',sans-serif;border:none;border-radius:7px;padding:7px 12px;cursor:pointer;background:transparent;color:var(--text3)}
.theme-toggle button.active{background:#fff;color:#0A1B3D;box-shadow:0 1px 3px rgba(10,27,61,.12)}
[data-theme="dark"] .theme-toggle button.active{background:#1E9BF0;color:#0A1B3D;box-shadow:none}

body{font-family:'Source Sans 3',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg,#FBF8F0);color:var(--text,#0A1B3D);-webkit-font-smoothing:antialiased;transition:background 0.25s,color 0.25s;}
#root{height:100vh;display:flex;flex-direction:column;overflow:auto;position:relative}
#root::before{content:'';position:fixed;inset:0;background:var(--bg,#FBF8F0);opacity:1;pointer-events:none;z-index:0;transition:background 0.25s}
#root>*{position:relative;z-index:1}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.13);border-radius:3px}
input,select,textarea,button{font-family:inherit}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;background:rgba(0,0,0,0.1);border-radius:2px;outline:none;cursor:pointer;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.22);cursor:pointer;margin-top:-7px}
input[type=text],input[type=number],textarea{border:1.5px solid var(--border,rgba(10,27,61,.15));border-radius:9px;padding:8px 11px;font-size:13px;font-family:'Source Sans 3',sans-serif;color:var(--text,#0A1B3D);background:var(--input-bg,#fff);outline:none}
input[type=text]:focus,input[type=number]:focus,textarea:focus{border-color:#1E9BF0}
::selection{background:rgba(30,155,240,0.18)}
[contenteditable]:focus{outline:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp 0.22s ease forwards}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fi{animation:fadeIn 0.18s ease forwards}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
/* Mobile */
@media(max-width:600px){
  .desk-only{display:none!important}
  .mob-pad{padding-left:14px!important;padding-right:14px!important}
  input[type=range]::-webkit-slider-thumb{width:22px;height:22px}
}

/* ── WELCOME CAROUSEL ─────────────────────────────── */
/* ── WELCOME CAROUSEL — SIGNOS ──────────────────────── */
.wc-overlay{position:fixed;inset:0;background:rgba(10,27,61,0.78);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;backdrop-filter:blur(5px);}
.wc-modal{background:var(--card-bg,#fff);border:1px solid var(--border,rgba(10,27,61,.1));border-radius:18px;width:100%;max-width:680px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 32px 80px -20px rgba(10,27,61,0.5);position:relative;}
.wc-progress-track{height:3px;background:rgba(10,27,61,.08);flex-shrink:0;}
[data-theme="dark"] .wc-progress-track{background:rgba(255,255,255,.1);}
.wc-progress-fill{height:100%;background:#F15A24;transition:width 0.35s ease;}
.wc-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px 14px;border-bottom:1px solid var(--border,rgba(10,27,61,.1));flex-shrink:0;}
.wc-logo{font-family:'Playfair Display',serif;font-style:italic;font-weight:500;font-size:19px;color:var(--text,#0A1B3D);letter-spacing:-0.3px;}
.wc-counter{font:600 11px/1 'Source Sans 3',sans-serif;color:var(--text3,#8a8578);letter-spacing:1.5px;text-transform:uppercase;}
.wc-slides-wrap{flex:1;overflow:hidden;position:relative;}
.wc-slides{display:flex;height:100%;transition:transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);}
.wc-slide{min-width:100%;padding:30px 30px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:18px;position:relative;}
.wc-eyebrow{font:600 10px/1 'Source Sans 3',sans-serif;letter-spacing:.26em;text-transform:uppercase;color:#1E9BF0;position:relative;z-index:1;}
.wc-eyebrow.naranja{color:#F15A24;}
.wc-title{font-family:'Playfair Display',serif;font-size:27px;font-weight:700;color:var(--text,#0A1B3D);line-height:1.18;letter-spacing:-0.02em;position:relative;z-index:1;}
.wc-body{font-size:14px;line-height:1.7;color:var(--text2,#5b6478);display:flex;flex-direction:column;gap:10px;position:relative;z-index:1;}
.wc-body strong{color:var(--text,#0A1B3D);font-weight:600;}
.wc-quote{border-left:3px solid #1E9BF0;padding:9px 14px;background:rgba(30,155,240,0.05);font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:var(--text,#0A1B3D);line-height:1.5;margin:4px 0;position:relative;z-index:1;}
.wc-quote em{display:block;margin-top:4px;font-size:11px;color:var(--text3,#8a8578);font-style:normal;}
.wc-mockup{background:rgba(10,27,61,0.035);border:1px solid var(--border,rgba(10,27,61,.1));border-radius:10px;padding:14px;flex-shrink:0;position:relative;z-index:1;}
[data-theme="dark"] .wc-mockup{background:rgba(255,255,255,0.04);}
.mk-topbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border,rgba(10,27,61,.1));}
.mk-logo{font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:var(--text,#0A1B3D);}
.mk-nav{display:flex;gap:6px;margin-left:auto;}
.mk-navitem{width:36px;height:6px;background:rgba(10,27,61,.14);border-radius:2px;}
[data-theme="dark"] .mk-navitem{background:rgba(255,255,255,.16);}
.mk-navitem.active{background:#F15A24;}
.mk-editor-area{background:var(--card-bg,#fff);border:1px solid var(--border,rgba(10,27,61,.1));border-radius:6px;padding:10px;min-height:80px;}
.mk-cursor-line{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.mk-cursor{width:1.5px;height:14px;background:#F15A24;animation:blink 1s infinite;}
.mk-placeholder{font-size:10px;color:var(--text3,#8a8578);}
.mk-text-lines{display:flex;flex-direction:column;gap:4px;margin-top:6px;}
.mk-line{height:5px;background:rgba(10,27,61,.14);border-radius:2px;}
[data-theme="dark"] .mk-line{background:rgba(255,255,255,.16);}
.mk-line.s{width:60%}.mk-line.xs{width:35%}
.mk-stats{display:flex;gap:8px;margin-bottom:10px;}
.mk-stat{flex:1;background:var(--card-bg,#fff);border:1px solid var(--border,rgba(10,27,61,.1));border-radius:6px;padding:7px 8px;text-align:center;}
.mk-stat-val{font-size:16px;font-weight:700;color:var(--text,#0A1B3D);font-family:'Playfair Display',serif;}
.mk-stat-lbl{font-size:8px;color:var(--text3,#8a7f74);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.mk-stat.hl .mk-stat-val{color:#F15A24;}
.mk-reto-list{display:flex;flex-direction:column;gap:5px;}
.mk-reto{display:flex;align-items:center;gap:8px;background:var(--card-bg,#fff);border:1px solid var(--border,rgba(10,27,61,.1));border-radius:6px;padding:6px 8px;}
.mk-reto-dot{width:7px;height:7px;border-radius:50%;background:rgba(10,27,61,.14);flex-shrink:0;}
.mk-reto-dot.done{background:#F15A24;}
.mk-reto-text{flex:1;}
.mk-reto-title{height:5px;background:rgba(10,27,61,.14);border-radius:2px;width:80%;}
.mk-reto-sub{height:4px;background:rgba(10,27,61,.14);border-radius:2px;width:50%;margin-top:3px;opacity:0.6;}
.mk-badge{font-size:8px;font-weight:600;background:rgba(241,90,36,0.12);color:#F15A24;border-radius:4px;padding:2px 5px;flex-shrink:0;}
.mk-modes{display:flex;gap:7px;}
.mk-mode{flex:1;background:var(--card-bg,#fff);border:1px solid var(--border,rgba(10,27,61,.1));border-radius:6px;padding:8px;}
.mk-mode-tag{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3,#8a7f74);margin-bottom:5px;}
.mk-mode.rio .mk-mode-tag{color:#1E9BF0}.mk-mode.limite .mk-mode-tag{color:#1B5FAA}.mk-mode.presion .mk-mode-tag{color:#F15A24;}
.mk-mode-lines{display:flex;flex-direction:column;gap:3px;}
.mk-mode-line{height:4px;background:rgba(10,27,61,.14);border-radius:2px;}
.mk-mode-line.s{width:70%}.mk-mode-line.xs{width:45%}
.mk-mode-icon{width:18px;height:18px;border-radius:50%;margin-bottom:5px;display:flex;align-items:center;justify-content:center;font-size:9px;}
.mk-mode.rio .mk-mode-icon{background:rgba(30,155,240,.12);color:#1E9BF0}.mk-mode.limite .mk-mode-icon{background:rgba(27,95,170,.12);color:#1B5FAA}.mk-mode.presion .mk-mode-icon{background:rgba(241,90,36,.12);color:#F15A24;}
.mk-team-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.mk-team-avatar{width:26px;height:26px;border-radius:50%;background:rgba(30,155,240,.12);border:1px solid var(--border,rgba(10,27,61,.1));display:flex;align-items:center;justify-content:center;font-size:10px;color:#1E9BF0;}
.mk-team-name{font-size:11px;font-weight:700;color:var(--text,#0A1B3D);}
.mk-team-sub{font-size:9px;color:var(--text3,#8a7f74);}
.mk-team-badge{margin-left:auto;font-size:8px;background:rgba(10,27,61,.06);color:var(--text3,#8a7f74);border-radius:4px;padding:2px 6px;}
[data-theme="dark"] .mk-team-badge{background:rgba(255,255,255,.1);}
.mk-team-members{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.mk-member{display:flex;align-items:center;gap:5px;background:var(--card-bg,#fff);border:1px solid var(--border,rgba(10,27,61,.1));border-radius:6px;padding:4px 7px;}
.mk-member-av{width:18px;height:18px;border-radius:50%;background:rgba(30,155,240,.12);}
.mk-member-name{width:28px;height:4px;background:rgba(10,27,61,.14);border-radius:2px;}
.mk-member-dot{width:6px;height:6px;border-radius:50%;background:#1E9BF0;margin-left:auto;}
.mk-reto-proposal{background:var(--card-bg,#fff);border:1px solid var(--border,rgba(10,27,61,.1));border-radius:6px;padding:7px 8px;display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.mk-proposal-av{width:16px;height:16px;border-radius:50%;background:rgba(30,155,240,.12);flex-shrink:0;}
.mk-proposal-body{flex:1;}
.mk-proposal-line{height:4px;background:rgba(10,27,61,.14);border-radius:2px;margin-bottom:3px;}
.mk-proposal-line.s{width:60%;opacity:0.6;}
.mk-vote{font-size:8px;font-weight:600;color:#F15A24;margin-left:auto;border:1px solid rgba(241,90,36,.25);border-radius:4px;padding:2px 5px;flex-shrink:0;}
.mk-lib-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.mk-lib-card{background:var(--card-bg,#fff);border:1px solid var(--border,rgba(10,27,61,.1));border-radius:6px;padding:8px;}
.mk-lib-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.mk-lib-title{width:55%;height:5px;background:rgba(10,27,61,.14);border-radius:2px;}
.mk-lib-privacy{font-size:7px;font-weight:600;border-radius:4px;padding:2px 4px;}
.mk-lib-privacy.pub{background:rgba(241,90,36,.12);color:#F15A24}.mk-lib-privacy.prv{background:rgba(10,27,61,.06);color:var(--text3,#8a7f74);}
.mk-lib-lines{display:flex;flex-direction:column;gap:3px;}
.mk-lib-line{height:4px;background:rgba(10,27,61,.14);border-radius:2px;}
.mk-lib-line.s{width:75%}.mk-lib-line.xs{width:50%}
.mk-lib-footer{display:flex;align-items:center;gap:4px;margin-top:6px;}
.mk-feedback-bubble{background:rgba(10,27,61,.035);border:1px solid var(--border,rgba(10,27,61,.1));border-radius:4px;padding:3px 6px;font-size:8px;color:var(--text3,#8a7f74);margin-top:4px;display:flex;gap:4px;align-items:center;}
.mk-feedback-av{width:10px;height:10px;border-radius:50%;background:rgba(10,27,61,.14);}
.mk-api-row{display:flex;align-items:center;gap:7px;background:var(--card-bg,#fff);border:1px solid var(--border,rgba(10,27,61,.1));border-radius:6px;padding:7px 10px;margin-bottom:7px;}
.mk-api-icon{width:22px;height:22px;border-radius:5px;background:rgba(30,155,240,.12);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.mk-api-body{flex:1;}
.mk-api-label{height:5px;background:rgba(10,27,61,.14);border-radius:2px;width:70%;margin-bottom:4px;}
.mk-api-sub{height:4px;background:rgba(10,27,61,.14);border-radius:2px;width:45%;opacity:0.6;}
.mk-api-status{font-size:8px;font-weight:600;border-radius:10px;padding:2px 7px;flex-shrink:0;}
.mk-api-status.conn{background:rgba(30,155,240,.12);color:#1E9BF0;}
.mk-review-box{background:rgba(30,155,240,0.04);border:1px solid var(--border,rgba(10,27,61,.1));border-radius:8px;padding:10px;}
.mk-review-header{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.mk-review-icon{width:16px;height:16px;border-radius:50%;background:#0A1B3D;display:flex;align-items:center;justify-content:center;font-size:9px;color:white;}
.mk-review-title{height:5px;width:60px;background:rgba(10,27,61,.14);border-radius:2px;}
.mk-review-lines{display:flex;flex-direction:column;gap:4px;}
.mk-review-line{height:4px;background:rgba(10,27,61,.14);border-radius:2px;}
.mk-review-line.s{width:80%}.mk-review-line.xs{width:55%}
.mk-review-hl{height:4px;background:rgba(30,155,240,.18);border-radius:2px;width:70%;}
.wc-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 24px 16px;border-top:1px solid var(--border,rgba(10,27,61,.1));flex-shrink:0;gap:12px;}
.wc-dots{display:flex;gap:6px;align-items:center;}
.wc-dot{width:6px;height:6px;border-radius:50%;background:rgba(10,27,61,.18);cursor:pointer;transition:all 0.2s;}
[data-theme="dark"] .wc-dot{background:rgba(255,255,255,.2);}
.wc-dot.active{background:#F15A24;width:18px;border-radius:3px;}
.wc-btn{font:600 13px/1 'Source Sans 3',sans-serif;padding:9px 18px;border-radius:9px;cursor:pointer;transition:all 0.15s;border:1px solid var(--border,rgba(10,27,61,.18));background:transparent;color:var(--text,#0A1B3D);}
.wc-btn:hover{background:rgba(10,27,61,0.05);}
[data-theme="dark"] .wc-btn:hover{background:rgba(255,255,255,0.08);}
.wc-btn.primary{background:#F15A24;color:#fff;border-color:#F15A24;box-shadow:0 8px 18px -8px rgba(241,90,36,.6);}
.wc-btn.primary:hover{background:#d94e1d;}
.wc-btn.advance{background:var(--btn-advance-bg,#0A1B3D);color:var(--btn-advance-text,#fff);border-color:transparent;}
.wc-noshow{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 24px 0;cursor:pointer;user-select:none;}
.wc-noshow-check{width:14px;height:14px;border:1.5px solid var(--border,rgba(10,27,61,.2));border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.wc-noshow-check.checked{background:#0A1B3D;border-color:#0A1B3D;}
.wc-noshow-label{font-size:11px;color:var(--text3,#8a7f74);}
.wc-slide-signo{position:absolute;font-family:'Playfair Display',serif;font-weight:700;line-height:1;pointer-events:none;user-select:none;color:rgba(30,155,240,0.1);z-index:0;}
[data-theme="dark"] .wc-slide-signo{color:rgba(30,155,240,0.18);}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ══ RESPONSIVE / MOBILE ══════════════════════════════════ */
@media(max-width:680px){
  /* Topbar: horizontal scroll instead of overflow */
  .topbar{padding:0 12px!important;gap:6px;}
  .topbar-nav{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;max-width:75vw;padding:6px 0;}
  .topbar-nav::-webkit-scrollbar{display:none}
  .topbar-nav>button{flex-shrink:0;white-space:nowrap;}

  /* Grids collapse */
  .resp-2col{grid-template-columns:1fr!important;}
  .resp-3col{grid-template-columns:repeat(2,1fr)!important;}

  /* Amigos: stack sidebar below */
  .amigos-body{flex-direction:column!important;overflow-y:auto!important;}
  .amigos-body>div:first-child{overflow-y:visible!important;flex:none!important;}
  .amigos-side{width:100%!important;border-left:none!important;border-top:0.5px solid rgba(0,0,0,0.1);overflow-y:visible!important;}

  /* Welcome carousel */
  .wc-overlay{padding:10px;}
  .wc-modal{max-height:96vh;}
  .wc-slide{padding:18px 16px 14px;gap:14px;}
  .wc-title{font-size:21px;}
  .wc-body{font-size:13px;}
  .wc-nav{padding:10px 14px 12px;}
  .wc-btn{padding:7px 12px;font-size:12px;}
  .mk-modes{flex-direction:column;}

  /* Duet bottom bar */
  .duet-bar{padding:10px 12px!important;gap:8px!important;}
  .duet-bar>div:first-child{flex-basis:100%;font-size:12px!important;}

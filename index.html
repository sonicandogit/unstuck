  const [autoSave,setAutoSave]=useState(true);const [asCd,setAsCd]=useState(AUTOSAVE);const [saveStatus,setSaveStatus]=useState('idle');
  const [plainTxt,setPlainTxt]=useState('');const [wc,setWc]=useState(0);
  const [fontIdx,setFontIdx]=useState(0);const [sz,setSz]=useState(17);
  const [bold,setBold]=useState(false);const [italic,setItalic]=useState(false);const [under,setUnder]=useState(false);const [align,setAlign]=useState('left');
  const [idleLimit,setIdleLimit]=useState(20);const [limChars,setLimChars]=useState(30);const [limDels,setLimDels]=useState(5);
  const [delsLeft,setDelsLeft]=useState(5);const [charsInDel,setCharsInDel]=useState(0);
  const [showLib,setShowLib]=useState(false);const [showDrive,setShowDrive]=useState(false);const [showPanel,setShowPanel]=useState(false);const [showUserMenu,setShowUserMenu]=useState(false);

  const edRef=useRef(null);const prevLen=useRef(0);const isDel=useRef(false);const lastSaved=useRef('');
  const tRef=useRef(),iRef=useRef(),eRef=useRef(),asRef=useRef(),toastRef=useRef();

  const fontObj=FONTS[fontIdx];
  const minW=customExercise?.min||currentProject?.goal||0;
  const goalOK=minW>0&&wc>=minW;const wpm=elapsed>10?Math.round((wc/elapsed)*60):0;
  const prog=minW>0?Math.min(100,(wc/minW)*100):0;
  const connected=driveState?.token&&driveState?.expires_at>Date.now()+30000;

  const headerTitle=customExercise?.title||customReto?.titulo||customReto?.title||currentProject?.title||'Mi proyecto';
  const headerFamily=customExercise?.family||customReto?'Reto de la semana':currentProject?.type||'Proyecto';
  const headerDescShort=customExercise?customExercise.family+' · '+customExercise.mode+' · '+customExercise.min+' pal. mín.'
    :customReto?wc+'/'+(customReto.goal||0)+' palabras'
    :currentProject?(currentProject.type+' · '+(currentProject.wordCount||0)+' palabras'):'';
  const headerAccent=sk==='check'?'#0A7A58':sk==='reto'?'#956010':'#5550B8';
  const headerBg=sk==='check'?'rgba(10,122,88,0.06)':sk==='reto'?'rgba(149,96,16,0.06)':'rgba(85,80,184,0.06)';
  const timerDur=sk==='check'?7*60:null; // reto & proyecto: no countdown
  const sessionXP=customExercise?.xp||80;

  const NS=k=>'flujo:'+user.id+':'+k;
  const resetLim=(d=limDels)=>{isDel.current=false;setCharsInDel(0);setDelsLeft(d)};
  const buildEntry=()=>({id:sk+'_'+Date.now(),ts:Date.now(),sk,date:today(),sessionLabel:headerFamily,title:headerTitle,html:edRef.current?.innerHTML||'',plain:plainTxt,wordCount:wc,elapsed,fontIdx,editorSize:sz,alignDir:align,weekId:sessionConfig.weekId||null,projectId:currentProject?.id||null});

  const saveNow=async(auto=false)=>{
    if(!plainTxt.trim())return;setSaveStatus('saving');
    const entry={...buildEntry(),id:auto?sk+'_as':sk+'_'+Date.now()};
    S.set(NS(entry.id),entry);setLibrary(prev=>[entry,...prev.filter(e=>e.id!==entry.id)]);lastSaved.current=plainTxt;
    if(currentProject){const projs=S.get(NS('projects'))||[];S.set(NS('projects'),projs.map(p=>p.id===currentProject.id?{...p,wordCount:(p.wordCount||0)+wc,updatedAt:today()}:p))}
    if(sk==='check'){const ex=S.get(NS('check:'+today()))||{};S.set(NS('check:'+today()),{...ex,done:true,wordCount:wc})}
    setSaveStatus('saved');setTimeout(()=>setSaveStatus(s=>s==='saved'?'idle':s),2000);
  };

  const switchMode=m=>{
    if(lockedMode)return;if(allowedModes&&!allowedModes.includes(m))return;
    setAb(m);setIdle(0);setIdleWarn(false);resetLim();
    if(edRef.current&&m!=='tunel')Array.from(edRef.current.children).forEach(b=>{b.style.filter='';b.style.opacity='';b.style.transition='';b.style.pointerEvents='';b.style.userSelect=''});
    clearTimeout(toastRef.current);setToast(MODES.find(x=>x.id===m));toastRef.current=setTimeout(()=>setToast(null),2500);
  };
  const cmd=c=>{edRef.current?.focus();document.execCommand(c,false,null);syncFmt()};
  const syncFmt=()=>{try{setBold(document.queryCommandState('bold'));setItalic(document.queryCommandState('italic'));setUnder(document.queryCommandState('underline'))}catch{}};
  const doAlign=d=>{setAlign(d);edRef.current?.focus();document.execCommand({left:'justifyLeft',center:'justifyCenter',right:'justifyRight'}[d],false,null)};

  const updateTunnelStyle=()=>{
    if(!edRef.current)return;
    const el=edRef.current;
    const blocks=Array.from(el.children).filter(b=>b.nodeType===1&&b.tagName!=='BR');
    if(ab!=='tunel'){
      blocks.forEach(b=>{b.style.filter='';b.style.opacity='';b.style.transition='';b.style.pointerEvents='';b.style.userSelect='';});
      return;
    }
    if(!blocks.length)return;
    let curIdx=blocks.length-1;
    try{const sel=window.getSelection();if(sel?.rangeCount){const anchor=sel.anchorNode;blocks.forEach((b,i)=>{if(b===anchor||b.contains(anchor))curIdx=i})}}catch{}
    blocks.forEach((b,i)=>{
      const isCur=i===curIdx;
      b.style.filter=isCur?'none':'blur(2.8px)';
      b.style.opacity=isCur?'1':'0.22';
      b.style.transition='filter 0.4s ease,opacity 0.4s ease';
      b.style.pointerEvents=isCur?'':'none';
      b.style.userSelect=isCur?'':'none';
      if(isCur)b.scrollIntoView({block:'nearest',behavior:'smooth'});
    });
  };

  useEffect(()=>{document.execCommand('defaultParagraphSeparator',false,'p')},[]);
  useEffect(()=>{clearInterval(tRef.current);if(running&&timerDur){tRef.current=setInterval(()=>setTimer(s=>{if(s<=1){clearInterval(tRef.current);setRunning(false);setDone(true);return 0}return s-1}),1000)}return()=>clearInterval(tRef.current)},[running,timerDur]);
  useEffect(()=>{clearInterval(eRef.current);if(running)eRef.current=setInterval(()=>setElapsed(e=>e+1),1000);return()=>clearInterval(eRef.current)},[running]);
  useEffect(()=>{clearInterval(iRef.current);if(ab==='presion'&&running){iRef.current=setInterval(()=>setIdle(s=>{const n=s+1;if(n>=idleLimit-5)setIdleWarn(true);if(n>=idleLimit){const el=edRef.current;if(el){const bs=Array.from(el.querySelectorAll('p,div')).filter(e=>e.innerText?.trim());if(bs.length>1)bs[bs.length-1].remove();else{const ls=el.innerText.trimEnd().split('\n');if(ls.length>1){ls.pop();el.innerText=ls.join('\n')}else el.innerHTML=''}const np=el.innerText||'';prevLen.current=np.length;setPlainTxt(np);setWc(np.trim()?np.trim().split(/\s+/).filter(Boolean).length:0)}setIdleWarn(false);return 0}return n}),1000)}return()=>clearInterval(iRef.current)},[ab,running,idleLimit]);
  useEffect(()=>{
    updateTunnelStyle();
    const onSel=()=>updateTunnelStyle();
    document.addEventListener('selectionchange',onSel);
    return()=>document.removeEventListener('selectionchange',onSel);
  },[ab]);
  useEffect(()=>{clearInterval(asRef.current);if(!autoSave||!started){setAsCd(AUTOSAVE);return}setAsCd(AUTOSAVE);asRef.current=setInterval(()=>setAsCd(c=>{if(c<=1){if(plainTxt!==lastSaved.current)saveNow(true);return AUTOSAVE}return c-1}),1000);return()=>clearInterval(asRef.current)},[autoSave,started,plainTxt]);

  const handleInput=(e)=>{
    const el=edRef.current;if(!el)return;
    const plain=el.innerText||'',cur=plain.length,prev=prevLen.current;const isD=cur<prev,nD=Math.max(0,prev-cur);
    // Río: block deletions EXCEPT spellcheck replacements (inputType='insertReplacementText') 
    if(ab==='rio'&&isD){
      const itype=e?.nativeEvent?.inputType||'';
      if(itype==='insertReplacementText'||itype==='insertText'){/*allow spellcheck*/}
      else{document.execCommand('undo');return}
    }
    if(ab==='limite'&&isD){if(!isDel.current){if(delsLeft<=0||nD>limChars){document.execCommand('undo');return}isDel.current=true;setDelsLeft(d=>d-1);setCharsInDel(nD)}else{const nx=charsInDel+nD;if(nx>limChars){document.execCommand('undo');return}setCharsInDel(nx)}}
    if(!isD&&isDel.current){isDel.current=false;setCharsInDel(0)}
    prevLen.current=cur;setPlainTxt(plain);setWc(plain.trim()?plain.trim().split(/\s+/).filter(Boolean).length:0);
    if(ab==='presion'){setIdle(0);setIdleWarn(false)}
    if(!started){setStarted(true);setRunning(true)}
    syncFmt();if(ab==='tunel')setTimeout(updateTunnelStyle,10);
  };
  const handleKey=e=>{if(ab==='rio'&&(e.key==='Backspace'||e.key==='Delete'))e.preventDefault()};
  const timerCol=()=>{if(!timerDur||timerSec==null)return headerAccent;const p=timerSec/timerDur;return p>0.4?headerAccent:p>0.15?'#956010':'#A82020'};
  const textCol=()=>(idleWarn&&ab==='presion')?'rgba(26,25,22,0.15)':'#1A1916';
  const limHint=()=>{if(delsLeft===0)return{l:'Sin más intentos',c:'#A82020'};if(isDel.current)return{l:limChars-charsInDel+' chars · '+delsLeft+' intentos',c:'#956010'};return{l:delsLeft+'/'+limDels+' intentos',c:'rgba(149,96,16,0.55)'}};
  const siL=()=>{if(!autoSave)return{l:'off',dot:'rgba(0,0,0,0.12)',c:FAINT};if(saveStatus==='saving')return{l:'Guardando…',dot:'#956010',c:MUTED};if(saveStatus==='saved')return{l:'✓',dot:'#0A7A58',c:'#0A7A58'};if(!started||!plainTxt.trim())return{l:'Auto',dot:'rgba(10,122,88,0.35)',c:FAINT};return{l:asCd+'s',dot:'rgba(10,122,88,0.5)',c:FAINT}};
  const si=siL();
  const TBTN=on=>({background:on?'rgba(0,0,0,0.08)':'transparent',border:'none',borderRadius:5,cursor:'pointer',color:on?TXT:MUTED,display:'flex',alignItems:'center',justifyContent:'center',width:26,height:26,flexShrink:0});
  const handleFinishDay=()=>{if(started)saveNow(false);onFinishDay({sk,title:headerTitle,wordCount:wc,elapsed,mode:ab,xp:sessionXP,text:edRef.current?.innerText||'',exerciseTitle:customExercise?.title||customReto?.titulo||customReto?.title||null,exerciseDesc:customExercise?.desc||customReto?.desc||null})};

/* ─── APP ROOT ───────────────────────────────────── */
const App=()=>{
  const [users,setUsers]=useState(()=>S.get('flujo:users')||[]);
  const [currentUser,setCurrentUser]=useState(null);
  const [rememberedId]=useState(()=>S.get('flujo:current'));
  const [pendingSwitch,setPendingSwitch]=useState(null);
  const [switchPin,setSwitchPin]=useState('');
  const [switchPinError,setSwitchPinError]=useState(false);
  const [view,setView]=useState('dashboard');
  const [energy,setEnergy]=useState(5);
  const [library,setLibrary]=useState([]);
  const [reflections,setReflections]=useState([]);
  const [driveState,setDriveState]=useState({});
  const [sessionConfig,setSessionConfig]=useState(null);
  const [sessionData,setSessionData]=useState(null);
  const [showExLibrary,setShowExLibrary]=useState(false);

  const loadUser=u=>{
    const lib=S.list('flujo:'+u.id+':').filter(k=>
      !k.includes(':drive')&&!k.includes(':mood')&&!k.includes(':ref')&&
      !k.includes(':check:')&&!k.includes(':reto:')&&!k.includes(':projects')&&
      !k.includes(':lastProject')&&!k.includes(':lessons_read')&&!k.includes(':apikey')&&!k.includes(':pin')
    ).map(k=>S.get(k)).filter(Boolean).sort((a,b)=>b.ts-a.ts);
    setLibrary(lib);
    const refs=S.list('flujo:'+u.id+':ref:').map(k=>S.get(k)).filter(Boolean).sort((a,b)=>b.ts-a.ts);
    setReflections(refs);
    setDriveState(S.get('flujo:drive:'+u.id)||{});
  };

  useEffect(()=>{if(currentUser)loadUser(currentUser)},[currentUser?.id]);

  const createUser=u=>{const updated=[...users,u];setUsers(updated);S.set('flujo:users',updated);S.set('flujo:current',u.id);setCurrentUser(u);setLibrary([]);setReflections([]);setDriveState({});setView('dashboard')};
  const selectUser=u=>{
    const stored=S.get('flujo:'+u.id+':pin');
    if(stored&&currentUser&&currentUser.id!==u.id){
      // switching between users — need PIN
      setPendingSwitch(u);setSwitchPin('');setSwitchPinError(false);
    } else {
      S.set('flujo:current',u.id);setCurrentUser(u);setView('dashboard');
    }
  };
  const confirmSwitchPin=()=>{
    const stored=S.get('flujo:'+pendingSwitch.id+':pin');
    if(switchPin===stored){
      S.set('flujo:current',pendingSwitch.id);setCurrentUser(pendingSwitch);
      setView('dashboard');setPendingSwitch(null);setSwitchPin('');
    } else {setSwitchPinError(true);setSwitchPin('');}
  };
  const logout=()=>{S.set('flujo:current',null);setCurrentUser(null)};
  const deleteUser=id=>{const updated=users.filter(u=>u.id!==id);setUsers(updated);S.set('flujo:users',updated);if(currentUser?.id===id){S.set('flujo:current',null);setCurrentUser(null)}};
  const updateDrive=ns=>{if(!currentUser)return;S.set('flujo:drive:'+currentUser.id,ns);setDriveState(ns)};

  const goToBriefing=e=>{setEnergy(e);setView('briefing')};
  const startSession=cfg=>{setSessionConfig(cfg);setView('editor')};
  const finishDay=data=>{setSessionData(data);setView('postSession')};
  const completeReflection=ref=>{if(ref){S.set('flujo:'+currentUser.id+':ref:'+ref.id,ref);setReflections(prev=>[ref,...prev])}setView('dashboard');loadUser(currentUser)};

  if(!currentUser)return <UserSelect users={users} onSelect={selectUser} onCreate={createUser} rememberedId={rememberedId}/>;

  // Switch-user PIN modal (shown over any screen)
  const SwitchPinModal=pendingSwitch?<div style={{position:'fixed',inset:0,background:'rgba(26,25,22,0.55)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center'}}>
    <div className="fi" style={{background:'#fff',borderRadius:16,padding:28,width:280,textAlign:'center',boxShadow:'0 8px 40px rgba(0,0,0,0.2)'}}>
      <div style={{width:48,height:48,borderRadius:'50%',background:pendingSwitch.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,fontWeight:600,color:pendingSwitch.textCol,margin:'0 auto 12px'}}>{pendingSwitch.initials}</div>
      <div style={{fontSize:15,fontWeight:600,color:TXT,marginBottom:4}}>{pendingSwitch.name}</div>
      <div style={{fontSize:12,color:MUTED,marginBottom:18}}>PIN para cambiar de perfil</div>
      <input type="password" inputMode="numeric" maxLength={4} value={switchPin}
        onChange={e=>setSwitchPin(e.target.value.replace(/[^0-9]/g,'').slice(0,4))}
        onKeyDown={e=>{if(e.key==='Enter')confirmSwitchPin();if(e.key==='Escape'){setPendingSwitch(null);setSwitchPin('');}}}
        autoFocus placeholder="····"
        style={{width:'100%',textAlign:'center',letterSpacing:8,fontSize:22,marginBottom:switchPinError?8:14,border:'0.5px solid '+(switchPinError?'rgba(197,34,31,0.5)':'rgba(0,0,0,0.12)'),borderRadius:8,padding:'10px'}}/>
      {switchPinError&&<div style={{fontSize:11,color:'#C5221F',marginBottom:10}}>PIN incorrecto</div>}
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>{setPendingSwitch(null);setSwitchPin('');}} style={{flex:1,background:'transparent',border:'0.5px solid '+BDR,borderRadius:8,padding:'9px',fontSize:13,color:MUTED,cursor:'pointer'}}>Cancelar</button>
        <button onClick={confirmSwitchPin} disabled={switchPin.length!==4} style={{flex:1,background:TXT,border:'none',borderRadius:8,padding:'9px',fontSize:13,fontWeight:500,color:'#fff',cursor:'pointer',opacity:switchPin.length!==4?0.4:1}}>Entrar</button>
      </div>
    </div>
  </div>:null;

  if(view==='postSession')return <PostSession sessionData={sessionData} onComplete={completeReflection} onBack={()=>{setView('dashboard');loadUser(currentUser)}} user={currentUser}/>;

  if(view==='editor'&&sessionConfig)return <>{SwitchPinModal}<Editor user={currentUser} users={users} library={library} setLibrary={setLibrary}
    onFinishDay={finishDay} onBack={()=>setView('briefing')} onSwitchUser={selectUser} onLogout={logout} onDeleteUser={deleteUser}
    driveState={driveState} onDriveUpdate={updateDrive} sessionConfig={sessionConfig}/></>

  if(view==='briefing')return <>{SwitchPinModal}<SessionBriefing user={currentUser} energy={energy} library={library} onStart={startSession} onBack={()=>setView('dashboard')}/></>

  return <>
    {SwitchPinModal}
    {showExLibrary&&<ExerciseLibrary user={currentUser} library={library} reflections={reflections} onClose={()=>setShowExLibrary(false)}/>}
    <Dashboard user={currentUser} users={users} library={library} reflections={reflections}
      onContinue={goToBriefing} onSwitchUser={selectUser} onLogout={logout} onDeleteUser={deleteUser}
      onOpenLibrary={()=>setShowExLibrary(true)}/>
  </>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>

          {status&&<div style={{fontSize:12,color:status.startsWith('Error')?'#C5221F':'#1E9BF0',padding:'8px 12px',background:status.startsWith('Error')?'rgba(197,34,31,0.06)':'rgba(30,155,240,0.07)',borderRadius:8}}>{status}</div>}

          <button onClick={send} disabled={!recipient||sending}
            style={{background:recipient&&!sending?TXT:'rgba(0,0,0,0.1)',border:'none',borderRadius:9,padding:'11px',fontSize:14,fontWeight:500,color:recipient&&!sending?'#fff':FAINT,cursor:recipient&&!sending?'pointer':'default'}}>
            {sending?'Enviando…':'Enviar invitación ✍️'}
          </button>
        </div>
      </div>
    </div>
  );
};

/* ─── DUET EDITOR ───────────────────────────────────────────── */
const DuetEditor=({user,duet,onClose,onUpdate})=>{
  const isA=duet.user_a===user.id;
  const myLetter=isA?'a':'b';
  const otherName=isA?(duet.name_b||'?'):(duet.name_a||'?');
  const myTurn=duet.current_turn===myLetter&&duet.status==='active';
  const finishProposedByMe=duet.finish_proposed_by===user.id;
  const finishProposedByOther=duet.status==='finish_proposed'&&!finishProposedByMe;

  const [turns,setTurns]=useState([]);
  const [loading,setLoading]=useState(true);
  const [plainTxt,setPlainTxt]=useState('');
  const [wc,setWc]=useState(0);
  const [saving,setSaving]=useState(false);
  const edRef=useRef(null);

  useEffect(()=>{
    DB.getDuetTurns(duet.id).then(t=>{setTurns(t);setLoading(false);}).catch(e=>{console.error(e);setLoading(false);});
  },[duet.id]);

  const handleInput=()=>{
    const txt=edRef.current?.innerText||'';
    setPlainTxt(txt);
    setWc(txt.trim()?txt.trim().split(/\s+/).filter(Boolean).length:0);
  };

  const canPass=myTurn&&wc>=duet.min_words;

  const passTurn=async(propose=false)=>{
    if(!canPass||saving)return;
    setSaving(true);
    try{
      const html=edRef.current?.innerHTML||'';
      await DB.addDuetTurn({duet_id:duet.id,user_id:user.id,html,plain:plainTxt,word_count:wc,turn_number:duet.turn_count+1});
      // Save to entries so it counts for daily check / stats
      try{await DB.upsertEntry({
        id:'duet_'+duet.id+'_t'+(duet.turn_count+1)+'_'+user.id.slice(-4),
        user_id:user.id,sk:'dueto',
        title:duet.title+' (turno '+(duet.turn_count+1)+')',
        session_label:'A dos manos con '+(isA?duet.name_b:duet.name_a),
        html,plain:plainTxt,word_count:wc,words_added:wc,
        elapsed:0,font_idx:0,editor_size:17,align_dir:'left',
        date:new Date().toISOString().slice(0,10),ts:Date.now(),
        visibility:'ejercicio',
      });}catch(e){console.error('duet entry:',e);}
      const newFullHtml=(duet.full_html||'')+html;
      const newFullPlain=(duet.full_plain||'')+(duet.full_plain?'\n\n':'')+plainTxt;
      const patch={
        full_html:newFullHtml,full_plain:newFullPlain,
        turn_count:duet.turn_count+1,
        current_turn:isA?'b':'a',
      };
      if(propose){patch.status='finish_proposed';patch.finish_proposed_by=user.id;}
      await DB.updateDuet(duet.id,patch);
      onUpdate();onClose();
    }catch(e){alert('Error: '+e.message);setSaving(false);}
  };

  const confirmFinish=async()=>{
    setSaving(true);
    try{
      // Save my last fragment too if I wrote something
      if(plainTxt.trim()&&wc>=duet.min_words){
        const html=edRef.current?.innerHTML||'';
        await DB.addDuetTurn({duet_id:duet.id,user_id:user.id,html,plain:plainTxt,word_count:wc,turn_number:duet.turn_count+1});
        try{await DB.upsertEntry({
          id:'duet_'+duet.id+'_t'+(duet.turn_count+1)+'_'+user.id.slice(-4),
          user_id:user.id,sk:'dueto',
          title:duet.title+' (turno final)',
          session_label:'A dos manos con '+(isA?duet.name_b:duet.name_a),
          html,plain:plainTxt,word_count:wc,words_added:wc,
          elapsed:0,font_idx:0,editor_size:17,align_dir:'left',
          date:new Date().toISOString().slice(0,10),ts:Date.now(),
          visibility:'ejercicio',
        });}catch(e){}
        await DB.updateDuet(duet.id,{
          full_html:(duet.full_html||'')+html,
          full_plain:(duet.full_plain||'')+'\n\n'+plainTxt,
          turn_count:duet.turn_count+1,
          status:'finished',
        });
      }else{
        await DB.updateDuet(duet.id,{status:'finished'});
      }
      onUpdate();onClose();
    }catch(e){alert('Error: '+e.message);setSaving(false);}
  };

  const keepWriting=async()=>{
    setSaving(true);
    try{
      await DB.updateDuet(duet.id,{status:'active',finish_proposed_by:null});
      onUpdate();onClose();
    }catch(e){alert('Error: '+e.message);setSaving(false);}
  };

  const approvePublish=async()=>{
    setSaving(true);
    try{
      const patch={};patch['publish_'+myLetter]=true;
      const otherApproved=isA?duet.publish_b:duet.publish_a;
      await DB.updateDuet(duet.id,patch);
      if(otherApproved){
        // Both approved — create the public entry
        const entryId='duet_'+duet.id.slice(0,8);
        await DB.upsertEntry({
          id:entryId,user_id:user.id,sk:'cuento',
          title:duet.title+' — con '+otherName,
          session_label:'Relato a dos manos · '+(duet.name_a||'?')+' & '+(duet.name_b||'?'),
          html:duet.full_html,plain:duet.full_plain,
          word_count:duet.full_plain.trim().split(/\s+/).filter(Boolean).length,
          elapsed:0,font_idx:0,editor_size:17,align_dir:'left',
          date:new Date().toISOString().slice(0,10),ts:Date.now(),
          visibility:'abierto',
        });
        await DB.updateDuet(duet.id,{published:true});
      }
      onUpdate();onClose();
    }catch(e){alert('Error: '+e.message);setSaving(false);}
  };

  return(
    <div style={{position:'fixed',inset:0,background:PAGE_BG,zIndex:300,display:'flex',flexDirection:'column'}}>
      {/* Header */}
      <div style={{background:'#0A1B3D',color:'#fff',padding:'12px 18px',flexShrink:0,display:'flex',alignItems:'center',gap:12}}>
        <button onClick={onClose} style={{background:'transparent',border:'none',color:'rgba(255,255,255,0.5)',fontSize:12,cursor:'pointer'}}>← Salir</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:600,fontFamily:'"Playfair Display",Georgia,serif',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>✍️ {duet.title}</div>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.5)'}}>con {otherName} · mín. {duet.min_words} pal./turno</div>
        </div>
        {duet.status==='active'&&(
          <div style={{fontSize:11,padding:'4px 12px',borderRadius:20,background:myTurn?'rgba(30,155,240,0.3)':'rgba(255,255,255,0.1)',color:myTurn?'#4CAF82':'rgba(255,255,255,0.5)',flexShrink:0}}>
            {myTurn?'Tu turno':'Turno de '+otherName}
          </div>
        )}
        {duet.status==='finished'&&<div style={{fontSize:11,padding:'4px 12px',borderRadius:20,background:'rgba(30,155,240,0.3)',color:'#A5A0E8'}}>Terminado</div>}
      </div>

      {duet.premise&&<div style={{padding:'10px 18px',background:'rgba(30,155,240,0.05)',borderBottom:'0.5px solid '+BDR,fontSize:12,color:'#1E9BF0',fontStyle:'italic',flexShrink:0}}>
        Premisa: {duet.premise}
      </div>}

      {/* Finish proposed banner */}
      {finishProposedByOther&&(
        <div style={{padding:'12px 18px',background:'rgba(27,95,170,0.08)',borderBottom:'0.5px solid rgba(27,95,170,0.2)',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
          <span style={{fontSize:13,color:'#1B5FAA',flex:1}}>{otherName} propone terminar el relato aquí.</span>
          <button onClick={confirmFinish} disabled={saving} style={{background:'#1B5FAA',border:'none',borderRadius:7,padding:'6px 14px',fontSize:12,fontWeight:500,color:'#fff',cursor:'pointer'}}>Aceptar y terminar</button>
          <button onClick={keepWriting} disabled={saving} style={{background:'transparent',border:'0.5px solid rgba(27,95,170,0.3)',borderRadius:7,padding:'6px 14px',fontSize:12,color:'#1B5FAA',cursor:'pointer'}}>Seguir escribiendo</button>
        </div>
      )}

      {/* Publish approval banner (finished) */}
      {duet.status==='finished'&&!duet.published&&(
        <div style={{padding:'12px 18px',background:'rgba(30,155,240,0.06)',borderBottom:'0.5px solid rgba(30,155,240,0.2)',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
          {(isA?duet['publish_'+'a']:duet['publish_'+'b'])
            ?<span style={{fontSize:13,color:'#1E9BF0',flex:1}}>Has aprobado la publicación. Esperando a {otherName}…</span>
            :<>
              <span style={{fontSize:13,color:'#1E9BF0',flex:1}}>¿Publicar este relato en la Biblioteca con ambos autores?</span>
              <button onClick={approvePublish} disabled={saving} style={{background:'#1E9BF0',border:'none',borderRadius:7,padding:'6px 14px',fontSize:12,fontWeight:500,color:'#fff',cursor:'pointer'}}>Aprobar publicación</button>
            </>}
        </div>
      )}
      {duet.published&&<div style={{padding:'10px 18px',background:'rgba(30,155,240,0.07)',borderBottom:'0.5px solid rgba(30,155,240,0.2)',fontSize:13,color:'#1E9BF0',flexShrink:0}}>✓ Publicado en la Biblioteca</div>}

      {/* Body */}
      <div style={{flex:1,overflowY:'auto',padding:'24px 24px 120px',maxWidth:680,width:'100%',margin:'0 auto'}}>
        {loading?<div style={{textAlign:'center',color:MUTED,fontSize:13,padding:40}}>Cargando…</div>:(
          <>
            {/* Previous text (read-only) */}
            {duet.full_html
              ?<div style={{fontSize:16,lineHeight:1.85,color:'rgba(26,25,22,0.75)',fontFamily:'"Playfair Display",Georgia,serif',marginBottom:20,paddingBottom:20,borderBottom:myTurn?'1px dashed rgba(30,155,240,0.3)':'none'}}
                dangerouslySetInnerHTML={{__html:duet.full_html}}/>
              :<div style={{fontSize:13,color:FAINT,marginBottom:20,fontStyle:'italic'}}>El relato está en blanco. {myTurn?'Tú lo empiezas.':''}</div>}

            {/* My writing area (only if my turn) */}
            {myTurn&&(
              <div>
                <div style={{fontSize:11,fontWeight:500,color:'#1E9BF0',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:8}}>Tu turno — continúa el relato</div>
                <div ref={edRef} contentEditable suppressContentEditableWarning onInput={handleInput}
                  style={{minHeight:160,outline:'none',fontSize:16,lineHeight:1.85,fontFamily:'"Playfair Display",Georgia,serif',color:PROSE_TEXT,caretColor:NARANJA,padding:'4px 0'}}/>
              </div>
            )}
            {!myTurn&&duet.status==='active'&&(
              <div style={{textAlign:'center',padding:'20px',background:'rgba(0,0,0,0.025)',borderRadius:12,fontSize:13,color:MUTED}}>
                ⏳ Es el turno de {otherName}. Te avisaremos cuando te toque.
              </div>
            )}
          </>
        )}
      </div>

      {/* Bottom bar (my turn) */}
      {myTurn&&(
        <div className="duet-bar" style={{position:'absolute',bottom:0,left:0,right:0,padding:'12px 20px',background:canPass?'rgba(30,155,240,0.97)':'rgba(26,25,22,0.95)',display:'flex',alignItems:'center',gap:12,transition:'background 0.4s',flexWrap:'wrap'}}>
          <div style={{flex:1,fontSize:13,color:'#fff'}}>
            <strong>{wc}</strong> / {duet.min_words} palabras
            {!canPass&&<span style={{color:'rgba(255,255,255,0.5)',marginLeft:8}}>Faltan {duet.min_words-wc} para poder pasar el turno</span>}
            {canPass&&<span style={{marginLeft:8}}>✓ ¡Mínimo alcanzado!</span>}
          </div>
          <button onClick={()=>passTurn(true)} disabled={!canPass||saving}
            style={{background:'transparent',border:'0.5px solid rgba(255,255,255,0.3)',borderRadius:8,padding:'9px 14px',fontSize:12,color:canPass?'rgba(255,255,255,0.8)':'rgba(255,255,255,0.3)',cursor:canPass?'pointer':'default'}}>
            Proponer fin
          </button>
          <button onClick={()=>passTurn(false)} disabled={!canPass||saving}
            style={{background:canPass?'#fff':'rgba(255,255,255,0.15)',border:'none',borderRadius:8,padding:'9px 18px',fontSize:13,fontWeight:600,color:canPass?'#1E9BF0':'rgba(255,255,255,0.3)',cursor:canPass?'pointer':'default'}}>
            {saving?'Guardando…':'Pasar el turno →'}
          </button>
        </div>
      )}
    </div>
  );
};

/* ─── DUETS HUB (dashboard widget) ──────────────────────────── */
const DuetsHub=({user})=>{
  const [duets,setDuets]=useState([]);
  const [openDuet,setOpenDuet]=useState(null);
  const [loaded,setLoaded]=useState(false);

  const load=async()=>{
    try{const d=await DB.getMyDuets(user.id);setDuets(d);}catch(e){console.error(e);}
    setLoaded(true);
  };
  useEffect(()=>{load();},[user.id]);

  const isA=d=>d.user_a===user.id;
  const invitations=duets.filter(d=>d.status==='pending'&&!isA(d));
  const pendingSent=duets.filter(d=>d.status==='pending'&&isA(d));
  const active=duets.filter(d=>['active','finish_proposed'].includes(d.status));
  const finished=duets.filter(d=>d.status==='finished'&&!d.published);
  const myTurnDuets=active.filter(d=>(d.current_turn==='a'&&isA(d))||(d.current_turn==='b'&&!isA(d)));

  const accept=async(d)=>{
    try{await DB.updateDuet(d.id,{status:'active'});load();}
    catch(e){alert('Error: '+e.message);}
  };
  const decline=async(d)=>{
    try{await DB.updateDuet(d.id,{status:'declined'});load();}
    catch(e){alert('Error: '+e.message);}
  };

  if(!loaded||(invitations.length===0&&active.length===0&&finished.length===0&&pendingSent.length===0))return null;

  return(
    <>
      {openDuet&&<DuetEditor user={user} duet={openDuet} onClose={()=>setOpenDuet(null)} onUpdate={load}/>}
      <div className="fu" style={{background:CARD_BG,border:'1px solid '+BDR,borderRadius:14,padding:'16px 20px',marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:TXT,marginBottom:12,fontFamily:'"Playfair Display",serif'}}>✍️ Relatos a dos manos</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>

          {invitations.map(d=>(
            <div key={d.id} style={{background:'rgba(30,155,240,0.05)',border:'0.5px solid rgba(30,155,240,0.2)',borderRadius:10,padding:'12px 14px'}}>
              <div style={{fontSize:13,color:TXT,marginBottom:8}}><strong>{d.name_a}</strong> te invita a escribir «{d.title}» (mín. {d.min_words} pal./turno)</div>
              {d.premise&&<div style={{fontSize:12,color:MUTED,fontStyle:'italic',marginBottom:8}}>"{d.premise}"</div>}
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>accept(d)} style={{background:AZUL,border:'none',borderRadius:7,padding:'5px 14px',fontSize:12,fontWeight:600,color:'#fff',cursor:'pointer'}}>Aceptar ✍️</button>
                <button onClick={()=>decline(d)} style={{background:'transparent',border:'0.5px solid '+BDR,borderRadius:6,padding:'5px 14px',fontSize:12,color:MUTED,cursor:'pointer'}}>Rechazar</button>
              </div>
            </div>
          ))}

          {active.map(d=>{
            const myTurn=(d.current_turn==='a'&&isA(d))||(d.current_turn==='b'&&!isA(d));
            const other=isA(d)?d.name_b:d.name_a;
            return(
              <div key={d.id} style={{display:'flex',alignItems:'center',gap:10,background:myTurn?'rgba(30,155,240,0.06)':'rgba(10,27,61,0.025)',border:'1px solid '+(myTurn?'rgba(30,155,240,0.3)':BDR),borderRadius:10,padding:'10px 14px'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500,color:TXT,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.title}</div>
                  <div style={{fontSize:11,color:myTurn?AZUL:MUTED}}>
                    con {other} · {d.status==='finish_proposed'?'propuesta de fin pendiente':myTurn?'✍️ ¡Es tu turno!':'turno de '+other}
                  </div>
                </div>
                <button onClick={()=>setOpenDuet(d)}
                  style={{background:myTurn?AZUL:'transparent',border:myTurn?'none':'1px solid '+BDR,borderRadius:7,padding:'6px 14px',fontSize:12,fontWeight:600,color:myTurn?'#fff':MUTED,cursor:'pointer',flexShrink:0}}>
                  {myTurn?'Escribir →':'Ver'}
                </button>
              </div>
            );
          })}

          {finished.map(d=>{
            const other=isA(d)?d.name_b:d.name_a;
            const iApproved=isA(d)?d.publish_a:d.publish_b;
            return(
              <div key={d.id} style={{display:'flex',alignItems:'center',gap:10,background:'rgba(27,95,170,0.05)',border:'1px solid rgba(27,95,170,0.2)',borderRadius:10,padding:'10px 14px'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500,color:TXT}}>{d.title} <span style={{fontSize:11,color:MUTED}}>· terminado</span></div>
                  <div style={{fontSize:11,color:MUTED}}>{iApproved?'Esperando aprobación de '+other:'¿Publicar en la Biblioteca?'}</div>
                </div>
                <button onClick={()=>setOpenDuet(d)} style={{background:'transparent',border:'1px solid rgba(27,95,170,0.35)',borderRadius:7,padding:'6px 14px',fontSize:12,color:'#1E9BF0',cursor:'pointer',flexShrink:0}}>Abrir</button>
              </div>
            );
          })}

          {pendingSent.map(d=>(
            <div key={d.id} style={{fontSize:12,color:FAINT,padding:'4px 2px'}}>
              ⏳ Invitación enviada a {d.name_b} para «{d.title}» — esperando respuesta
            </div>
          ))}
        </div>
      </div>
    </>
  );
};


/* ─── FEEDBACK WIDGET (dashboard) ───────────────────────────── */
const FeedbackWidget=({user,library})=>{
  const [feedback,setFeedback]=useState(null);
  const myIds=useMemo(()=>library.filter(e=>e.visibility==='abierto'||e.visibility==='amigos').map(e=>e.id),[library]);
  const titleById=useMemo(()=>{const m={};library.forEach(e=>{m[e.id]=e.title;});return m;},[library]);

  useEffect(()=>{
    if(!myIds.length){setFeedback({comments:[],ratingsCount:0,reactionsCount:0});return;}
    DB.getMyFeedback(myIds).then(setFeedback).catch(()=>setFeedback({comments:[],ratingsCount:0,reactionsCount:0}));
  },[myIds.join(',')]);

  if(!feedback)return null;

  const seenKey='pretexto:seen_feedback:'+user.id;
  const seen=S.get(seenKey)||{commentIds:[],ratingsCount:0,reactionsCount:0};
  const newComments=feedback.comments.filter(c=>c.user_id!==user.id&&!seen.commentIds.includes(c.id));
  const newRatings=Math.max(0,feedback.ratingsCount-(seen.ratingsCount||0));
  const newReactions=Math.max(0,feedback.reactionsCount-(seen.reactionsCount||0));

  if(newComments.length===0&&newRatings===0&&newReactions===0)return null;

  const markSeen=()=>{
    S.set(seenKey,{
      commentIds:feedback.comments.map(c=>c.id),
      ratingsCount:feedback.ratingsCount,
      reactionsCount:feedback.reactionsCount,
    });
    setFeedback({...feedback}); // re-render
  };

  return(
    <div className="fu" style={{background:CARD_BG,border:'1px solid rgba(27,95,170,0.35)',borderRadius:14,padding:'16px 20px',marginBottom:16,position:'relative',overflow:'hidden'}}>
      <Signo char="*" size={90} top={-16} right={6} color="naranja"/>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,position:'relative',zIndex:1}}>
        <div style={{fontSize:12,fontWeight:700,color:AZULMED,fontFamily:'"Playfair Display",serif'}}>✨ Tu escritura está recibiendo feedback</div>
        <button onClick={markSeen} style={{background:'transparent',border:'none',fontSize:11,color:FAINT,cursor:'pointer',padding:0}}>Marcar como visto</button>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {newComments.slice(0,5).map(c=>(
          <div key={c.id} style={{fontSize:12,color:TXT,display:'flex',gap:6,alignItems:'baseline'}}>
            <span>💬</span>
            <span><strong>{c.author_name}</strong> comentó «{titleById[c.entry_id]||'tu texto'}»: <span style={{color:MUTED,fontStyle:'italic'}}>"{c.comment.slice(0,80)}{c.comment.length>80?'…':''}"</span></span>
          </div>
        ))}
        {newRatings>0&&<div style={{fontSize:12,color:TXT}}>★ Has recibido <strong>{newRatings}</strong> valoración{newRatings>1?'es':''} nueva{newRatings>1?'s':''}</div>}
        {newReactions>0&&<div style={{fontSize:12,color:TXT}}>👏 Has recibido <strong>{newReactions}</strong> reacción{newReactions>1?'es':''} nueva{newReactions>1?'s':''}</div>}
      </div>
    </div>
  );
};

/* ─── SHARE NUDGE (dashboard) ───────────────────────────────── */
const ShareNudge=({user,library})=>{
  const [dismissed,setDismissed]=useState(()=>!!S.get('pretexto:nudge_share:'+user.id));
  const realTexts=library.filter(e=>e.visibility!=='ejercicio');
  const privCount=realTexts.filter(e=>!e.visibility||e.visibility==='privado').length;
  const sharedCount=realTexts.filter(e=>e.visibility==='abierto'||e.visibility==='amigos').length;

  if(dismissed||sharedCount>0||privCount<5)return null;

  return(
    <div className="fu" style={{background:'rgba(30,155,240,0.05)',border:'0.5px solid rgba(30,155,240,0.2)',borderRadius:14,padding:'14px 18px',marginBottom:16,display:'flex',alignItems:'center',gap:12}}>
      <span style={{fontSize:22,flexShrink:0}}>📚</span>
      <div style={{flex:1,fontSize:12,color:TXT,lineHeight:1.5}}>
        Tienes <strong>{privCount} textos</strong> que nadie puede leer. ¿Por qué no compartes tu favorito? Pulsa el 🔒 junto a cualquier texto para hacerlo visible.
      </div>
      <button onClick={()=>{S.set('pretexto:nudge_share:'+user.id,true);setDismissed(true);}}
        style={{background:'transparent',border:'none',fontSize:14,color:FAINT,cursor:'pointer',flexShrink:0}}>✕</button>
    </div>
  );
};


/* ─── CHAIN EDITOR (Encadenados) ───────────────────────────── */
const ChainEditor=({user,chain,startingFresh,onClose,onUpdate})=>{
  // chain=null + startingFresh=true → primer capítulo de una cadena nueva
  // chain=objeto → continuar escribiendo el siguiente capítulo de una cadena existente
  const [step,setStep]=useState('write'); // write | nominate | done
  const [plainTxt,setPlainTxt]=useState('');
  const [wc,setWc]=useState(0);
  const [saving,setSaving]=useState(false);
  const [chapters,setChapters]=useState([]);
  const [loadingChapters,setLoadingChapters]=useState(!!chain);
  const edRef=useRef(null);

  // Datos del paso de nominación
  const [chainTitle,setChainTitle]=useState(chain?.title||'');
  const [openNomination,setOpenNomination]=useState(false);
  const [nomQuery,setNomQuery]=useState('');
  const [nomResults,setNomResults]=useState([]);
  const [nominees,setNominees]=useState([]);

  const MIN_WORDS=chain?.min_words||600;
  const requiredStart=chain?.last_sentence||'';
  const chapterNumber=(chain?.chapter_count||0)+1;

  useEffect(()=>{
    if(!chain)return;
    DB.getChainChapters(chain.id).then(c=>{setChapters(c);setLoadingChapters(false);}).catch(()=>setLoadingChapters(false));
  },[chain?.id]);

  // Pre-rellenar con la frase obligatoria al empezar a escribir
  useEffect(()=>{
    if(requiredStart&&edRef.current&&!edRef.current.innerText.trim()){
      edRef.current.innerText=requiredStart+' ';
      const txt=edRef.current.innerText;
      setPlainTxt(txt);
      setWc(txt.trim().split(/\s+/).filter(Boolean).length);
    }
  },[requiredStart]);

  useEffect(()=>{
    if(nomQuery.length<2){setNomResults([]);return;}
    const t=setTimeout(async()=>{
      try{const r=await DB.searchUsers(nomQuery);setNomResults(r.filter(u=>u.id!==user.id&&!nominees.find(n=>n.id===u.id)));}catch(e){}
    },300);
    return()=>clearTimeout(t);
  },[nomQuery,nominees]);

  const handleInput=()=>{
    const txt=edRef.current?.innerText||'';
    setPlainTxt(txt);
    setWc(txt.trim()?txt.trim().split(/\s+/).filter(Boolean).length:0);
  };

  const canFinish=wc>=MIN_WORDS;

  const extractLastSentence=txt=>{
    const parts=txt.trim().split(/(?<=[.!?])\s+/).filter(Boolean);
    return parts[parts.length-1]||txt.trim().slice(-140);
  };

  const goNominate=()=>{ if(canFinish) setStep('nominate'); };

  const confirmPublish=async()=>{
    if(!openNomination&&nominees.length===0){
      alert('Elige al menos un nominado, o marca "Nominación abierta".');return;
    }
    setSaving(true);
    try{
      const html=edRef.current?.innerHTML||'';
      const lastSentence=extractLastSentence(plainTxt);
      let chainId=chain?.id;
      let newChapterNumber=chapterNumber;

      if(!chain){
        // Crear la cadena + capítulo 1
        const created=await DB.createChain({
          title:chainTitle.trim()||'Relato encadenado',
          min_words:600,
          status:'active',
          chapter_count:1,
          full_html:html,
          full_plain:plainTxt,
          last_sentence:lastSentence,
          creator_id:user.id,
        });
        chainId=created.id;
        newChapterNumber=1;
        await DB.addChainChapter({chain_id:chainId,user_id:user.id,author_name:user.name,html,plain:plainTxt,word_count:wc,chapter_number:1});
      }else{
        await DB.addChainChapter({chain_id:chainId,user_id:user.id,author_name:user.name,html,plain:plainTxt,word_count:wc,chapter_number:newChapterNumber});
        await DB.updateChain(chainId,{
          chapter_count:newChapterNumber,
          full_html:(chain.full_html||'')+html,
          full_plain:(chain.full_plain||'')+'\n\n'+plainTxt,
          last_sentence:lastSentence,
        });
        // Invalida el resto de nominaciones para este capítulo (alguien ya lo escribió: nosotros)
        await DB.invalidateNominations(chainId,newChapterNumber).catch(()=>{});
      }

      // Crear nominaciones para el SIGUIENTE capítulo
      const nextChapter=newChapterNumber+1;
      if(openNomination){
        await DB.createNomination({chain_id:chainId,chapter_number:nextChapter,nominated_user_id:null,nominated_by:user.id});
      }else{
        for(const n of nominees){
          await DB.createNomination({chain_id:chainId,chapter_number:nextChapter,nominated_user_id:n.id,nominated_by:user.id});
        }
      }

      // Guardar también en mi biblioteca personal (visible, ya que el relato es público por naturaleza)
      try{
        await DB.upsertEntry({
          id:'chain_'+chainId+'_ch'+newChapterNumber,
          user_id:user.id,sk:'cadena',
          title:(chainTitle.trim()||chain?.title||'Relato encadenado')+' — cap. '+newChapterNumber,
          session_label:'Encadenado · capítulo '+newChapterNumber,
          html,plain:plainTxt,word_count:wc,words_added:wc,
          elapsed:0,font_idx:0,editor_size:17,align_dir:'left',
          date:new Date().toISOString().slice(0,10),ts:Date.now(),
          visibility:'abierto',
        });
      }catch(e){console.error('chain entry:',e);}

      setStep('done');
      onUpdate&&onUpdate();
    }catch(e){
      if(e.message?.includes('duplicate')||e.code==='23505'){
        alert('Alguien se ha adelantado y ya ha escrito este capítulo. Vuelve a intentarlo con otra cadena.');
        onClose();
      }else{
        alert('Error: '+e.message);
      }
    }
    setSaving(false);
  };

  return(
    <div style={{position:'fixed',inset:0,background:PAGE_BG,zIndex:300,display:'flex',flexDirection:'column'}}>
      {/* Header */}
      <div style={{background:'#0A1B3D',color:'#fff',padding:'12px 18px',flexShrink:0,display:'flex',alignItems:'center',gap:12}}>
        <button onClick={onClose} style={{background:'transparent',border:'none',color:'rgba(255,255,255,0.5)',fontSize:12,cursor:'pointer'}}>← Salir</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:600,fontFamily:'"Playfair Display",serif',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {chain?chain.title:'Nuevo relato encadenado'}
          </div>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.5)'}}>
            {chain?'Capítulo '+chapterNumber:'Capítulo 1'} · mín. {MIN_WORDS} palabras
          </div>
        </div>
        {step==='write'&&<div style={{fontSize:11,padding:'4px 12px',borderRadius:20,background:canFinish?'rgba(241,90,36,0.3)':'rgba(255,255,255,0.1)',color:canFinish?'#FCA56A':'rgba(255,255,255,0.5)',flexShrink:0}}>
          {wc} / {MIN_WORDS}
        </div>}
      </div>

      {/* ── PASO: escribir ── */}
      {step==='write'&&(
        <div style={{flex:1,overflowY:'auto',padding:'24px 24px 120px',maxWidth:680,width:'100%',margin:'0 auto'}}>
          {loadingChapters?<div style={{textAlign:'center',color:MUTED,fontSize:13,padding:40}}>Cargando…</div>:(
            <>
              {chain&&chapters.length>0&&(
                <div style={{fontSize:16,lineHeight:1.85,color:'rgba(26,25,22,0.7)',fontFamily:'"Playfair Display",serif',marginBottom:20,paddingBottom:20,borderBottom:'1px dashed '+BDR,maxHeight:280,overflowY:'auto'}}
                  dangerouslySetInnerHTML={{__html:chapters.map(c=>c.html).join('<hr style="opacity:0.15;margin:16px 0">')}}/>
              )}
              {requiredStart&&(
                <div style={{fontSize:11,fontWeight:600,color:NARANJA,textTransform:'uppercase',letterSpacing:'.1em',marginBottom:8}}>
                  Debes empezar con esta frase
                </div>
              )}
              <div ref={edRef} contentEditable suppressContentEditableWarning onInput={handleInput}
                style={{minHeight:200,outline:'none',fontSize:16,lineHeight:1.85,fontFamily:'"Playfair Display",serif',color:PROSE_TEXT,caretColor:NARANJA,padding:'4px 0'}}/>
            </>
          )}
        </div>
      )}

      {/* ── PASO: nominar ── */}
      {step==='nominate'&&(
        <div style={{flex:1,overflowY:'auto',padding:'28px 24px',maxWidth:480,width:'100%',margin:'0 auto'}}>
          <div style={{fontFamily:'"Playfair Display",serif',fontSize:20,fontWeight:700,color:TXT,marginBottom:6}}>¿Quién continúa?</div>
          <div style={{fontSize:13,color:MUTED,marginBottom:22,lineHeight:1.5}}>Elige a una o varias personas, o deja la nominación abierta para que cualquiera pueda reclamar el siguiente capítulo.</div>

          {!chain&&(
            <div style={{marginBottom:18}}>
              <label style={{display:'block',font:"600 11px/1 'Source Sans 3'",letterSpacing:'.1em',textTransform:'uppercase',color:FAINT,marginBottom:7}}>Título del relato</label>
              <input type="text" value={chainTitle} onChange={e=>setChainTitle(e.target.value)} placeholder="Relato encadenado" style={{width:'100%'}}/>
            </div>
          )}

          <div onClick={()=>setOpenNomination(v=>!v)} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',background:openNomination?'rgba(30,155,240,0.07)':'rgba(10,27,61,0.03)',border:'1px solid '+(openNomination?'rgba(30,155,240,0.3)':BDR),borderRadius:10,cursor:'pointer',marginBottom:16}}>
            <div style={{width:18,height:18,borderRadius:4,border:'1.5px solid '+(openNomination?AZUL:BDR),background:openNomination?AZUL:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              {openNomination&&<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4L4 7L9 1" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
            </div>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:TXT}}>Nominación abierta</div>
              <div style={{fontSize:11,color:MUTED}}>Cualquiera podrá reclamar este capítulo desde la Biblioteca</div>
            </div>
          </div>

          {!openNomination&&(
            <>
              <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:nominees.length?10:0}}>
                {nominees.map(n=>(
                  <span key={n.id} style={{display:'flex',alignItems:'center',gap:6,background:'rgba(27,95,170,0.1)',border:'1px solid rgba(27,95,170,0.25)',borderRadius:20,padding:'4px 6px 4px 10px',fontSize:12,color:AZULMED}}>
                    {n.name}
                    <button onClick={()=>setNominees(p=>p.filter(x=>x.id!==n.id))} style={{background:'transparent',border:'none',cursor:'pointer',color:AZULMED,fontSize:13,padding:0,lineHeight:1}}>×</button>
                  </span>
                ))}
              </div>
              <div style={{position:'relative'}}>
                <input type="text" value={nomQuery} onChange={e=>setNomQuery(e.target.value)} placeholder="Buscar por nombre o @usuario…" style={{width:'100%'}}/>
                {nomResults.length>0&&<div style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,background:CARD_BG,border:'1px solid '+BDR,borderRadius:9,boxShadow:'0 12px 30px -8px rgba(10,27,61,0.25)',overflow:'hidden',zIndex:10}}>
                  {nomResults.map(r=>(
                    <button key={r.id} onClick={()=>{setNominees(p=>[...p,r]);setNomQuery('');setNomResults([]);}}
                      style={{display:'flex',alignItems:'center',gap:10,width:'100%',background:'transparent',border:'none',padding:'9px 12px',cursor:'pointer',borderBottom:'1px solid '+BDR}}>
                      <UserAvatar user={r} size={26}/>
                      <span style={{fontSize:12,color:TXT}}>{r.name}</span>
                    </button>
                  ))}
                </div>}
              </div>
            </>
          )}

          <div style={{display:'flex',gap:10,marginTop:24}}>
            <button onClick={()=>setStep('write')} style={{flex:'0 0 auto',background:'transparent',border:'1px solid '+BDR,borderRadius:9,padding:'11px 16px',fontSize:13,color:MUTED,cursor:'pointer',fontFamily:"'Source Sans 3',sans-serif"}}>← Seguir escribiendo</button>
            <button onClick={confirmPublish} disabled={saving} style={{flex:1,background:ADVANCE_BG,border:'none',borderRadius:9,padding:'11px',fontSize:13.5,fontWeight:600,color:ADVANCE_TXT,cursor:'pointer',fontFamily:"'Source Sans 3',sans-serif",opacity:saving?0.6:1}}>
            {saving?'Publicando…':'Publicar y nominar →'}
            </button>
          </div>
        </div>
      )}

      {/* ── PASO: hecho ── */}
      {step==='done'&&(
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',padding:24}}>
          <div style={{fontSize:42,marginBottom:14}}>✓</div>
          <div style={{fontFamily:'"Playfair Display",serif',fontSize:20,fontWeight:700,color:TXT,marginBottom:8}}>¡Capítulo publicado!</div>
          <div style={{fontSize:13,color:MUTED,marginBottom:24,maxWidth:340,lineHeight:1.5}}>
            {openNomination?'Cualquiera podrá reclamar el siguiente capítulo desde la Biblioteca.':'Hemos avisado a la persona nominada para que continúe el relato.'}
          </div>
          <button onClick={onClose} style={{background:ADVANCE_BG,border:'none',borderRadius:9,padding:'11px 24px',fontSize:13.5,fontWeight:600,color:ADVANCE_TXT,cursor:'pointer',fontFamily:"'Source Sans 3',sans-serif"}}>Volver al inicio</button>
        </div>
      )}

      {/* Bottom bar — solo en el paso de escritura */}
      {step==='write'&&(
        <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'12px 20px',background:canFinish?'rgba(241,90,36,0.97)':'rgba(26,25,22,0.95)',display:'flex',alignItems:'center',gap:12,transition:'background 0.4s',flexWrap:'wrap'}}>
          <div style={{flex:1,fontSize:13,color:'#fff'}}>
            <strong>{wc}</strong> / {MIN_WORDS} palabras
            {!canFinish&&<span style={{color:'rgba(255,255,255,0.6)',marginLeft:8}}>Faltan {MIN_WORDS-wc} para poder publicar</span>}
            {canFinish&&<span style={{marginLeft:8}}>✓ ¡Mínimo alcanzado!</span>}
          </div>
          <button onClick={goNominate} disabled={!canFinish}
            style={{background:canFinish?'#fff':'rgba(255,255,255,0.15)',border:'none',borderRadius:8,padding:'9px 18px',fontSize:13,fontWeight:600,color:canFinish?'#A8390F':'rgba(255,255,255,0.3)',cursor:canFinish?'pointer':'default',fontFamily:"'Source Sans 3',sans-serif"}}>
            Terminar y nominar →
          </button>
        </div>
      )}
    </div>
  );
};



/* ─── CHAINS HUB (dashboard widget) ─────────────────────────── */
const ChainsHub=({user})=>{
  const [myNoms,setMyNoms]=useState([]);
  const [myChains,setMyChains]=useState([]);
  const [openChain,setOpenChain]=useState(null); // {chain,fresh}
  const [loaded,setLoaded]=useState(false);

  const load=async()=>{
    try{
      const [noms,chains]=await Promise.all([DB.getMyNominations(user.id),DB.getMyChains(user.id)]);
      setMyNoms(noms);
      setMyChains(chains.filter(c=>c.status==='active'));
    }catch(e){console.error(e);}
    setLoaded(true);
  };
  useEffect(()=>{load();},[user.id]);

  if(!loaded||(myNoms.length===0&&myChains.length===0))return null;

  return(
    <>
      {openChain&&<ChainEditor user={user} chain={openChain.chain} startingFresh={openChain.fresh} onClose={()=>setOpenChain(null)} onUpdate={load}/>}
      <div className="fu" style={{background:CARD_BG,border:'1px solid '+BDR,borderRadius:14,padding:'16px 20px',marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:TXT,marginBottom:12,fontFamily:'"Playfair Display",serif'}}>⛓ Encadenados</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>

          {myNoms.map(n=>(
            <div key={n.id} style={{background:'rgba(241,90,36,0.06)',border:'1px solid rgba(241,90,36,0.22)',borderRadius:10,padding:'12px 14px'}}>
              <div style={{fontSize:13,color:TXT,marginBottom:6}}>Te han nominado para continuar <strong>«{n.chains?.title}»</strong> · capítulo {n.chapter_number}</div>
              {n.chains?.last_sentence&&<div style={{fontSize:12,color:MUTED,fontStyle:'italic',marginBottom:8}}>"…{n.chains.last_sentence}"</div>}
              <button onClick={()=>setOpenChain({chain:n.chains,fresh:false})} style={{background:NARANJA,border:'none',borderRadius:7,padding:'6px 14px',fontSize:12,fontWeight:600,color:'#fff',cursor:'pointer'}}>Escribir capítulo →</button>
            </div>
          ))}

          {myChains.map(c=>(
            <div key={c.id} style={{display:'flex',alignItems:'center',gap:10,background:'rgba(10,27,61,0.025)',border:'1px solid '+BDR,borderRadius:10,padding:'10px 14px'}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:500,color:TXT,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.title}</div>
                <div style={{fontSize:11,color:MUTED}}>{c.chapter_count} capítulo{c.chapter_count!==1?'s':''} · esperando continuación</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </>
  );
};

/* ─── PASSWORD RESET MODAL ─────────────────────────────────── */
const PasswordResetModal=({onClose})=>{
  const [password,setPassword]=useState('');
  const [confirm,setConfirm]=useState('');
  const [loading,setLoading]=useState(false);
  const [done,setDone]=useState(false);
  const [error,setError]=useState('');

  const handleSubmit=async()=>{
    if(password.length<6){setError('La contraseña debe tener al menos 6 caracteres');return;}
    if(password!==confirm){setError('Las contraseñas no coinciden');return;}
    setLoading(true);setError('');
    try{
      await DB.updatePassword(password);
      setDone(true);
    }catch(e){
      setError('Error al actualizar la contraseña. Vuelve a intentarlo.');
    }
    setLoading(false);
  };

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(10,27,61,0.55)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center',padding:'24px 16px'}}>
      <div style={{background:CARD_BG,borderRadius:16,width:'100%',maxWidth:380,padding:'28px 26px',position:'relative',overflow:'hidden',boxShadow:'0 24px 60px -20px rgba(10,27,61,0.4)'}}>
        <Signo char="*" size={120} top={-14} right={-6} color="naranja"/>
        <div style={{fontSize:19,fontWeight:700,color:TXT,marginBottom:6,letterSpacing:'-0.02em',fontFamily:'"Playfair Display",serif',position:'relative',zIndex:1}}>Nueva contraseña</div>
        <div style={{fontSize:13,color:MUTED,marginBottom:20,position:'relative',zIndex:1}}>Elige una contraseña nueva para tu cuenta.</div>
        {done?(
          <div style={{textAlign:'center',position:'relative',zIndex:1}}>
            <div style={{fontSize:36,marginBottom:12}}>✅</div>
            <div style={{fontSize:15,fontWeight:700,color:TXT,marginBottom:8,fontFamily:'"Playfair Display",serif'}}>¡Contraseña actualizada!</div>
            <div style={{fontSize:13,color:MUTED,marginBottom:20}}>Ya puedes entrar con tu nueva contraseña.</div>
            <button onClick={onClose} style={{width:'100%',background:ADVANCE_BG,color:ADVANCE_TXT,border:'none',borderRadius:9,padding:'13px',fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:"'Source Sans 3',sans-serif"}}>
              Ir al inicio
            </button>
          </div>
        ):(
          <div style={{position:'relative',zIndex:1}}>
            {error&&<div style={{background:'rgba(197,34,31,0.07)',border:'1px solid rgba(197,34,31,0.2)',borderRadius:9,padding:'10px 14px',marginBottom:14,fontSize:13,color:DANGER}}>{error}</div>}
            <div style={{marginBottom:14}}>
              <label style={{fontSize:11,fontWeight:600,color:FAINT,textTransform:'uppercase',letterSpacing:'.1em',display:'block',marginBottom:7}}>Nueva contraseña</label>
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
                placeholder="Mínimo 6 caracteres"
                style={{width:'100%',border:'1px solid '+BDR,borderRadius:10,padding:'11px 13px',fontSize:14,outline:'none',fontFamily:'inherit',color:TXT,background:CARD_BG}}/>
            </div>
            <div style={{marginBottom:20}}>
              <label style={{fontSize:11,fontWeight:600,color:FAINT,textTransform:'uppercase',letterSpacing:'.1em',display:'block',marginBottom:7}}>Confirmar contraseña</label>
              <input type="password" value={confirm} onChange={e=>setConfirm(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&handleSubmit()}
                placeholder="Repite la contraseña"
                style={{width:'100%',border:'1px solid '+BDR,borderRadius:10,padding:'11px 13px',fontSize:14,outline:'none',fontFamily:'inherit',color:TXT,background:CARD_BG}}/>
            </div>
            <button onClick={handleSubmit} disabled={loading||!password||!confirm}
              style={{width:'100%',background:ADVANCE_BG,color:ADVANCE_TXT,border:'none',borderRadius:10,padding:'13px',fontSize:14,fontWeight:600,cursor:loading||!password||!confirm?'default':'pointer',opacity:loading||!password||!confirm?0.6:1,fontFamily:"'Source Sans 3',sans-serif"}}>
              {loading?'Actualizando…':'Guardar nueva contraseña'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
};

          ['8. Limitación de responsabilidad','Pretexto no garantiza la disponibilidad continua del servicio. No somos responsables de la pérdida de datos. Recomendamos hacer backups periódicos con la función incluida en la app.'],
          ['9. Cancelación','Puedes eliminar tu cuenta en cualquier momento escribiéndonos a sonicandogit@gmail.com. Eliminaremos todos tus datos en un plazo de 30 días.'],
          ['10. Legislación aplicable','Estos términos se rigen por la legislación española y europea aplicable.'],
        ].map(([title,text])=>(
          <div key={title} style={{marginBottom:20}}>
            <div style={{fontSize:13,fontWeight:600,color:TXT,marginBottom:6}}>{title}</div>
            <div style={{fontSize:12,color:MUTED,lineHeight:1.75}}>{text}</div>
          </div>
        ))}
      </div>
      <div style={{padding:'12px 24px',borderTop:'0.5px solid '+BDR,flexShrink:0,textAlign:'right'}}>
        <button onClick={onClose} style={{background:TXT,border:'none',borderRadius:8,padding:'9px 20px',fontSize:13,fontWeight:500,color:'#fff',cursor:'pointer'}}>Cerrar</button>
      </div>
    </div>
  </div>
)


/* ─── APP ROOT ─────────────────────────────────────── */
const App=()=>{
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState('dashboard');
  const [energy,setEnergy]=useState(5);
  const [library,setLibrary]=useState([]);
  const [reflections,setReflections]=useState([]);
  const [projects,setProjects]=useState([]);
  const [sessionConfig,setSessionConfig]=useState(null);
  const [sessionData,setSessionData]=useState(null);
  const [showExLibrary,setShowExLibrary]=useState(false);
  const [syncStatus,setSyncStatus]=useState(null);
  const [driveRefresh,setDriveRefresh]=useState(0);
  const [receivedChallenges,setReceivedChallenges]=useState([]);
  const [cuentoChallenge,setCuentoChallenge]=useState(null);
  const [editingEntry,setEditingEntry]=useState(null);
  const [showWelcome,setShowWelcome]=useState(false);
  const [showPasswordReset,setShowPasswordReset]=useState(false);
  const [followers,setFollowers]=useState([]);
  const [following,setFollowing]=useState([]);

  const loadUserData=async(uid)=>{
    if(!uid)return;
    setSyncStatus('syncing');
    try{
      const [entries,refs,projs,lessons]=await Promise.all([
        DB.getEntries(uid),
        DB.getReflections(uid),
        DB.getProjects(uid),
        DB.getLessonsRead(uid),
      ]);
      const lib=entries.map(e=>({
        ...e,
        ts:e.ts||new Date(e.created_at||e.date||0).getTime()||Date.now(),
        date:e.date?.slice(0,10)||e.created_at?.slice(0,10)||'',
        word_count:e.word_count||e.wordCount||0,
        wordCount:e.word_count||e.wordCount||0,
        elapsed:e.elapsed||0,
        plain:e.plain||'',
        html:e.html||'',
      })).sort((a,b)=>b.ts-a.ts);
      setLibrary(lib);
      setReflections(refs.map(r=>({...r,
        sessionTitle:r.session_title||r.sessionTitle||'',
        wordCount:r.word_count||r.wordCount||0,
        rating:r.rating||0,
      })).sort((a,b)=>b.ts-a.ts));
      setProjects(projs);
      S.set('flujo:lessons:'+uid,lessons);
      try{const chs=await DB.getReceivedChallenges(uid);setReceivedChallenges(chs);}catch(e){}
      try{
        const [fwers,fwing]=await Promise.all([DB.getFollowers(uid),DB.getFollowing(uid)]);
        const fwersList=fwers.map(f=>({id:f.follower_id,...(f.profiles||{})})).filter(f=>f.name||f.id);
        const fwingIds=fwing.map(f=>f.following_id);
        setFollowers(fwersList);
        setFollowing(fwingIds);
      }catch(e){console.error('followers error:',e);}
      setSyncStatus('ok');
      setTimeout(()=>setSyncStatus(s=>s==='ok'?null:s),2000);
    }catch(e){
      console.error('loadUserData error:',e?.message||e);
      setSyncStatus('error');
      const cached=S.list('flujo:cache:'+uid+':').map(k=>S.get(k)).filter(Boolean).sort((a,b)=>b.ts-a.ts);
      if(cached.length>0){setLibrary(cached);}
    }
  };

  // Team invite URL check
  useEffect(()=>{
    const url=new URL(window.location.href);
    const teamCode=url.searchParams.get('team');
    if(teamCode){
      url.searchParams.delete('team');
      history.replaceState(null,'',url.pathname);
      sessionStorage.setItem('pending_team_invite',teamCode);
    }
  },[]);

  // Session check on mount
  useEffect(()=>{
    const timeout=setTimeout(()=>setLoading(false),3000);
    DB.getSession().then(async session=>{
      try{
        if(session?.user){
          // Show app immediately, load profile + data in background
          clearTimeout(timeout);
          setLoading(false);
          const profile=await DB.getProfile(session.user.id);
          const resolvedProfile=profile||{id:session.user.id,name:session.user.email?.split('@')[0]||'Usuario',initials:'U',accent:'#1E9BF0',bg:'#EEEDFE',text_col:'#3C3489'};
          setUser({...session.user,...resolvedProfile});
          loadUserData(session.user.id); // non-blocking
        }else{
          clearTimeout(timeout);
          setLoading(false);
        }
      }catch(e){
        console.error('Session load error:',e);
        clearTimeout(timeout);
        setLoading(false);
      }
    }).catch(e=>{
      console.error('getSession error:',e);
      clearTimeout(timeout);
      setLoading(false);
    });
    const {data:{subscription}}=DB.onAuthChange(async(event,session)=>{
      if(event==='SIGNED_OUT'){setUser(null);setLibrary([]);setReflections([]);setProjects([]);setView('dashboard');}
      if(event==='PASSWORD_RECOVERY'){setShowPasswordReset(true);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  const handleAuth=async(profile)=>{
    if(localStorage.getItem('pretexto_welcome_seen')!=='true')setShowWelcome(true);
    const session=await DB.getSession();
    if(session?.user){
      setUser({...session.user,...profile});
      await loadUserData(session.user.id);
      setView('dashboard');
    }
  };
  const logout=async()=>{await DB.signOut();setUser(null);setView('dashboard');};

  const goToBriefing=e=>{setEnergy(e);setView('briefing');};
  const startCuentoWithChallenge=ch=>{setCuentoChallenge(ch);setView('cuento');};
  const startSession=cfg=>{
    if(cfg.type==='cuento'){setView('cuento');}
    else{setSessionConfig(cfg);setView('editor');}
  };
  const finishDay=data=>{setSessionData(data);setView('postSession');};

  const completeReflection=async(ref)=>{
    if(ref&&user){
      setReflections(prev=>[ref,...prev.filter(r=>r.id!==ref.id)]);
      const dbRef={
        id:ref.id,user_id:user.id,rating:ref.rating||0,notes:ref.notes||null,
        feedback:ref.feedback||null,sk:ref.sk||null,
        session_title:ref.session_title||ref.sessionTitle||null,
        word_count:ref.word_count||ref.wordCount||0,
        elapsed:ref.elapsed||0,mode:ref.mode||null,
        date:ref.date||null,ts:ref.ts||Date.now(),
      };
      try{await DB.upsertReflection(dbRef);}catch(e){console.error('save reflection',e);}
      // Apply chosen visibility to the saved entry
      if(ref.entryId&&ref.visibility){
        try{
          await DB.updateVisibility(ref.entryId,ref.visibility);
          setLibrary(prev=>prev.map(x=>x.id===ref.entryId?{...x,visibility:ref.visibility}:x));
        }catch(e){console.error('apply visibility',e);}
      }
    }
    setView('dashboard');
    loadUserData(user.id);
  };

  const saveEntry=async(entry)=>{
    if(!user)return;
    const e={...entry,user_id:user.id};
    S.set('flujo:cache:'+user.id+':'+e.id,e);
    setLibrary(prev=>[e,...prev.filter(x=>x.id!==e.id)]);
    const dbEntry={
      id:e.id,user_id:e.user_id,sk:e.sk||null,title:e.title||null,
      session_label:e.session_label||e.sessionLabel||null,
      html:e.html||null,plain:e.plain||null,
      word_count:e.word_count||e.wordCount||0,
      words_added:e.words_added||null,
      elapsed:e.elapsed||0,font_idx:e.font_idx||e.fontIdx||0,
      editor_size:e.editor_size||e.editorSize||17,
      align_dir:e.align_dir||e.alignDir||'left',
      week_id:e.week_id||e.weekId||null,
      project_id:e.project_id||e.projectId||null,
      date:e.date||null,ts:e.ts||Date.now(),
      visibility:e.visibility||'privado',
      shared_group_id:e.shared_group_id||null,
    };
    try{
      await DB.upsertEntry(dbEntry);
      S.del('flujo:cache:'+user.id+':'+e.id);
    }catch(err){
      console.error('save entry error:',err?.message||err);
      setSyncStatus('error');
    }
  };

  const deleteEntry=async(id)=>{
    if(!user)return;
    try{await DB.deleteEntry(id);setLibrary(prev=>prev.filter(e=>e.id!==id));}
    catch(e){console.error('delete entry',e);}
  };

  const saveProject=async(proj)=>{
    if(!user)return;
    const p={...proj,user_id:user.id};
    setProjects(prev=>[p,...prev.filter(x=>x.id!==p.id)]);
    const dbProj={id:p.id,user_id:p.user_id,title:p.title||null,type:p.type||null,goal:p.goal||50000,word_count:p.word_count||p.wordCount||0,updated_at:p.updated_at||p.updatedAt||null};
    try{await DB.upsertProject(dbProj);}catch(e){console.error('save project',e);}
  };

  const driveData=user?S.get('flujo:drive:'+user.id)||{}:{};
  const driveConnected=!!(driveData.token&&driveData.expires_at>Date.now()+30000);

  if(showPasswordReset)return<PasswordResetModal onClose={()=>setShowPasswordReset(false)}/>;
  if(loading)return<div style={{height:'var(--app-height,100dvh)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,color:MUTED}}>Cargando Pretexto…</div>;

  if(!user)return<AuthScreen onAuth={handleAuth}/>;

  // Edit existing entry
  if(editingEntry)return<Editor user={user} library={library} saveEntry={saveEntry} saveProject={saveProject}
    onFinishDay={()=>{setEditingEntry(null);setView('dashboard');}}
    onBack={()=>setEditingEntry(null)}
    driveData={driveData}
    sessionConfig={{type:'edit',sk:editingEntry.sk||'check',
      initialHtml:editingEntry.html||'',initialPlain:editingEntry.plain||'',
      entryId:editingEntry.id}}/>;

  if(view==='postSession')return<PostSession sessionData={sessionData} onComplete={completeReflection} onBack={()=>{setView('dashboard');loadUserData(user.id);}} user={user}/>;

  if(view==='cuento')return<CuentoContrareloj user={user} saveEntry={saveEntry}
    challenge={cuentoChallenge}
    onFinish={async(entryId)=>{
      if(cuentoChallenge){await DB.markChallengeCompleted(cuentoChallenge.id,entryId).catch(()=>{});}
      setCuentoChallenge(null);setView('dashboard');loadUserData(user.id);
    }}
    onBack={()=>{setCuentoChallenge(null);setView(cuentoChallenge?'dashboard':'briefing');}}/>;

  if(view==='editor'&&sessionConfig)return<Editor user={user} library={library} saveEntry={saveEntry} saveProject={saveProject}
    onFinishDay={finishDay} onBack={()=>setView('briefing')}
    driveData={driveData} sessionConfig={sessionConfig}/>;

  if(view==='briefing')return<SessionBriefing user={user} energy={energy} library={library} projects={projects} saveProject={saveProject} onStart={startSession} onBack={()=>setView('dashboard')}/>;

  return<>
    {showWelcome&&<WelcomeCarousel onClose={()=>setShowWelcome(false)}/>}
    {showExLibrary&&<ExerciseLibrary user={user} library={library} reflections={reflections} onDelete={deleteEntry} onClose={()=>setShowExLibrary(false)} setReadingEntry={undefined}/>}
    <Dashboard user={user} library={library} reflections={reflections} projects={projects}
      onContinue={goToBriefing} onLogout={logout} onDeleteEntry={deleteEntry}
      onOpenLibrary={()=>setShowExLibrary(true)} syncStatus={syncStatus}
      driveData={driveData} driveConnected={driveConnected}
      onDriveUpdate={ns=>{S.set('flujo:drive:'+user.id,ns);setDriveRefresh(r=>r+1);}}
      onRefresh={()=>loadUserData(user.id)}
      receivedChallenges={receivedChallenges}
      onAcceptChallenge={async(ch)=>{await DB.markChallengeSeen(ch.id);setReceivedChallenges(prev=>prev.filter(c=>c.id!==ch.id));startCuentoWithChallenge(ch);}}
      onDismissChallenge={async(id)=>{await DB.markChallengeSeen(id);setReceivedChallenges(prev=>prev.filter(c=>c.id!==id));}}
      onEditEntry={e=>setEditingEntry(e)}
      onChangeVisibility={async(id,vis)=>{try{await DB.updateVisibility(id,vis);setLibrary(prev=>prev.map(x=>x.id===id?{...x,visibility:vis}:x));}catch(e){console.error(e);}}}
      followers={followers}
      following={following}
      onFollow={async(targetId,isFollowing)=>{
        if(isFollowing){await DB.unfollowUser(user.id,targetId);setFollowing(prev=>prev.filter(id=>id!==targetId));}
        else{await DB.followUser(user.id,targetId);setFollowing(prev=>[...prev,targetId]);}
      }}/>
  </>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>

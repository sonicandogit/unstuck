            </div>
            <button onClick={()=>onStart({type:'cuento'})} style={{width:'100%',height:42,background:SESSION_BTN_BG,border:'none',borderRadius:9,fontSize:13.5,fontWeight:600,color:SESSION_BTN_TXT,cursor:'pointer',fontFamily:"'Source Sans 3',sans-serif"}}>Empezar cuento →</button>
          </div>
        </div>

        {/* PROYECTO */}
        <SectionCard accent="#1B5FAA" tag="Mis proyectos" title={selectedGenre||"¿En qué quieres trabajar?"}>
          <div style={{padding:'0 18px 18px'}}>

            {/* ── VIEW 1: Genre grid ───────────────────── */}
            {!selectedGenre&&!creatingProject&&(<>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
                {[
                  {emoji:'📝',label:'Poesía', types:['Poemario']},
                  {emoji:'📖',label:'Relato', types:['Relato corto','Microrrelatos']},
                  {emoji:'📚',label:'Novela', types:['Novela','Guión']},
                  {emoji:'🖊', label:'Ensayo', types:['Ensayo','Diario creativo']},
                ].map(({emoji,label,types})=>{
                  const projs=projects.filter(p=>types.includes(p.type));
                  return(
                    <button key={label} onClick={()=>{
                      if(projs.length===0){
                        const defType={Poesía:'Poemario',Relato:'Relato corto',Novela:'Novela',Ensayo:'Ensayo'}[label]||'Novela';
                        setNewProj({title:'',type:defType,goal:50000});
                        setCreatingProject(true);
                      } else {
                        setSelectedGenre(label);
                      }
                    }}
                    style={{background:'rgba(30,155,240,0.04)',border:'0.5px solid rgba(30,155,240,0.15)',borderRadius:10,padding:'12px 10px',textAlign:'left',cursor:'pointer',display:'flex',flexDirection:'column',gap:4}}>
                      <span style={{fontSize:20}}>{emoji}</span>
                      <span style={{fontSize:12,fontWeight:600,color:TXT}}>{label}</span>
                      <span style={{fontSize:10,color:MUTED}}>{projs.length} proyecto{projs.length!==1?'s':''}</span>
                    </button>
                  );
                })}
              </div>
              {/* Último proyecto shortcut */}
              {lastProject&&(
                <div style={{borderTop:'0.5px solid '+BDR,paddingTop:12}}>
                  <div style={{fontSize:10,fontWeight:500,color:FAINT,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>Último proyecto</div>
                  <Btn onClick={()=>selectProject(lastProject)} style={{width:'100%',height:40,background:SESSION_BTN_BG,color:SESSION_BTN_TXT}}>
                    Continuar «{lastProject.title}» →
                  </Btn>
                </div>
              )}
            </>)}

            {/* ── VIEW 2: Projects list for selected genre ─ */}
            {selectedGenre&&!creatingProject&&(()=>{
              const genreTypes={Poesía:['Poemario'],Relato:['Relato corto','Microrrelatos'],Novela:['Novela','Guión'],Ensayo:['Ensayo','Diario creativo']}[selectedGenre]||[];
              const genreProjs=projects.filter(p=>genreTypes.includes(p.type));
              const defType={Poesía:'Poemario',Relato:'Relato corto',Novela:'Novela',Ensayo:'Ensayo'}[selectedGenre]||'Novela';
              return(
                <>
                  <button onClick={()=>setSelectedGenre(null)} style={{background:'transparent',border:'none',color:MUTED,cursor:'pointer',fontSize:12,marginBottom:12,padding:0,display:'flex',alignItems:'center',gap:4}}>
                    ← Volver a géneros
                  </button>
                  <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:12}}>
                    {genreProjs.map(p=>{
                      const _projEntries=library.filter(e=>(e.project_id||e.projectId)===p.id).sort((a,b)=>b.ts-a.ts);const wc=_projEntries[0]?.word_count||_projEntries[0]?.wordCount||0;
                      return(
                        <div key={p.id} style={{background:'#F8F7F4',borderRadius:10,padding:'12px 14px',display:'flex',alignItems:'center',gap:10}}>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:13,fontWeight:600,color:TXT,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.title}</div>
                            <div style={{fontSize:11,color:MUTED}}>{wc.toLocaleString()} palabras · {p.type}</div>
                          </div>
                          <button onClick={()=>selectProject(p)}
                            style={{background:TXT,border:'none',borderRadius:7,padding:'6px 12px',fontSize:11,fontWeight:500,color:'#fff',cursor:'pointer',flexShrink:0}}>
                            Abrir →
                          </button>
                        </div>
                      );
                    })}
                  </div>
                  <button onClick={()=>{setNewProj({title:'',type:defType,goal:50000});setCreatingProject(true);}}
                    style={{width:'100%',background:'transparent',border:'0.5px solid rgba(30,155,240,0.3)',borderRadius:8,padding:'9px',fontSize:12,color:'#1E9BF0',cursor:'pointer'}}>
                    + Nuevo proyecto de {selectedGenre.toLowerCase()}
                  </button>
                </>
              );
            })()}

            {/* ── VIEW 3: Create new project form ─────── */}
            {creatingProject&&(
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                <button onClick={()=>{setCreatingProject(false);}} style={{background:'transparent',border:'none',color:MUTED,cursor:'pointer',fontSize:12,padding:0,display:'flex',alignItems:'center',gap:4}}>
                  ← {selectedGenre?'Volver a '+selectedGenre:'Volver a géneros'}
                </button>
                <div>
                  <div style={{fontSize:11,fontWeight:500,color:MUTED,marginBottom:6}}>Título del proyecto</div>
                  <input value={newProj.title} onChange={e=>setNewProj(p=>({...p,title:e.target.value}))} placeholder="Ej: Los días de verano" autoFocus style={{width:"100%",border:"0.5px solid "+BDR,borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
                </div>
                <div>
                  <div style={{fontSize:11,fontWeight:500,color:MUTED,marginBottom:6}}>Tipo</div>
                  <select value={newProj.type} onChange={e=>setNewProj(p=>({...p,type:e.target.value}))}
                    style={{width:'100%',border:'1px solid '+BDR,borderRadius:9,padding:'8px 10px',fontSize:13,background:CARD_BG,color:TXT,outline:'none',fontFamily:'inherit'}}>
                    {['Novela','Relato corto','Poemario','Ensayo','Microrrelatos','Guión','Diario creativo'].map(t=><option key={t}>{t}</option>)}
                  </select>
                </div>
                <Btn onClick={createProject} disabled={!newProj.title.trim()} variant="primary" full style={{height:40}}>
                  Crear y empezar →
                </Btn>
              </div>
            )}

          </div>
        </SectionCard>
      </div>
    </div>
  );
};

/* ─── POST SESSION ───────────────────────────────── */
const PostSession=({sessionData,onComplete,onBack,user})=>{
  const [rating,setRating]=useState(7);
  const [notes,setNotes]=useState('');
  const [saveToLib,setSaveToLib]=useState(sessionData?.sk==='proyecto'||sessionData?.sk==='cuento');
  const [pubVis,setPubVis]=useState('privado');
  const [fbState,setFbState]=useState(getApiKey(user.id)?'ready':'no_key');
  const [fbError,setFbError]=useState('');
  const [feedback,setFeedback]=useState('');
  const [showKey,setShowKey]=useState(false);
  const rm=ratingMsg(rating);
  const rCol=rating<=3?'#A82020':rating<=6?'#1B5FAA':'#1E9BF0';

  const runFeedback=async()=>{
    if(!sessionData.text?.trim()){setFbState('no_text');return}
    const ctx=sessionData.exerciseTitle?'Ejercicio: "'+sessionData.exerciseTitle+'"\n'+(sessionData.exerciseDesc||'')+'\n\n':'Tipo: '+sessionData.sk+'\n\n';
    try{
      const txt=await callClaude(FEEDBACK_SYSTEM,ctx+'Texto:\n\n'+sessionData.text,600,user.id);
      setFeedback(txt);setFbState('done');
    }catch(e){
      if(e.message==='no_key')setFbState('no_key');
      else if(e.message==='invalid_key')setFbState('invalid_key');
      else{setFbError(e.message);setFbState('error');}
    }
  };

  // feedback is manual — no auto-trigger

  const save=()=>{
    const r={id:uid(),ts:Date.now(),date:today(),rating,notes:notes.trim(),sk:sessionData.sk,session_title:sessionData.title,sessionTitle:sessionData.title,word_count:sessionData.wordCount,wordCount:sessionData.wordCount,elapsed:sessionData.elapsed,mode:sessionData.mode,feedback:fbState==='done'?feedback:'',
      saveToLibrary:saveToLib,visibility:saveToLib?pubVis:'ejercicio',entryId:sessionData.entryId||null};
    onComplete(r);
  };

  const parseLines=txt=>{if(!txt)return[];return txt.split('\n+').map(l=>l.trim()).filter(Boolean).map(l=>({n:l.match(/^(\d)\./)?l.match(/^(\d)\./)[1]:null,t:l.replace(/^\d\.\s*/,'')}))};
  const lines=parseLines(feedback);
  const lineColors=[['rgba(30,155,240,0.12)','#1E9BF0'],['rgba(241,90,36,0.12)','#F15A24'],['rgba(27,95,170,0.12)','#1B5FAA']]; // 1:Lo que funciona(AZUL) 2:Para ir más lejos(NARANJA) 3:pregunta(AZULMED)

  return(
    <div style={{height:'var(--app-height,100dvh)',background:'transparent',overflow:'auto',display:'flex',flexDirection:'column'}}>
      {showKey&&<ApiKeyPanel userId={user.id} onClose={()=>{setShowKey(false);if(getApiKey(user.id)&&(fbState==='no_key'||fbState==='invalid_key')){setFbState('ready')}}}/>}
      <div style={{display:'flex',alignItems:'center',padding:'0 20px',height:48,background:'var(--topbar-bg,#fff)',borderBottom:'1px solid '+BDR,flexShrink:0}}>
        <button onClick={onBack} style={{background:'transparent',border:'none',cursor:'pointer',color:MUTED,fontSize:13,display:'flex',alignItems:'center',gap:4}}>← Dashboard</button>
      </div>
      <div style={{maxWidth:560,width:'100%',margin:'0 auto',padding:'20px 14px 60px'}}>
        <div className="fu" style={{background:CARD_BG,borderRadius:16,boxShadow:'0 16px 50px -16px rgba(10,27,61,0.18)',overflow:'hidden'}}>
          <div style={{padding:'20px 24px 16px',borderBottom:'0.5px solid '+BDR}}>
            <div style={{fontSize:11,fontWeight:500,color:MUTED,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:3}}>Sesión completada</div>
            <div style={{fontSize:18,fontWeight:600,color:TXT,fontFamily:'"Playfair Display",Georgia,serif'}}>{sessionData.title}</div>
          </div>
          <div style={{padding:'12px 24px',background:'rgba(0,0,0,0.02)',borderBottom:'0.5px solid '+BDR,display:'flex',gap:22}}>
            {[{l:'Palabras escritas',v:sessionData.wordsAdded??sessionData.wordCount??0},{l:'Tiempo',v:fmt(sessionData.elapsed||0)},{l:'Modo',v:(MODES.find(m=>m.id===sessionData.mode)||MODES[0]).name},{l:'XP',v:'+'+(sessionData.xp||50)}].map(({l,v})=>(
              <div key={l}><div style={{fontSize:15,fontWeight:600,color:TXT}}>{v}</div><div style={{fontSize:10,color:MUTED}}>{l}</div></div>
            ))}
          </div>
          {/* Claude feedback */}
          <div style={{padding:'20px 24px',borderBottom:'1px solid '+BDR,position:'relative'}}>
            <Signo char="✱" size={90} top={4} right={6} color="naranja"/>
            <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:14,position:'relative',zIndex:1}}>
              <div style={{width:24,height:24,borderRadius:7,background:NAVY,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'#fff'}}>✦</div>
              <div style={{fontSize:13.5,fontWeight:700,color:TXT,fontFamily:'"Playfair Display",serif'}}>Revisión de Claude</div>
              {fbState==='done'&&<span style={{fontSize:10,color:FAINT,marginLeft:'auto'}}>basado en tu texto</span>}
            </div>
            {fbState==='loading'&&<div style={{display:'flex',flexDirection:'column',gap:8}}>{[90,72,55].map((w,i)=><div key={i} style={{height:13,background:'rgba(0,0,0,0.06)',borderRadius:4,width:w+'%'}}/>)}<div style={{fontSize:11,color:FAINT,marginTop:2}}>Leyendo tu texto…</div></div>}
            {fbState==='done'&&<div style={{display:'flex',flexDirection:'column',gap:12}}>
              {lines.length>0?lines.map((l,i)=>(
                <div key={i} style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                  {l.n&&<span style={{width:20,height:20,borderRadius:'50%',background:lineColors[i]?.[0]||'rgba(0,0,0,0.05)',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:600,color:lineColors[i]?.[1]||MUTED,flexShrink:0}}>{l.n}</span>}
                  <p style={{fontSize:13,color:TXT,lineHeight:1.75,margin:0}}>{l.t}</p>
                </div>
              )):<p style={{fontSize:13,color:TXT,lineHeight:1.75,whiteSpace:'pre-wrap'}}>{feedback}</p>}
            </div>}
            {fbState==='no_text'&&<p style={{fontSize:13,color:MUTED}}>No hay texto que leer en esta sesión.</p>}
            {(fbState==='ready'||fbState==='idle')&&<div style={{display:'flex',flexDirection:'column',alignItems:'flex-start',gap:10}}>
              <p style={{fontSize:13,color:MUTED,lineHeight:1.6}}>Claude lee tu texto y te da tres puntos: qué funciona, qué explorar y una pregunta para la próxima vez.</p>
              <button onClick={()=>{setFbState('loading');runFeedback()}} style={{background:ADVANCE_BG,border:'none',color:ADVANCE_TXT,borderRadius:9,padding:'10px 18px',fontSize:13,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:6,fontFamily:"'Source Sans 3',sans-serif"}}>✦ Pedir revisión de Claude</button>
            </div>}
            {fbState==='no_key'&&<div style={{background:'rgba(30,155,240,0.06)',border:'0.5px solid rgba(30,155,240,0.18)',borderRadius:9,padding:'12px 14px'}}><p style={{fontSize:13,color:TXT,lineHeight:1.65,marginBottom:10}}>Para recibir feedback necesitas añadir tu API key de Claude. Se guarda solo en tu navegador.</p><Btn variant="accent" onClick={()=>setShowKey(true)} small>Añadir API key →</Btn></div>}
            {fbState==='invalid_key'&&<div style={{background:'rgba(197,34,31,0.06)',border:'0.5px solid rgba(197,34,31,0.2)',borderRadius:9,padding:'12px 14px',display:'flex',alignItems:'center',gap:10}}><p style={{fontSize:13,color:'#C5221F',flex:1}}>La API key no es válida.</p><Btn variant="danger" onClick={()=>setShowKey(true)} small>Actualizar</Btn></div>}
            {fbState==='error'&&<div style={{display:'flex',gap:10,alignItems:'center',flexDirection:'column',alignItems:'flex-start'}}>
              <p style={{fontSize:12,color:MUTED}}>{fbError||'No se pudo conectar con Claude.'}</p>
              <Btn onClick={()=>{setFbState('loading');runFeedback()}} small>Reintentar</Btn>
            </div>}
          </div>
          {/* Rating + notes */}
          <div style={{padding:'20px 24px',display:'flex',flexDirection:'column',gap:18}}>
            <div>
              <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:10}}>
                <div style={{fontSize:14,fontWeight:500,color:TXT}}>¿Cómo ha ido?</div>
                <div style={{display:'flex',alignItems:'baseline',gap:6}}><span style={{fontSize:24,fontWeight:700,color:rCol,transition:'color 0.3s'}}>{rating}</span><span style={{fontSize:12,color:rCol,fontWeight:500}}>{rm}</span></div>
              </div>
              <input type="range" min={0} max={10} step={1} value={rating} onChange={e=>setRating(+e.target.value)} style={{accentColor:rCol}}/>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:FAINT,marginTop:4}}><span>duro</span><span>en el flujo</span></div>
            </div>
            <div>
              <div style={{fontSize:14,fontWeight:500,color:TXT,marginBottom:6}}>¿Qué te llevas hoy?</div>
              <div style={{fontSize:12,color:MUTED,marginBottom:9,lineHeight:1.6}}>Aprendizajes, patrones, lo que mejor te ha funcionado…</div>

    lastSaved.current=plainTxt;
    // Update project word count
    if(currentProject){
      const updated={...currentProject,wordCount:(currentProject.wordCount||0)+wc,updated_at:today()};

    if(sk==='check'){const ex=S.get('flujo:check:'+user.id+':'+today())||{};S.set('flujo:check:'+user.id+':'+today(),{...ex,done:true,wordCount:wc});}

  };

  const switchMode=m=>{
    if(lockedMode)return;if(allowedModes&&!allowedModes.includes(m))return;
    setAb(m);setIdle(0);setIdleWarn(false);resetLim();
    if(edRef.current&&m!=='tunel')Array.from(edRef.current.children).forEach(b=>{b.style.filter='';b.style.opacity='';b.style.transition='';b.style.pointerEvents='';b.style.userSelect=''});

  };
  const cmd=c=>{edRef.current?.focus();document.execCommand(c,false,null);syncFmt()};
  const syncFmt=()=>{try{setBold(document.queryCommandState('bold'));setItalic(document.queryCommandState('italic'));setUnder(document.queryCommandState('underline'))}catch(e){}};
  const doAlign=d=>{setAlign(d);edRef.current?.focus();document.execCommand({left:'justifyLeft',center:'justifyCenter',right:'justifyRight'}[d],false,null)};

  const updateTunnelStyle=()=>{
    if(!edRef.current)return;
    const el=edRef.current;
    const blocks=Array.from(el.children).filter(b=>b.nodeType===1&&b.tagName!=='BR');
    if(ab!=='tunel'){
      blocks.forEach(b=>{b.style.filter='';b.style.opacity='1';b.style.transition='';b.style.pointerEvents='';b.style.userSelect='';b.style.color='';});
      return;
    }
    if(!blocks.length)return;
    // Always show only the last paragraph
    const curIdx=blocks.length-1;
    blocks.forEach((b,i)=>{
      const isCur=i===curIdx;
      b.style.filter=isCur?'none':'blur(3px)';
      b.style.opacity=isCur?'1':'0.18';
      b.style.transition='filter 0.35s ease,opacity 0.35s ease';
      b.style.pointerEvents=isCur?'auto':'none';
      b.style.userSelect=isCur?'text':'none';
      b.style.color=isCur?PROSE_TEXT:'rgba(10,27,61,0.45)';

        b.scrollIntoView({block:'center',behavior:'smooth'});
      }
    });

  useEffect(()=>{document.execCommand('defaultParagraphSeparator',false,'p');const init=sessionConfig.initialHtml||'';if(init&&edRef.current){edRef.current.innerHTML=init;const txt=edRef.current.innerText||'';setPlainTxt(txt);const iwc=txt.trim().split(/\s+/).filter(Boolean).length;setWc(iwc);initialWcRef.current=iwc;}},[]);
  // Keyboard shortcuts
  useEffect(()=>{
    const handler=e=>{
      const mod=e.metaKey||e.ctrlKey;
      if(mod&&e.key==='s'){e.preventDefault();if(started&&plainTxt.trim())saveNow(false);}
      if(mod&&e.key==='Enter'){e.preventDefault();if(started)handleFinishDay();}
    };
    document.addEventListener('keydown',handler);
    return()=>document.removeEventListener('keydown',handler);
  },[started,plainTxt]);
  useEffect(()=>{clearInterval(tRef.current);if(running&&timerDur){tRef.current=setInterval(()=>setTimer(s=>{if(s<=1){clearInterval(tRef.current);setRunning(false);setDone(true);return 0}return s-1}),1000)}return()=>clearInterval(tRef.current)},[running,timerDur]);
  useEffect(()=>{clearInterval(eRef.current);if(running)eRef.current=setInterval(()=>setElapsed(e=>e+1),1000);return()=>clearInterval(eRef.current)},[running]);
  useEffect(()=>{clearInterval(iRef.current);if(ab==='presion'&&running){iRef.current=setInterval(()=>setIdle(s=>{const n=s+1;if(n>=idleLimit-5)setIdleWarn(true);if(n>=idleLimit){const el=edRef.current;if(el){const bs=Array.from(el.querySelectorAll('p,div')).filter(e=>e.innerText?.trim());if(bs.length>1)bs[bs.length-1].remove();else{const ls=el.innerText.trimEnd().split('\n');if(ls.length>1){ls.pop();el.innerText=ls.join('\n')}else el.innerHTML=''}const np=el.innerText||'';prevLen.current=np.length;setPlainTxt(np);setWc(np.trim()?np.trim().split(/\s+/).filter(Boolean).length:0)}setIdleWarn(false);return 0}return n}),1000)}return()=>clearInterval(iRef.current)},[ab,running,idleLimit]);
  useEffect(()=>{
    updateTunnelStyle();
    const onSel=()=>updateTunnelStyle();
    document.addEventListener('selectionchange',onSel);
    return()=>document.removeEventListener('selectionchange',onSel);
  },[ab]);
  useEffect(()=>{clearInterval(asRef.current);if(!autoSave||!started){setAsCd(AUTOSAVE);return}setAsCd(AUTOSAVE);asRef.current=setInterval(()=>setAsCd(c=>{if(c<=1){if(plainTxt!==lastSaved.current)saveNow(true);return AUTOSAVE}return c-1}),1000);return()=>clearInterval(asRef.current)},[autoSave,started,plainTxt]);

  const handleInput=(e)=>{
    const el=edRef.current;if(!el)return;
    const plain=el.innerText||'',cur=plain.length,prev=prevLen.current;const isD=cur<prev,nD=Math.max(0,prev-cur);
    // Río: block deletions EXCEPT spellcheck replacements (inputType='insertReplacementText') 
    if(ab==='rio'&&isD){
      const itype=e?.nativeEvent?.inputType||'';
      if(itype==='insertReplacementText'||itype==='insertText'){/*allow spellcheck*/}
      else{document.execCommand('undo');return}
    }
    if(ab==='limite'&&isD){if(!isDel.current){if(delsLeft<=0||nD>limChars){document.execCommand('undo');return}isDel.current=true;setDelsLeft(d=>d-1);setCharsInDel(nD)}else{const nx=charsInDel+nD;if(nx>limChars){document.execCommand('undo');return}setCharsInDel(nx)}}
    if(!isD&&isDel.current){isDel.current=false;setCharsInDel(0)}
    prevLen.current=cur;setPlainTxt(plain);setWc(plain.trim()?plain.trim().split(/\s+/).filter(Boolean).length:0);

  const limHint=()=>{if(delsLeft===0)return{l:'Sin más intentos',c:'#A82020'};if(isDel.current)return{l:limChars-charsInDel+' chars · '+delsLeft+' intentos',c:'#1B5FAA'};return{l:delsLeft+'/'+limDels+' intentos',c:'rgba(27,95,170,0.55)'}};
  const siL=()=>{if(!autoSave)return{l:'off',dot:'rgba(0,0,0,0.12)',c:FAINT};if(saveStatus==='saving')return{l:'Guardando…',dot:'#1B5FAA',c:MUTED};if(saveStatus==='saved')return{l:'✓',dot:'#1E9BF0',c:'#1E9BF0'};if(!started||!plainTxt.trim())return{l:'Auto',dot:'rgba(30,155,240,0.35)',c:FAINT};return{l:asCd+'s',dot:'rgba(30,155,240,0.5)',c:FAINT}};

  const handleFinishDay=()=>{if(started)saveNow(false);onFinishDay({sk,title:headerTitle,wordCount:wc,elapsed,mode:ab,xp:sessionXP,text:edRef.current?.innerText||'',entryId:entryIdRef.current,wordsAdded:Math.max(0,wc-initialWcRef.current),exerciseTitle:customExercise?.title||customReto?.titulo||customReto?.title||null,exerciseDesc:customExercise?.desc||customReto?.desc||null})};

        <div style={{fontFamily:'"Playfair Display",serif',fontStyle:'italic',fontWeight:500,fontSize:15,letterSpacing:'-0.01em',color:TXT,marginRight:6}}>Pretexto</div>
        <div style={{display:'flex',gap:2,flex:1}}>
          {['check','reto','proyecto'].map(id=><button key={id} onClick={()=>{if(id!==sk){if(started&&plainTxt.trim()){if(!window.confirm('¿Cambiar de sección? El texto se guardará.'))return;saveNow(false);}onBack();}}} style={{background:sk===id?'rgba(0,0,0,0.06)':'transparent',border:'none',cursor:id!==sk?'pointer':'default',borderRadius:6,padding:'3px 7px',fontSize:11,fontWeight:sk===id?500:400,color:sk===id?TXT:MUTED,display:'flex',alignItems:'center',gap:3}}>{sk===id&&<span style={{width:4,height:4,borderRadius:'50%',background:headerAccent}}/>}{id.charAt(0).toUpperCase()+id.slice(1)}</button>)}
        </div>
        <button onClick={()=>setShowLib(true)} className="desk-only" style={{background:'transparent',border:'0.5px solid '+BDR,borderRadius:6,padding:'3px 7px',fontSize:11,color:MUTED,cursor:'pointer',flexShrink:0}}>◎</button>

        <button onClick={handleFinishDay} style={{background:ADVANCE_BG,border:'none',borderRadius:7,padding:'5px 11px',fontSize:11.5,fontWeight:600,color:ADVANCE_TXT,cursor:'pointer',flexShrink:0,whiteSpace:'nowrap',fontFamily:"'Source Sans 3',sans-serif"}}>Terminar →</button>
        <div style={{position:'relative'}}>
          <button onClick={()=>setShowUserMenu(v=>!v)} style={{width:26,height:26,borderRadius:'50%',background:user.bg,border:'1.5px solid '+user.accent+'44',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:600,color:user.textCol}}>{user.initials}</button>
          {showUserMenu&&<div className="fi" style={{position:'fixed',right:8,top:54,width:160,background:CARD_BG,border:'1px solid '+BDR,borderRadius:10,boxShadow:'0 4px 20px rgba(0,0,0,0.08)',overflow:'hidden',zIndex:50}}>
            <div style={{padding:'9px 12px 8px',borderBottom:'0.5px solid '+BDR}}><div style={{fontSize:12,fontWeight:500,color:TXT}}>{user.name}</div></div>
            {users.filter(u=>u.id!==user.id).map(u=><button key={u.id} onClick={()=>{onSwitchUser(u);setShowUserMenu(false)}} style={{display:'flex',alignItems:'center',gap:7,width:'100%',background:'transparent',border:'none',padding:'8px 12px',cursor:'pointer'}}><div style={{width:20,height:20,borderRadius:'50%',background:u.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:600,color:u.textCol}}>{u.initials}</div><span style={{fontSize:12,color:TXT}}>{u.name}</span></button>)}
            <div style={{borderTop:'0.5px solid '+BDR}}/>
            <button onClick={()=>{onLogout();setShowUserMenu(false)}} style={{display:'block',width:'100%',background:'transparent',border:'none',padding:'8px 12px',fontSize:12,color:MUTED,cursor:'pointer',textAlign:'left'}}>Cambiar usuario</button>
          </div>}

      <div style={{display:'flex',flex:1,minHeight:0}}>
        <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,background:CARD_BG}}>

          <div style={{padding:'8px 18px',background:headerBg,borderBottom:'0.5px solid '+BDR,flexShrink:0}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:10,fontWeight:500,color:headerAccent,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:1}}>{headerFamily}</div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{fontSize:13,fontWeight:500,color:TXT,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{headerTitle}</div>
                  {lockedMode&&<ModeBadge modeId={lockedMode} small/>}
                </div>
                {headerDescShort&&<div style={{fontSize:11,color:MUTED,marginTop:1}}>{headerDescShort}</div>}
                {minW>0&&<div style={{marginTop:5,display:'flex',alignItems:'center',gap:8}}>
                  <div style={{flex:1,height:2,background:'rgba(0,0,0,0.08)',borderRadius:1,overflow:'hidden',maxWidth:200}}>
                    <div style={{height:'100%',width:prog+'%',background:goalOK?'#1E9BF0':headerAccent,transition:'width 0.4s'}}/>
                  </div>
                  <span style={{fontSize:10,color:goalOK?'#1E9BF0':FAINT}}>{wc}{minW>0?' / '+minW:''} pal.{goalOK?' ✓':''}</span>
                </div>}
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                {timerDur&&timerSec!=null
                ?<div style={{fontSize:22,fontWeight:200,color:timerCol(),fontVariantNumeric:'tabular-nums',lineHeight:1}}>{fmt(timerSec)}</div>
                :<div style={{fontSize:18,fontWeight:200,color:FAINT,fontVariantNumeric:'tabular-nums',lineHeight:1}}>{fmt(elapsed)}</div>}

              </div>
            </div>
          </div>

          {done&&<div style={{padding:'7px 18px',background:'rgba(30,155,240,0.07)',borderBottom:'0.5px solid rgba(30,155,240,0.18)',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
            <span style={{fontSize:13,color:'#1E9BF0',fontWeight:500}}>✓ Completado — {wc} palabras</span>
            <div style={{display:'flex',gap:6}}><Btn onClick={()=>saveNow(false)} variant="green" small>Guardar</Btn><Btn onClick={()=>{if(edRef.current)exportDocx(buildEntry(),fontObj.docx,sz)}} small>↓ .docx</Btn><Btn onClick={handleFinishDay} variant="primary" small>Terminar →</Btn></div>
          </div>}
          {toast&&<div style={{padding:'6px 18px',background:toast.color+'0C',borderBottom:'0.5px solid '+toast.color+'22',display:'flex',alignItems:'center',gap:8,flexShrink:0}}><span style={{fontSize:11,fontWeight:600,color:toast.color}}>{toast.sym} {toast.name}</span><span style={{fontSize:12,color:MUTED}}>{toast.full}</span></div>}
          {idleWarn&&ab==='presion'&&<div style={{padding:'6px 18px',background:'rgba(168,32,32,0.07)',borderBottom:'0.5px solid rgba(168,32,32,0.16)',fontSize:12,color:'#A82020',flexShrink:0}}>⚡ {idleLimit-idle}s antes de perder el párrafo</div>}

          {/* TOOLBAR */}

              <select value={fontIdx} onChange={e=>setFontIdx(+e.target.value)} style={{fontSize:11,color:TXT,background:'transparent',border:'0.5px solid '+BDR,borderRadius:5,padding:'2px 3px',cursor:'pointer',height:24,maxWidth:72}}>{FONTS.map((f,i)=><option key={f.label} value={i}>{f.label}</option>)}</select>
              <div style={{display:'flex',alignItems:'center',border:'0.5px solid '+BDR,borderRadius:5,overflow:'hidden',height:24,flexShrink:0}}>

                <span style={{fontSize:10,color:TXT,minWidth:18,textAlign:'center',userSelect:'none',borderLeft:'0.5px solid '+BDR,borderRight:'0.5px solid '+BDR,lineHeight:'24px'}}>{sz}</span>

            <div style={{flex:1}}/>

              :<div style={{display:'flex',gap:2}}>{MODES.filter(m=>!allowedModes||allowedModes.includes(m.id)).map(m=><button key={m.id} onClick={()=>switchMode(m.id)} title={m.full} style={{background:ab===m.id?m.color+'12':'transparent',border:'0.5px solid',borderColor:ab===m.id?m.color+'38':BDR,color:ab===m.id?m.color:FAINT,fontSize:11,padding:'4px 7px',borderRadius:4,cursor:'pointer',fontWeight:ab===m.id?500:400}}>{m.name}</button>)}</div>}

/* ─── CUENTO CONTRARELOJ ─────────────────────────── */
const WORD_BANK=[
  'mariposa','ventana','secreto','lámpara','sombra','espejo','llave','jardín','tormenta','silencio',
  'fantasma','linterna','camino','laberinto','puente','isla','umbral','ceniza','cristal','muralla',
  'brújula','marea','tren','tejado','cueva','horizonte','vela','escalera','nube','reloj',
  'navaja','carruaje','antifaz','pergamino','aldea','torre','baúl','mapa','faro','trinchera',
  'bufanda','moneda','serpiente','eclipse','cascada','mendigo','alfabeto','cicatriz','anzuelo','telaraña',
  'desván','acantilado','burbuja','calavera','destello','flecha','gruta','hoguera','invierno','jaula',
  'kilómetro','lluvia','manantial','niebla','oráculo','paloma','quimera','refugio','susurro','trampa',
  'umbría','volcán','wisterias','éxodo','yedra','zarza','abismo','borrasca','crepúsculo','daga',
  'espejismo','fortaleza','gaviota','huella','ilusión','jornada','karma','linaje','mazmorra','náufrago',
];

const pick5Words=()=>{
  const pool=[...WORD_BANK];
  const result=[];
  while(result.length<5){
    const i=Math.floor(Math.random()*pool.length);
    result.push(pool.splice(i,1)[0]);
  }
  return result;
};

const wordUsed=(text,word)=>{
  if(!text||!word)return false;
  const t=text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const w=word.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const re=new RegExp('\\b'+w+'\\b','i');
  return re.test(t);
};

const CuentoContrareloj=({user,onFinish,onBack,saveEntry,challenge})=>{
  const [words]=useState(()=>challenge?.words||pick5Words());
  const [text,setText]=useState('');
  const [chars,setChars]=useState(0);
  const [timer,setTimer]=useState(3600); // 1 hour
  const [running,setRunning]=useState(false);
  const [started,setStarted]=useState(false);
  const [published,setPublished]=useState(false);
  const [publishedEntry,setPublishedEntry]=useState(null);
  const [elapsed,setElapsed]=useState(0);
  const [saveStatus,setSaveStatus]=useState('idle');
  const edRef=useRef(null);
  const timerRef=useRef();
  const elapsedRef=useRef();

  const usedWords=words.map(w=>wordUsed(text,w));
  const allUsed=usedWords.every(Boolean);
  const MIN_CHARS=2500;
  const canPublish=allUsed&&chars>=MIN_CHARS&&timer>0&&!published;

  const timerCol=()=>{
    if(timer>1800)return'#1E9BF0';
    if(timer>600)return'#1B5FAA';
    return'#A82020';
  };

  useEffect(()=>{
    if(running&&timer>0){
      timerRef.current=setInterval(()=>setTimer(t=>{if(t<=1){clearInterval(timerRef.current);setRunning(false);return 0;}return t-1}),1000);
      elapsedRef.current=setInterval(()=>setElapsed(e=>e+1),1000);
    }
    return()=>{clearInterval(timerRef.current);clearInterval(elapsedRef.current);};
  },[running]);

  const handleInput=()=>{
    const el=edRef.current;if(!el)return;
    const plain=el.innerText||'';
    setText(plain);
    setChars(plain.length);
    if(!started){setStarted(true);setRunning(true);}
  };

  const publish=async()=>{
    if(!canPublish)return;
    setRunning(false);
    const entry={
      id:'cuento_'+Date.now(),
      sk:'cuento',
      title:'Cuento contrareloj · '+new Date().toLocaleDateString('es-ES',{day:'numeric',month:'short'}),
      session_label:'Cuento contrareloj',
      html:edRef.current?.innerHTML||'',
      plain:text,
      word_count:text.trim().split(/\s+/).filter(Boolean).length,
      elapsed,
      date:new Date().toISOString().slice(0,10),
      ts:Date.now(),
      font_idx:0,
      editor_size:17,
      align_dir:'left',
      meta_words:words.join(','),
    };
    try{
      setSaveStatus('saving');
      await saveEntry(entry);
      setSaveStatus('saved');
      setPublishedEntry(entry);
      setPublished(true);
    }catch(e){setSaveStatus('error');console.error(e);}
  };

  const fmt=s=>{
    const h=Math.floor(s/3600);
    const m=Math.floor((s%3600)/60);
    const sec=s%60;
    return(h>0?h+':':'')+(m).toString().padStart(h>0?2:1,'0')+':'+sec.toString().padStart(2,'0');
  };

  if(published)return(
    <div style={{height:'var(--app-height,100dvh)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#FBF8F0',padding:32,textAlign:'center'}}>
      <div style={{fontSize:48,marginBottom:16}}>✦</div>
      <div style={{fontSize:24,fontWeight:600,color:'#1E9BF0',fontFamily:'"Playfair Display",Georgia,serif',marginBottom:8}}>¡Cuento publicado!</div>
      <div style={{fontSize:14,color:MUTED,marginBottom:6}}>{chars.toLocaleString()} caracteres · {fmt(elapsed)} de escritura</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center',marginBottom:24}}>
        {words.map(w=><span key={w} style={{background:'rgba(30,155,240,0.1)',border:'0.5px solid rgba(30,155,240,0.3)',borderRadius:20,padding:'3px 12px',fontSize:12,color:'#1E9BF0',fontWeight:500,textDecoration:'line-through'}}>✓ {w}</span>)}
      </div>
      <Btn variant="primary" onClick={()=>onFinish(publishedEntry?.id)}>Volver al dashboard →</Btn>
    </div>
  );

  return(
    <div style={{display:'flex',flexDirection:'column',height:'var(--app-height,100dvh)',background:CARD_BG,position:'relative'}}>
      {/* Header */}
      <div style={{background:'#0A1B3D',color:'#fff',flexShrink:0}}>
        {challenge&&<div style={{background:'rgba(255,255,255,0.07)',padding:'7px 14px',fontSize:11,color:'rgba(255,255,255,0.6)',display:'flex',alignItems:'center',gap:6}}>
          <span>⏱</span><span>Reto de <strong style={{color:'rgba(255,255,255,0.85)'}}>@{challenge.from_username||challenge.from_name}</strong>{challenge.message&&<span style={{fontStyle:'italic'}}> · "{challenge.message}"</span>}</span>
        </div>}
        {/* Top bar */}
        <div style={{display:'flex',alignItems:'center',padding:'0 14px',height:44,borderBottom:'0.5px solid rgba(255,255,255,0.1)'}}>
          <button onClick={()=>{if(!started||window.confirm('¿Salir? Perderás el progreso del cuento.'))onBack();}} style={{background:'transparent',border:'none',color:'rgba(255,255,255,0.5)',fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>← Salir</button>
          <div style={{flex:1}}/>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:28,fontWeight:200,letterSpacing:2,color:timerCol(),fontVariantNumeric:'tabular-nums',lineHeight:1}}>{fmt(timer)}</div>
            {timer===0&&<div style={{fontSize:11,color:'#A82020',marginTop:2}}>Tiempo agotado</div>}
          </div>
          <div style={{flex:1,textAlign:'right'}}>
            <div style={{fontSize:11,color:'rgba(255,255,255,0.4)'}}>{chars.toLocaleString()} car.</div>
            <div style={{fontSize:10,color:chars>=MIN_CHARS?'#1E9BF0':'rgba(255,255,255,0.3)',marginTop:1}}>{chars>=MIN_CHARS?'✓ mín. ok':MIN_CHARS-chars+' faltan'}</div>
          </div>
        </div>

        {/* Words bar */}
        <div style={{padding:'10px 14px',display:'flex',flexWrap:'wrap',gap:7,alignItems:'center',minHeight:46}}>
          <span style={{fontSize:10,color:'rgba(255,255,255,0.35)',textTransform:'uppercase',letterSpacing:'.08em',flexShrink:0}}>Palabras:</span>
          {words.map((w,i)=>{
            const used=usedWords[i];
            return<span key={w} style={{
              display:'inline-flex',alignItems:'center',gap:5,
              background:used?'rgba(30,155,240,0.25)':'rgba(255,255,255,0.08)',
              border:'0.5px solid '+(used?'rgba(30,155,240,0.5)':'rgba(255,255,255,0.15)'),
              borderRadius:20,padding:'4px 12px',
              fontSize:12,fontWeight:500,
              color:used?'#4CAF82':'rgba(255,255,255,0.75)',
              transition:'all 0.3s ease',
              textDecoration:used?'line-through':'none',
              opacity:used?0.6:1,
            }}>
              {used&&'✓ '}{w}
            </span>;
          })}
          {allUsed&&<span style={{fontSize:11,color:'#4CAF82',fontWeight:500,marginLeft:4}}>¡Todas usadas!</span>}
        </div>

        {/* Progress bar */}
        <div style={{height:2,background:'rgba(255,255,255,0.08)'}}>
          <div style={{height:'100%',width:Math.min(100,(chars/MIN_CHARS)*100)+'%',background:chars>=MIN_CHARS?'#1E9BF0':'#1E9BF0',transition:'width 0.3s'}}/>
        </div>
      </div>

      {/* Editor */}
      <div style={{flex:1,position:'relative',overflow:'hidden'}}>
        {!started&&<div style={{position:'absolute',top:24,left:36,pointerEvents:'none',zIndex:2,fontSize:17,color:'rgba(26,25,22,0.3)',fontFamily:'"Playfair Display",Georgia,serif',lineHeight:1.85}}>
          Empieza a escribir y arranca el contador…
        </div>}
        <div ref={edRef} contentEditable suppressContentEditableWarning onInput={handleInput}
          style={{position:'absolute',inset:0,overflowY:'auto',padding:'24px 36px 100px',outline:'none',
            fontFamily:'"Playfair Display",Georgia,serif',fontSize:'18px',lineHeight:1.85,color:PROSE_TEXT,caretColor:NARANJA}}/>
      </div>

      {/* Bottom publish bar */}
      <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'12px 20px',background:canPublish?'rgba(30,155,240,0.97)':'rgba(26,25,22,0.95)',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',gap:14,transition:'background 0.4s'}}>
        <div style={{flex:1}}>
          {!started&&<p style={{fontSize:12,color:'rgba(255,255,255,0.5)',margin:0}}>Usa las 5 palabras y escribe {MIN_CHARS.toLocaleString()}+ caracteres para publicar</p>}
          {started&&!allUsed&&<p style={{fontSize:12,color:'rgba(255,255,255,0.5)',margin:0}}>{usedWords.filter(Boolean).length}/5 palabras usadas · {Math.max(0,MIN_CHARS-chars)} caracteres para el mínimo</p>}
          {started&&allUsed&&chars<MIN_CHARS&&<p style={{fontSize:12,color:'rgba(255,255,255,0.6)',margin:0}}>¡Todas las palabras! Faltan {(MIN_CHARS-chars).toLocaleString()} caracteres</p>}
          {canPublish&&<p style={{fontSize:13,fontWeight:500,color:'#fff',margin:0}}>✦ ¡Listo para publicar!</p>}
          {timer===0&&!published&&<p style={{fontSize:12,color:'rgba(255,80,80,0.9)',margin:0}}>Tiempo agotado — {allUsed&&chars>=MIN_CHARS?'puedes publicar igualmente':'no se puede publicar'}</p>}
        </div>
        <button onClick={publish} disabled={!canPublish} style={{
          background:canPublish?'#fff':'rgba(255,255,255,0.15)',
          border:'none',borderRadius:10,
          padding:'10px 22px',fontSize:14,fontWeight:600,
          color:canPublish?'#1E9BF0':'rgba(255,255,255,0.3)',
          cursor:canPublish?'pointer':'default',
          transition:'all 0.3s',
          flexShrink:0,
          boxShadow:canPublish?'0 2px 12px rgba(0,0,0,0.2)':'none',
        }}>
          {saveStatus==='saving'?'Guardando…':'Publicar cuento'}
        </button>
      </div>
    </div>
  );
};

const SendChallengeModal=({user,onClose})=>{
  const [words,setWords]=useState(['','','','','']);
  const [query,setQuery]=useState('');
  const [results,setResults]=useState([]);
  const [recipient,setRecipient]=useState(null);
  const [message,setMessage]=useState('');
  const [status,setStatus]=useState('');
  const [sending,setSending]=useState(false);
  const searchRef=useRef();

  const randomize=()=>{
    const pool=[...WORD_BANK];
    const picked=[];
    while(picked.length<5){const i=Math.floor(Math.random()*pool.length);picked.push(pool.splice(i,1)[0]);}
    setWords(picked);
  };

  useEffect(()=>{
    if(query.length<2){setResults([]);return;}
    const t=setTimeout(async()=>{
      try{const r=await DB.searchByUsername(query);setResults(r.filter(u=>u.id!==user.id));}
      catch{}
    },300);
    return()=>clearTimeout(t);
  },[query]);

  const allWordsOk=words.every(w=>w.trim().length>=2);
  const canSend=allWordsOk&&recipient&&!sending;

  const send=async()=>{
    if(!canSend)return;
    setSending(true);setStatus('');
    try{
      await DB.sendChallenge({
        from_user_id:user.id,
        from_name:user.name,
        from_username:user.username||user.name,
        to_user_id:recipient.id,
        words:words.map(w=>w.trim().toLowerCase()),
        message:message.trim()||null,
      });
      setStatus('¡Reto enviado a @'+recipient.username+'!');
      setTimeout(()=>onClose(),2000);

  };

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(10,27,61,0.5)',zIndex:250,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={e=>{if(e.target===e.currentTarget)onClose()}}>

            <div style={{fontSize:16,fontWeight:700,color:TXT,fontFamily:'"Playfair Display",serif'}}>Enviar reto contrareloj</div>

        </div>

        <div style={{padding:'18px 20px',display:'flex',flexDirection:'column',gap:18}}>
          {/* Words */}
          <div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>

            </div>

              {words.map((w,i)=>(

                    style={{flex:1,fontSize:13,padding:'6px 9px'}}/>

                      <div style={{width:28,height:28,borderRadius:'50%',background:r.bg||'#EEEDFE',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:600,color:r.accent||'#1E9BF0',flexShrink:0}}>{r.initials||r.name[0]}</div>

            {sending?'Enviando…':'Enviar reto ✦'}

        </div>
      </div>
    </div>
  );
};

/* ─── USERNAME SETTINGS ──────────────────────────── */
const UsernamePanel=({user,onClose,onSave})=>{
  const [username,setUsername]=useState(user.username||'');
  const [checking,setChecking]=useState(false);
  const [msg,setMsg]=useState('');
  const [ok,setOk]=useState(false);

  const check=async(val)=>{
    setUsername(val);setOk(false);setMsg('');
    if(val.length<3){setMsg('Mínimo 3 caracteres');return;}
    if(!/^[a-z0-9_]+$/.test(val)){setMsg('Solo letras, números y _');return;}
    setChecking(true);
    try{
      const r=await DB.searchByUsername(val);
      const taken=r.find(u=>u.username===val&&u.id!==user.id);
      if(taken){setMsg('Este nombre ya está en uso');setOk(false);}
      else{setMsg('✓ Disponible');setOk(true);}
    }catch(e){}
    finally{setChecking(false);}
  };

  const save=async()=>{
    if(!ok&&username!==user.username)return;
    try{
      await DB.updateUsername(user.id,username);
      onSave(username);
      onClose();
    }catch(e){setMsg('Error: '+e.message);}
  };

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(10,27,61,0.45)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:20}} onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="fi" style={{background:CARD_BG,borderRadius:14,width:'100%',maxWidth:360,padding:'22px 24px',boxShadow:'0 16px 50px -16px rgba(10,27,61,0.35)'}}>
        <div style={{display:'flex',alignItems:'center',marginBottom:16}}>
          <div><div style={{fontSize:15,fontWeight:700,color:TXT,fontFamily:'"Playfair Display",serif'}}>Tu nombre de usuario</div><div style={{fontSize:11,color:MUTED,marginTop:2}}>Otros usuarios te encontrarán con @{username||'…'}</div></div>
          <div style={{flex:1}}/><button onClick={onClose} style={{background:'transparent',border:'none',fontSize:20,color:MUTED,cursor:'pointer'}}>×</button>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:6}}>
          <span style={{fontSize:16,color:MUTED,fontWeight:500}}>@</span>
          <input type="text" value={username} onChange={e=>check(e.target.value.toLowerCase().replace(/[^a-z0-9_]/g,''))}
            placeholder="tu_usuario" maxLength={30} style={{flex:1}}/>
        </div>
        {msg&&<div style={{fontSize:11,color:msg.startsWith('✓')?AZUL:msg.startsWith('Error')?DANGER:NARANJA,marginBottom:10}}>{checking?'Comprobando…':msg}</div>}
        <button onClick={save} disabled={username.length<3||(username!==user.username&&!ok)} style={{width:'100%',background:ADVANCE_BG,border:'none',borderRadius:9,padding:'11px',fontSize:13,fontWeight:600,color:ADVANCE_TXT,cursor:'pointer',opacity:username.length<3||(username!==user.username&&!ok)?0.4:1,fontFamily:"'Source Sans 3',sans-serif"}}>Guardar</button>
      </div>
    </div>
  );
};

/* ─── TEAMS SCREEN ───────────────────────────────── */
const TeamsScreen=({user,onClose})=>{
  const [teams,setTeams]=useState([]);
  const [view,setView]=useState('list'); // 'list'|'create'|'detail'|'invite'
  const [selected,setSelected]=useState(null);
  const [loading,setLoading]=useState(true);

  const loadTeams=async()=>{
    setLoading(true);
    try{const t=await DB.getMyGroups(user.id);setTeams(t);}
    catch(e){console.error(e);}
    finally{setLoading(false);}
  };

  useEffect(()=>{loadTeams();},[]);

  // Check join code in URL on mount
  useEffect(()=>{
    const url=new URL(window.location.href);
    const code=url.searchParams.get('team');
    if(code){
      url.searchParams.delete('team');
      history.replaceState(null,'',url.pathname);
      handleJoin(code);
    }
  },[]);

  const handleJoin=async(code)=>{
    try{
      const inv=await DB.getInvitationByCode(code);
      if(!inv){alert('Invitación no válida o ya usada.');return;}
      const already=teams.find(t=>t.id===inv.group_id);
      if(already){setSelected(already);setView('detail');return;}
      if(window.confirm('¿Unirte al equipo "'+inv.groups.name+'"?')){
        await DB.joinGroup(inv.groups.code,user.id);
        await DB.useInvitation(code);
        await loadTeams();
        alert('¡Bienvenido al equipo!');
      }
    }catch(e){alert('Error al unirse: '+e.message);}
  };

  if(view==='create')return<CreateTeam user={user} onBack={()=>setView('list')} onCreated={async t=>{await loadTeams();setSelected(t);setView('detail');}}/>;
  if(view==='detail'&&selected)return<TeamDetail user={user} team={selected} onBack={()=>{setView('list');loadTeams();}} onInvite={()=>setView('invite')}/>;
  if(view==='invite'&&selected)return<InvitePanel user={user} team={selected} onBack={()=>setView('detail')}/>;

  return(
    <div style={{position:'fixed',inset:0,background:PAGE_BG,zIndex:200,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',padding:'0 20px',height:52,background:'var(--topbar-bg,#fff)',borderBottom:'1px solid '+BDR,flexShrink:0}}>
        <div style={{fontFamily:'"Playfair Display",serif',fontStyle:'italic',fontWeight:500,fontSize:16,color:TXT}}>Equipos</div>
        <div style={{flex:1}}/>
        <button onClick={onClose} style={{background:'transparent',border:'none',fontSize:20,color:MUTED,cursor:'pointer',lineHeight:1}}>×</button>
      </div>

      <div style={{flex:1,overflowY:'auto',maxWidth:640,width:'100%',margin:'0 auto',padding:'32px 20px 48px',position:'relative'}}>
        <Signo char="*" size={150} top={-8} right={-10} color="naranja"/>
        <Eyebrow color="naranja" style={{marginBottom:8,position:'relative',zIndex:1}}>Comunidad</Eyebrow>
        <div style={{fontFamily:'"Playfair Display",serif',fontSize:24,fontWeight:700,color:TXT,letterSpacing:'-0.015em',marginBottom:24,position:'relative',zIndex:1}}>Escribid juntos.</div>

        {/* Intro */}
        {teams.length===0&&!loading&&<div className="fu" style={{background:CARD_BG,border:'1px solid '+BDR,borderRadius:14,padding:28,marginBottom:20,textAlign:'center',position:'relative',zIndex:1}}>
          <div style={{fontSize:36,marginBottom:12}}>✍️</div>
          <div style={{fontSize:18,fontWeight:700,color:TXT,fontFamily:'"Playfair Display",serif',marginBottom:8}}>Escribe en equipo</div>
          <p style={{fontSize:13,color:MUTED,lineHeight:1.75,maxWidth:400,margin:'0 auto 20px'}}>
            Los equipos te permiten compartir un reto semanal con otras personas, ver sus respuestas y comprometeros juntos a escribir con regularidad. Cada semana un miembro diferente propone el reto.
          </p>
          <Btn variant="accion" onClick={()=>setView('create')}>Crear mi primer equipo →</Btn>
        </div>}

        {teams.length>0&&<>
          <div className="fu" style={{display:'flex',flexDirection:'column',gap:10,marginBottom:20,position:'relative',zIndex:1}}>
            {teams.map(t=>(
              <button key={t.id} onClick={()=>{setSelected(t);setView('detail');}} style={{background:CARD_BG,border:'1px solid '+BDR,borderRadius:12,padding:'14px 18px',cursor:'pointer',textAlign:'left',display:'flex',alignItems:'center',gap:14}}>
                <TeamAvatar team={t} size={44}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:600,color:TXT}}>{t.name}</div>
                  <div style={{fontSize:11,color:MUTED,marginTop:2}}>{t.role==='admin'?'Administrador':'Miembro'}</div>
                </div>
                <span style={{color:FAINT,fontSize:16}}>›</span>
              </button>
            ))}
          </div>
          <button onClick={()=>setView('create')} style={{width:'100%',background:'transparent',border:'1.5px dashed rgba(30,155,240,0.4)',borderRadius:11,padding:'12px',fontSize:13,fontWeight:600,color:AZUL,cursor:'pointer',fontFamily:"'Source Sans 3',sans-serif",position:'relative',zIndex:1}}>+ Crear otro equipo</button>
        </>}

        {loading&&<div style={{textAlign:'center',padding:40,color:MUTED,fontSize:13}}>Cargando equipos…</div>}
      </div>
    </div>
  );
};

#root{height:100vh;display:flex;flex-direction:column;overflow:hidden;position:relative}
#root::before{content:'';position:fixed;inset:0;background:rgba(244,242,237,0.70);pointer-events:none;z-index:0}
#root>*{position:relative;z-index:1}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.13);border-radius:3px}
input,select,textarea,button{font-family:inherit}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;background:rgba(0,0,0,0.1);border-radius:2px;outline:none;cursor:pointer;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.22);cursor:pointer;margin-top:-7px}
input[type=text],input[type=number],textarea{border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;padding:8px 11px;font-size:13px;color:#1A1916;background:#fff;outline:none}

<script>
const WEEKLY_CHALLENGES_64=[
  {id:"r01",familia:"Narrador y punto de vista",titulo:"La escena más incómoda",goal:500,mode:"tunel",desc:`Escribe la conversación más tensa posible entre dos personas que se conocen bien. El reto es la precisión psicológica, no el dramatismo.`,teoria:`La incomodidad verdadera en la narrativa no grita: se instala en los silencios, en los gestos que no cuadran. Carver lo entendió mejor que nadie: sus escenas más devastadoras son sobre lo que ocurre alrededor del silencio. En *De qué hablamos cuando hablamos del amor*, cuatro personas beben gin en una cocina y la conversación sobre el amor abstracto es el vehículo de cuatro confesiones que nunca se pronuncian.

Para escribir incomodidad auténtica, trabaja tres capas simultáneas: lo que los personajes dicen, lo que están pensando, y lo que sus cuerpos hacen sin que ellos lo decidan. Los gestos son clave: alguien se sirve más vino sin necesitarlo, alguien reorganiza los cubiertos, alguien ríe un segundo antes de que la frase haya terminado.

La incomodidad más poderosa aparece cuando los personajes saben exactamente lo que no pueden decir. Esa imposibilidad es la energía dramática de la escena.

**Fragmento de referencia:**
*—¿Estás bien? —preguntó Mel. —Claro —dijo Terri. Se encogió de hombros. —Bien —dijo Mel. Nadie dijo nada durante un rato.*
— Raymond Carver, *De qué hablamos cuando hablamos del amor*

**Libros y autores recomendados:**
- Raymond Carver — *De qué hablamos cuando hablamos del amor*
- Flannery O'Connor — *Un hombre bueno es difícil de encontrar*
- Edna O'Brien — *La hora violeta*
- Alice Munro — *Demasiada felicidad*
- Richard Yates — *Revolutionary Road*`},
  {id:"r02",familia:"Narrador y punto de vista",titulo:"El narrador colectivo",goal:500,mode:"rio",desc:`Una comunidad, un vecindario, una clase. Escribe en 'nosotros' durante toda la semana.`,teoria:`El 'nosotros' narrativo plantea de entrada una pregunta filosófica: ¿quién habla? ¿Todos al mismo tiempo? ¿Un portavoz que se arroga la voz del grupo?

Faulkner en *Una rosa para Emily* usó el 'nosotros' del pueblo entero que observa y juzga y recuerda. Ese narrador colectivo no es omnisciente: sabe lo que sabe el rumor, lo que se ve desde la ventana. Su limitación epistemológica es parte de su poder.

Jeffrey Eugenides en *Las vírgenes suicidas* lleva el procedimiento más lejos: un 'nosotros' masculino y adulto que recuerda su obsesión adolescente. El narrador colectivo funciona como mecanismo de distancia y de culpa compartida.

Hay dos trampas: hacer que todos piensen igual (el monolito sin fisuras), o individualizar tanto que el 'nosotros' pierda su sentido. La tensión entre lo que el grupo piensa como masa y lo que alguno siente de forma distinta es la energía dramática.

**Fragmento de referencia:**
*Nosotros nos acordamos del olor del humo de los Lisbon ese otoño. Nuestra ciudad entera estaba en llamas.*
— Jeffrey Eugenides, *Las vírgenes suicidas*

**Libros y autores recomendados:**
- William Faulkner — *Una rosa para Emily*
- Jeffrey Eugenides — *Las vírgenes suicidas*
- Joshua Ferris — *And Then We Came to the End*
- Julie Otsuka — *The Buddha in the Attic*
- Dennis Lehane — *Mystic River*`},
  {id:"r03",familia:"Narrador y punto de vista",titulo:"El narrador no fiable",goal:550,mode:"tunel",desc:`El lector debe intuir que algo no cuadra antes del final. Sin revelar el engaño directamente.`,teoria:`Stevens, en *Lo que queda del día* de Kazuo Ishiguro, lleva décadas contándose a sí mismo que fue un gran mayordomo al servicio de un gran hombre. El lector entiende, antes que él, que ambas cosas son falsas. Ishiguro no traiciona a su personaje: simplemente lo deja hablar.

La no fiabilidad narrativa no es una trampa sino una invitación a leer en dos niveles: lo que el narrador dice y lo que el texto revela a pesar de él. Para que funcione, el escritor necesita sembrar contradicciones que el narrador no percibe pero el lector sí.

La clave técnica más importante: el narrador no fiable debe ser completamente coherente con su propia lógica. Sus puntos ciegos son exactamente los que su psicología e historia le imponen. Si un personaje no puede ver su propia crueldad, es porque ha construido una arquitectura de justificaciones que, desde dentro, parecen perfectamente razonables.

**Fragmento de referencia:**
*Me dije a mí mismo que era un hombre de principios. Me lo dije muchas veces. Si ahora miro atrás, veo que me lo decía con demasiada frecuencia.*
— Kazuo Ishiguro, *Lo que queda del día* (paráfrasis)

**Libros y autores recomendados:**
- Kazuo Ishiguro — *Lo que queda del día*
- Vladimir Nabokov — *Lolita*
- Gillian Flynn — *Perdida*
- Ian McEwan — *Expiación*
- Henry James — *Otra vuelta de tuerca*`},
  {id:"r04",familia:"Narrador y punto de vista",titulo:"Tres versiones",goal:600,mode:"normal",desc:`El mismo momento contado por tres personajes distintos. Cada uno omite algo diferente.`,teoria:`El efecto Rashomon no es simplemente tres relatos del mismo evento. Es la diferencia entre los relatos: lo que uno ve y los otros no, lo que uno recuerda mal, lo que uno omite deliberadamente. Esa diferencia es donde vive la verdad del texto.

Faulkner lleva esto al extremo en *El sonido y la furia*: cuatro voces radicalmente distintas que narran los mismos hechos. Ninguna da la historia completa. La historia completa solo existe en la mente del lector.

La tentación es hacer que cada narrador 'corrija' a los anteriores. Más interesante es plantear versiones igualmente parciales, igualmente distorsionadas por el deseo o el miedo. La historia no se revela: se complica.

La pregunta más útil: ¿qué no puede ver cada uno? La omisión es tan importante como la adición. Lo que un narrador no menciona puede ser el centro de gravedad de toda la escena.

**Fragmento de referencia:**
*Uno de ellos recordaba que hacía calor. El otro juraba que llovía. Los dos tenían fotos del mismo día. En las fotos no se ve el cielo.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- William Faulkner — *El sonido y la furia*
- Ryunosuke Akutagawa — *Rashomon y otros cuentos*
- Lawrence Durrell — *El cuarteto de Alejandría*
- Jennifer Egan — *A Visit from the Goon Squad*
- John Barth — *Lost in the Funhouse*`},
  {id:"r05",familia:"Narrador y punto de vista",titulo:"El testigo",goal:450,mode:"tunel",desc:`Alguien que observa pero no participa. La historia ocurre a su alrededor sin que él intervenga.`,teoria:`Nick Carraway en *El gran Gatsby* es el ejemplo más célebre: situado en el margen de la acción, puede verla con una claridad que los protagonistas no tienen. Su posición es privilegiada no a pesar de su distancia, sino gracias a ella.

Lo que hace interesante al testigo no es su neutralidad sino la tensión entre lo que ve y lo que decide hacer. El testigo que podría intervenir y no lo hace es moralmente interesante.

Henry James convirtió el punto de vista del testigo en una teoría completa: el 'centro de conciencia' no tiene por qué ser el protagonista. En *Los embajadores*, Strether observa cómo los demás viven mientras reflexiona sobre qué significa vivir.

Una pregunta fundamental: ¿qué le cuesta al testigo no intervenir? La pasividad pura es dramáticamente inerte. Necesita algo en juego —una lealtad dividida, un miedo— que la haga significativa.

**Fragmento de referencia:**
*Así que seguimos adelante, botes contra la corriente, arrastrados sin cesar hacia el pasado.*
— F. Scott Fitzgerald, *El gran Gatsby*

**Libros y autores recomendados:**
- F. Scott Fitzgerald — *El gran Gatsby*
- Henry James — *Los embajadores*
- W. Somerset Maugham — *El filo de la navaja*
- Elizabeth Bowen — *The Death of the Heart*
- Penelope Fitzgerald — *The Gate of Angels*`},
  {id:"r06",familia:"Narrador y punto de vista",titulo:"El narrador póstumo",goal:500,mode:"rio",desc:`La historia la cuenta alguien que ya no está. Sin melodrama.`,teoria:`La voz del muerto, mal usada, cae en lo sentimental. Bien usada, crea una distancia temporal única: el narrador sabe cómo termina todo, lo que libera al texto del suspense convencional y lo carga de una melancolía serena. La historia ya ocurrió. Lo que queda es entenderla.

Susie Salmon en *Desde mi cielo* de Sebold funciona no por el misterio sobrenatural sino por su tono: observa con una mezcla de curiosidad y añoranza que nunca cae en la autocompasión. No llora por sí misma.

Una estrategia: el narrador muerto que todavía desea cosas. Que todavía tiene algo en juego aunque ya no pueda intervenir. Esa paradoja —querer sin poder, ver sin poder cambiar— es la fuente de tensión de esta voz.

**Fragmento de referencia:**
*Mi nombre era Salmon, como el pez; primero Susie. Tenía catorce años cuando me asesinaron el 6 de diciembre de 1973.*
— Alice Sebold, *Desde mi cielo*

**Libros y autores recomendados:**
- Alice Sebold — *Desde mi cielo*
- Markus Zusak — *La ladrona de libros*
- Gabriel García Márquez — *Crónica de una muerte anunciada*
- Juan Rulfo — *Pedro Páramo*
- Edgar Lee Masters — *Antología de Spoon River*`},
  {id:"r07",familia:"Narrador y punto de vista",titulo:"El narrador animal",goal:450,mode:"normal",desc:`Desde los ojos de un animal doméstico o salvaje. Sin antropomorfizar la voz.`,teoria:`La tentación al escribir desde un punto de vista animal es la humanización: el perro que 'piensa' en frases complejas. Esta proyección produce textos encantadores pero perezosos, porque evitan el verdadero reto: imaginar una percepción genuinamente otra.

Woolf en *Flush* no pretende entrar en la mente del perro: construye una perspectiva a partir de sus sentidos. Una estrategia más productiva que intentar pensar como el animal: construir la narración a partir de las percepciones que ese animal tiene y los humanos no.

El reto implícito es también filosófico: ¿hasta qué punto podemos imaginar una conciencia radicalmente distinta? El escritor que lo intenta con honestidad aprende algo sobre los límites de su propia perspectiva.

**Fragmento de referencia:**
*El mundo, como Flush lo experimentaba, era un lugar de olores. El olor de un ciprés era completamente diferente del olor de otro ciprés a cien metros. Cada persona tenía su olor propio.*
— Virginia Woolf, *Flush* (paráfrasis)

**Libros y autores recomendados:**
- Virginia Woolf — *Flush*
- Jack London — *La llamada de lo salvaje*
- Franz Kafka — *Investigaciones de un perro*
- Yann Martel — *La vida de Pi*
- Peter Wohlleben — *La vida secreta de los árboles*`},
  {id:"r08",familia:"Narrador y punto de vista",titulo:"El narrador objeto",goal:450,mode:"tunel",desc:`Un objeto cotidiano narra lo que presencia. El reto: no darle emociones humanas, solo percepciones.`,teoria:`El objeto como narrador permite una distancia radical: ve sin juzgar, registra sin interpretar. El objeto ideal es uno que cambie de manos o presencie cambios sin poder intervenir: una silla que pasa de una familia a otra, un reloj heredado.

El error más común es dar al objeto pensamientos y emociones demasiado humanos. La alternativa es describir hechos con la precisión de un registro, dejando que el lector construya el significado emocional.

Una pregunta útil: ¿qué ve el objeto que los humanos no ven? ¿Qué registra que nadie ha pensado en ocultar porque nadie piensa que el objeto mira?

**Fragmento de referencia:**
*Yo fui el piano de la familia durante ochenta y tres años. Fui afinado diecisiete veces. Me mudé en cuatro ocasiones. Nadie, en esos ochenta y tres años, aprendió a tocarme bien.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Italo Calvino — *Las ciudades invisibles*
- Patrick Süskind — *El perfume*
- Georges Perec — *Las cosas*
- Neil Gaiman — *American Gods*
- Umberto Eco — *El nombre de la rosa*`},
  {id:"r09",familia:"Voz y estilo",titulo:"Sin adjetivos",goal:450,mode:"rio",desc:`Toda la semana, ningún adjetivo. Solo sustantivos, verbos y la precisión que da el ritmo.`,teoria:`El adjetivo es la muleta más común del escritor principiante y la trampa más sutil del intermedio. 'La tarde oscura y melancólica' es más fácil que encontrar el verbo o el sustantivo que haga ese trabajo. Pero 'oscura y melancólica' es también el camino más corto hacia la prosa genérica.

El ejercicio produce tres efectos: primero, una sensación de amputación. Segundo, la búsqueda de verbos más precisos: en lugar de 'caminó lentamente', encontrar el verbo que ya contenga esa lentitud (arrastrar, deslizarse). Tercero, una nueva relación con el sustantivo: si no puedo decir 'silla vieja', tengo que encontrar un sustantivo que ya contenga la vejez.

Beckett llevó esta restricción a sus últimas consecuencias en *Compañía*: una prosa que trabaja con repetición y ritmo. El resultado no es pobreza sino honestidad radical.

**Fragmento de referencia:**
*El hombre fue hacia la ventana. Afuera llovía. Los árboles se movían. Puso la mano en el cristal.*
— Fragmento de trabajo (el lector pone el frío)

**Libros y autores recomendados:**
- Ernest Hemingway — *Por quién doblan las campanas*
- Samuel Beckett — *Compañía*
- Cormac McCarthy — *La carretera*
- Raymond Carver — *Catedral*
- Annie Proulx — *Brokeback Mountain*`},
  {id:"r10",familia:"Voz y estilo",titulo:"La frase larga",goal:500,mode:"normal",desc:`Escribe en frases de más de cuatro líneas. Período largo, subordinadas, respiración extensa.`,teoria:`La frase larga tiene una física distinta. La frase corta es un golpe, una certeza. La frase larga es un proceso: el lector no sabe adónde va hasta que llega. Las subordinadas acumulan información, los paréntesis abren digresiones.

Pero la frase larga mal construida es simplemente confusa. La diferencia entre Proust y el párrafo difícil de la prosa académica es que Proust sabe exactamente adónde va. La clave es la respiración. Lee tus frases en voz alta: la coma y el punto y coma son instrumentos de respiración, no de gramática.

Una restricción útil: cada frase larga debe tener un único verbo principal al que todo lo demás conduce. La multiplicidad de verbos principales crea no una frase larga sino varias frases juntas.

**Fragmento de referencia:**
*Durante mucho tiempo me fui a la cama temprano y a veces, cuando apagaba la vela, mis ojos se cerraban tan rápido que ni siquiera tenía tiempo de decirme «me estoy durmiendo».*
— Marcel Proust, *Por el camino de Swann*

**Libros y autores recomendados:**
- Marcel Proust — *En busca del tiempo perdido*
- José Saramago — *El evangelio según Jesucristo*
- Thomas Bernhard — *El malogrado*
- W. G. Sebald — *Los anillos de Saturno*
- William Faulkner — *Absalón, Absalón*`},
  {id:"r11",familia:"Voz y estilo",titulo:"La frase corta",goal:400,mode:"rio",desc:`Todo el texto en frases de una cláusula. Sin conectores. La yuxtaposición hace el trabajo.`,teoria:`La frase corta es percusión: cada golpe es completo en sí mismo y el ritmo emerge de la secuencia. La frase corta funciona por yuxtaposición: no necesita decir la relación entre dos hechos porque la proximidad la implica.

El riesgo es el martilleo: a partir de cierto punto, si todos los golpes son iguales, el oído se insensibiliza. Los maestros del período corto usan variación de longitud dentro de lo 'corto': algunas frases de tres palabras, algunas de diez, pero ninguna con subordinadas complejas.

Otro riesgo: la frialdad que puede volverse tic. La frase corta debe ser una elección en función del contenido: funciona especialmente bien con acciones y estados de tensión donde el pensamiento se vuelve elemental.

**Fragmento de referencia:**
*Llovía. El río había crecido. Los sauces tocaban el agua. Nadie salió ese día.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Ernest Hemingway — *Fiesta*
- Raymond Carver — *Catedral*
- Cormac McCarthy — *La carretera*
- Annie Proulx — *Wyoming*
- Joan Didion — *El año del pensamiento mágico*`},
  {id:"r12",familia:"Voz y estilo",titulo:"Cambio de registro",goal:550,mode:"normal",desc:`La misma escena en tres registros: burocrático, coloquial, poético. Luego elige el más honesto.`,teoria:`El registro es la relación entre el hablante, el oyente y el contexto. Cambiar el registro es cambiar radicalmente quién habla, a quién, y con qué propósito. La misma escena en tres registros no es la misma escena tres veces: es casi tres textos distintos.

El registro burocrático tiene una capacidad particular para revelar la violencia de la burocracia sobre la experiencia humana. Cuando una muerte se convierte en 'el deceso del sujeto identificado como', el contraste produce un efecto perturbador. Kafka lo exploró hasta el límite.

El registro coloquial exige su propia precisión: el habla real tiene sus propias estructuras, sus propias elipsis. Escribir coloquialmente bien no es descuidarse.

**Fragmento de referencia:**
*Burocrático: «Se constata que el sujeto A y el sujeto B mantuvieron contacto verbal durante doce minutos.» / Coloquial: «Estuvieron charlando un rato en el rellano.» / Poético: «Se detuvieron bajo la luz polvorienta y el tiempo hizo lo que hace: ignorarlos.»*

**Libros y autores recomendados:**
- Franz Kafka — *El proceso*
- Georges Perec — *La vida instrucciones de uso*
- Juan Rulfo — *El llano en llamas*
- Lydia Davis — *Cuentos completos*
- David Foster Wallace — *La broma infinita*`},
  {id:"r13",familia:"Voz y estilo",titulo:"La voz que contradice su tono",goal:450,mode:"tunel",desc:`Algo violento con prosa dulce. Algo amable con prosa seca. La tensión entre fondo y forma.`,teoria:`Cuando el tono y el contenido están en consonancia perfecta, el texto corre el riesgo de volverse predecible. La contradicción entre fondo y forma produce un efecto más perturbador.

Flannery O'Connor describía este principio como central a su poética: el grotesco aparece con un tono casi amable, lo que lo hace más aterrador. Nabokov en *Lolita* lleva esto al extremo: Humbert Humbert describe sus crímenes con una prosa de belleza extraordinaria, y esa belleza es parte del crimen.

Para este reto, elige un extremo claro: contenido muy oscuro con prosa muy luminosa, o contenido muy cotidiano con prosa muy grave. La versión intermedia no produce el efecto buscado.

**Fragmento de referencia:**
*Las palabras miel, plumas, seda, paloma caían de los labios de Humbert mientras describía a su «amada». El lector tarda un momento en recordar quién es Humbert y qué está haciendo.*
— Parafraseando a Nabokov, *Lolita*

**Libros y autores recomendados:**
- Vladimir Nabokov — *Lolita*
- Flannery O'Connor — *Un hombre bueno es difícil de encontrar*
- Mary Gaitskill — *Bad Behavior*
- Bret Easton Ellis — *American Psycho*
- Shirley Jackson — *La lotería*`},
  {id:"r14",familia:"Voz y estilo",titulo:"Sin el verbo ser",goal:450,mode:"rio",desc:`Toda la semana sin usar 'ser' ni 'estar'. Obliga a buscar verbos activos.`,teoria:`Los verbos copulativos —ser, estar— unen sujeto y predicado sin añadir acción. 'El cielo era azul' no hace nada. 'El cielo pesaba como una losa de agua' hace mucho más trabajo.

Esta restricción es un método de búsqueda. Al no poder decir 'era melancólico', el escritor se obliga a preguntar: ¿qué hace alguien melancólico? ¿Cómo se mueve? ¿Qué mira? Y al responder con verbos activos, la escritura se vuelve cinematográfica: muestra en lugar de nombrar.

McCarthy es maestro de la prosa sin copulativos: 'El sol cruzaba el cielo' en lugar de 'era de día'. Esta preferencia crea un mundo en movimiento constante, donde nada se detiene para ser nombrado.

**Fragmento de referencia:**
*El sol caía vertical sobre los campos. El hombre avanzó hasta la sombra del árbol. El calor vibraba en el aire.*
— Fragmento de trabajo (sin ser ni estar)

**Libros y autores recomendados:**
- Cormac McCarthy — *Meridiano de sangre*
- Ernest Hemingway — *En nuestro tiempo*
- Denis Johnson — *Hijo de Jesús*
- Juan Rulfo — *Pedro Páramo*
- Barry Hannah — *Geronimo Rex*`},
  {id:"r15",familia:"Voz y estilo",titulo:"El estilo de otro",goal:500,mode:"normal",desc:`Elige un autor y escribe a su manera. No su historia: tu historia, su cadencia.`,teoria:`La imitación tiene mala prensa en la cultura contemporánea. Pero todos los grandes escritores han pasado por una fase de imitación deliberada: Borges copió a Stevenson antes de encontrar su voz. Hemingway imitó a Stein.

Cuando intentas reproducir el ritmo de las frases de Saramago o la arquitectura de los párrafos de Woolf, aprendes cosas que el análisis crítico nunca te daría: cómo está construido ese efecto, no solo qué produce.

Para este reto: elige un autor que admires. Lee dos o tres páginas en voz alta hasta que el ritmo esté en tu cuerpo. Luego escribe tu historia —no la del autor, la tuya— con esa música. Antes de escribir, analiza tres rasgos técnicos concretos del estilo elegido.

**Fragmento de referencia:**
*(Tomar «La señora Dalloway dijo que ella misma compraría las flores» y reescribir con la misma estructura decisiva y temporal): «El señor Vargas dijo que él mismo llevaría el informe.»*

**Libros y autores recomendados:**
- Virginia Woolf — *La señora Dalloway*
- Jorge Luis Borges — *Ficciones*
- José Saramago — *El evangelio según Jesucristo*
- Raymond Carver — *Catedral*
- Clarice Lispector — *La pasión según G.H.*`},
  {id:"r16",familia:"Voz y estilo",titulo:"El texto que se repite",goal:500,mode:"tunel",desc:`Una frase, imagen o estructura que vuelve al menos tres veces transformada.`,teoria:`La repetición en la prosa literaria no es un defecto: es una técnica. Cuando una frase, una imagen o una estructura vuelven en un texto, producen un leitmotif: el lector recuerda el primer encuentro y ve cómo ha cambiado en sus reapariciones.

Faulkner lo usó magistralmente: ciertas frases vuelven resignificadas por todo lo que ha ocurrido entre sus apariciones. Toni Morrison en *Beloved* repite frases enteras como una incantación: la repetición funciona como memoria traumática.

Para este reto, elige tu elemento antes de empezar. Decide de antemano cómo va a cambiar en cada aparición: ¿cambia el contexto? ¿la palabra clave? ¿el hablante? El cambio es tan importante como la repetición.

**Fragmento de referencia:**
*Primera: «El tren llegó puntual.» Segunda: «El tren llegó puntual, como siempre.» Tercera: «El tren llegó puntual. Nadie lo esperaba ya.»*
— Fragmento de trabajo

**Libros y autores recomendados:**
- William Faulkner — *El sonido y la furia*
- Toni Morrison — *Beloved*
- Don DeLillo — *Submundo*
- Marguerite Duras — *El amante*
- Samuel Beckett — *Esperando a Godot*`},
  {id:"r17",familia:"Diálogos",titulo:"Diálogo sin atribuciones",goal:500,mode:"tunel",desc:`Nadie 'dijo'. Solo voces. El lector debe saber quién habla por el tono.`,teoria:`Las etiquetas de diálogo son, en el mejor de los casos, elementos neutros. En el peor, muletas. Eliminarlas obliga a resolver el problema de fondo: ¿son estos dos personajes suficientemente distintos?

Elmore Leonard hacía algo radical: larguísimas conversaciones sin ninguna atribución, donde el ritmo, el vocabulario y el contenido de cada intervención eran suficientes para identificar al hablante.

La clave es la diferenciación de voces. Si uno habla en frases cortas y el otro en largas, si uno usa subjuntivo y el otro lo evita, si uno pregunta y el otro afirma, el lector los distingue sin esfuerzo.

Estrategia: escribe primero el diálogo con todas las atribuciones. Luego elimínalas. Si el resultado es confuso, el problema no está en las etiquetas: está en las voces.

**Fragmento de referencia:**
*—¿Cuándo vuelves? —No lo sé. —¿No lo sabes o no quieres decirlo? —Ambas cosas.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Elmore Leonard — *Get Shorty*
- Cormac McCarthy — *La carretera*
- Ernest Hemingway — *Las colinas como elefantes blancos*
- Harold Pinter — *El sirviente*
- Denis Johnson — *Hijo de Jesús*`},
  {id:"r18",familia:"Diálogos",titulo:"Lo que no se dice",goal:500,mode:"tunel",desc:`Dos personajes hablan de una cosa pero en realidad discuten de otra.`,teoria:`El subtext —lo que está debajo del texto— es la dimensión más cinematográfica de la escritura. En la vida real, las personas raramente dicen directamente lo que quieren decir.

Hemingway lo llamó la 'teoría del iceberg'. En 'Las colinas como elefantes blancos', dos personas hablan de 'una operación sencilla' mientras toman cervezas. La palabra 'aborto' no aparece nunca. Y sin embargo el cuento habla de eso, y de mucho más: del poder en la relación, del miedo de ella, de la coerción de él.

Para escribir con subtext hay que hacer un doble trabajo: definir de qué habla la conversación literalmente, y definir de qué habla realmente. La trampa más común: el subtext que se hace explícito.

**Fragmento de referencia:**
*—¿Están fríos los vasos? —preguntó la chica. —Sí —respondió el hombre—. Siempre están fríos en la sombra. Volvieron a mirar la línea de colinas.*
— Hemingway, *Las colinas como elefantes blancos*

**Libros y autores recomendados:**
- Ernest Hemingway — *Las colinas como elefantes blancos*
- Harold Pinter — *Traición*
- John Cheever — *El nadador*
- Alice Munro — *Escapada*
- Richard Yates — *Revolutionary Road*`},
  {id:"r19",familia:"Diálogos",titulo:"Solo un lado",goal:400,mode:"normal",desc:`Conversación telefónica o de chat. Solo escuchamos a uno. El otro se adivina.`,teoria:`El monólogo dramático tiene una tradición ilustre en la poesía y el teatro, pero su traslado a la prosa produce efectos únicos. Cuando solo escuchamos a uno de los interlocutores, el lector se convierte en detective.

La restricción técnica es exigente: el narrador visible debe revelar lo suficiente sobre lo que dice el otro para que el lector pueda seguir, pero sin falsificar la naturaleza del dispositivo.

Lydia Davis es la maestra contemporánea: sus cuentos de teléfono construyen relaciones enteras a partir de una sola voz.

**Fragmento de referencia:**
*—¿Sí? —… —No, no lo sabía. —… —Claro que me importa. —… —No, no es eso.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Lydia Davis — *Cuentos completos*
- Jean Cocteau — *La voz humana*
- Robert Browning — *Mi última duquesa*
- Muriel Spark — *A la señorita Jean Brodie*
- Nicholson Baker — *Vox*`},
  {id:"r20",familia:"Diálogos",titulo:"El monólogo disfrazado",goal:450,mode:"normal",desc:`Un personaje habla tanto que el otro casi no existe. Pero ese silencio dice algo.`,teoria:`Hay personajes que no saben escuchar, que usan la conversación como forma de evitar el contacto real. Este tipo de personaje produce un diálogo que es en realidad un monólogo con interrupciones.

Bernhard llevó esto al extremo en novelas como *El malogrado*: el narrador habla sin parar sobre un tema obsesivo, y las respuestas del interlocutor son casi invisibles. El lector siente la asfixia del interlocutor.

Para este reto, el personaje que calla importa tanto como el que habla. Sus escasas intervenciones deben ser precisas y reveladoras. El silencio del interlocutor tiene que sentirse como presencia, no como ausencia.

**Fragmento de referencia:**
*—Claro que sé lo que me vas a decir. Pero escúchame, que esto es importante. ¿Me escuchas? —Sí. —Porque creo que esta vez es diferente.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Thomas Bernhard — *El malogrado*
- Saul Bellow — *Herzog*
- José Saramago — *El año de la muerte de Ricardo Reis*
- Penelope Fitzgerald — *The Bookshop*
- Harold Pinter — *El cuidador*`},
  {id:"r21",familia:"Diálogos",titulo:"La conversación de años",goal:600,mode:"normal",desc:`Tres conversaciones entre las mismas dos personas: en el pasado, el presente y el futuro imaginado.`,teoria:`El tiempo es el personaje invisible de cualquier relación larga. Las mismas dos personas que tuvieron una conversación hace veinte años son, en cierta forma, personas distintas; y sin embargo algo persiste que hace que sigan siendo 'ellos'.

David Nichols en *Un día* usó una variación: el mismo día del año, durante dos décadas. El resultado es un retrato de cómo cambia y no cambia una relación. El lector llena los huecos entre los días elegidos con todo lo que imagina.

Un aspecto técnico: el lenguaje debería cambiar entre conversaciones. Las personas hablan diferente a los veinte, a los cuarenta. Esas diferencias lingüísticas son parte de la información que el lector recibe.

**Fragmento de referencia:**
*Primera (veinte años): «¿Qué quieres hacer con tu vida?» Segunda (cuarenta): «¿Crees que tomamos las decisiones correctas?» Tercera (sesenta, imaginada): el silencio que ambos entienden.*

**Libros y autores recomendados:**
- David Nichols — *Un día*
- Colm Tóibín — *Brooklyn*
- Alice Munro — *Las lunas de Júpiter*
- Ian McEwan — *On Chesil Beach*
- Richard Linklater — trilogía *Antes del amanecer*`},
  {id:"r22",familia:"Diálogos",titulo:"El primer y último diálogo",goal:500,mode:"tunel",desc:`El primer intercambio que tuvieron dos personajes y el último. Sin contexto intermedio.`,teoria:`Dos momentos, todo el espacio entre ellos implícito. El primer intercambio entre dos personas contiene lo que no pueden saber todavía: lo que llegarán a ser el uno para el otro. El último contiene el peso de todo lo que fue y ya no es.

Alice Munro es la maestra de la elipsis enorme. Sus cuentos funcionan a través de cortes temporales donde nada es explicado: el lector ve el principio y el final de una relación, y la relación entera existe en el espacio entre esos dos puntos.

El trabajo más difícil es resistir la tentación de añadir contexto. El lector que tiene que inferir lo que ocurrió entre los dos diálogos es un lector más comprometido.

**Fragmento de referencia:**
*Primera conversación: «No te había visto nunca por aquí.» Última conversación: «Siempre estuviste aquí, ¿verdad?»*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Alice Munro — *Demasiada felicidad*
- Marilynne Robinson — *Gilead*
- Ian McEwan — *Amor perdurable*
- Kazuo Ishiguro — *Nunca me abandones*
- E. M. Forster — *Pasaje a la India*`},
  {id:"r23",familia:"Diálogos",titulo:"Hablar sin escucharse",goal:450,mode:"normal",desc:`Cada personaje persigue su propio hilo. Nunca responden a lo que el otro dice realmente.`,teoria:`La conversación como malentendido permanente es una de las estructuras más honestas con la realidad de la comunicación humana. En la vida cotidiana, escuchamos parcialmente y respondemos a menudo a lo que creíamos que iban a decir.

Ionesco convirtió esta estructura en principio teatral en *La cantante calva*: sus personajes hablan sin comunicarse, el malentendido es total y cómico y terrible.

Para este reto, define antes de escribir qué preocupa a cada personaje. El personaje A está pensando en su trabajo mientras habla de la cena. El personaje B está pensando en su madre mientras habla de lo mismo. Ninguno menciona lo que realmente está pensando.

**Fragmento de referencia:**
*—¿Quieres más pan? —Llamé a mi hermano ayer. —Lo hice yo esta mañana. —No contestó.*
— Fragmento de trabajo (dos conversaciones que no se tocan)

**Libros y autores recomendados:**
- Eugène Ionesco — *La cantante calva*
- Don DeLillo — *White Noise*
- Thomas Bernhard — *Tala*
- Nathalie Sarraute — *Tropisms*
- Samuel Beckett — *Esperando a Godot*`},
  {id:"r24",familia:"Descripción y mundo sensorial",titulo:"Sin la vista",goal:450,mode:"tunel",desc:`Describe un lugar usando solo olfato, oído, tacto y temperatura.`,teoria:`La vista es el sentido dominante en la prosa narrativa hasta un grado que pocas veces cuestionamos. Describir es, para la mayoría de los escritores, ver. Este dominio es una convención literaria, no una necesidad narrativa.

Süskind construyó *El perfume* sobre el olfato como sentido dominante. El olfato, directamente conectado con la memoria y la emoción en la neurología humana, produce una intimidad perturbadora.

La prohibición de la vista produce varios efectos: la búsqueda de vocabulario (el léxico del olfato y el tacto es más pobre), y el descubrimiento de que el espacio puede describirse completamente sin imagen: el sonido de los pasos en suelo de madera dice tanto sobre el espacio como su apariencia.

**Fragmento de referencia:**
*El almacén olía a naftalina y a papel viejo y a algo más dulce que no sabía nombrar. El suelo crujía en el centro. Las paredes irradiaban frío aunque afuera fuera verano.*
— Fragmento de trabajo (sin ninguna referencia visual)

**Libros y autores recomendados:**
- Patrick Süskind — *El perfume*
- John Hull — *Touching the Rock*
- Annie Dillard — *Pilgrim at Tinker Creek*
- Barry Lopez — *Arctic Dreams*
- Diane Ackerman — *Una historia natural de los sentidos*`},
  {id:"r25",familia:"Descripción y mundo sensorial",titulo:"La memoria del lugar",goal:500,mode:"normal",desc:`El mismo espacio ahora y hace veinte años. Qué permanece, qué ha desaparecido.`,teoria:`Un lugar que conocemos a lo largo del tiempo es una superposición de capas temporales, donde el presente está habitado por fantasmas del pasado. W. G. Sebald construyó toda su obra sobre este principio: los lugares en su obra están siempre doblados temporalmente.

La técnica más efectiva no es la comparación directa ('antes había un árbol aquí') sino la presencia de los vestigios: lo que permanece de lo que fue. El perfil de una puerta tapiada. El color de la pared donde estuvo colgado algo durante décadas. Esos vestigios son más poderosos que cualquier descripción directa del cambio.

**Fragmento de referencia:**
*Donde ahora había una tienda de telefonía había sido, durante treinta años, una farmacia. El mismo umbral de piedra. El mismo escalón desgastado en el centro por generaciones de pies.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- W. G. Sebald — *Los emigrados*
- Gaston Bachelard — *La poética del espacio*
- Rebecca Solnit — *A Field Guide to Getting Lost*
- Bruce Chatwin — *Los trazos de la canción*
- Georges Perec — *Tentativa de agotar un lugar parisino*`},
  {id:"r26",familia:"Descripción y mundo sensorial",titulo:"El objeto extraordinario",goal:450,mode:"normal",desc:`Un objeto cotidiano descrito como si fuera una reliquia, una rareza, algo único.`,teoria:`El extrañamiento —los formalistas rusos lo llamaban 'ostranenie'— consiste en describir algo familiar como si fuera visto por primera vez. Shklovsky sostenía que el arte existe para devolvernos la capacidad de ver lo que la automatización del hábito nos ha quitado.

Para este reto, elige un objeto de uso cotidiano y descríbelo como si quien escribe no supiera para qué sirve. Esta descripción desde la ignorancia produce una atención mucho más detallada y más precisa que la descripción desde el conocimiento.

Una variación: describir el objeto como reliquia de alguien que murió. La familiaridad del objeto en contraste con la distancia temporal produce una especie de sacralización involuntaria.

**Fragmento de referencia:**
*El objeto era de plástico negro, hueco, con una punta de metal finísima en un extremo. Dejaba rastro de un líquido azul-oscuro sobre cualquier superficie. Quienes lo usaban lo sujetaban con tres dedos, con una concentración que sugería práctica.*
— Fragmento de trabajo (un bolígrafo visto por quien no lo conoce)

**Libros y autores recomendados:**
- Viktor Shklovsky — *El arte como artificio*
- Lev Tolstói — *Kholstomer*
- Francis Ponge — *Le Parti pris des choses*
- Julio Cortázar — *Instrucciones para John Howell*
- Jorge Luis Borges — *El Aleph*`},
  {id:"r27",familia:"Descripción y mundo sensorial",titulo:"La emoción sin nombre",goal:450,mode:"tunel",desc:`Una emoción presente en toda la escena sin nombrarla ni nombrar partes del cuerpo.`,teoria:`Chéjov decía que si en su texto había luna, el lector debía sentir el frío de la luna sin que el narrador dijera 'hacía frío'. El efecto estético no se produce cuando el texto dice lo que hay que sentir, sino cuando produce ese sentimiento directamente.

La prohibición doble de este reto es exigente: no puedes nombrar la emoción ('tristeza', 'miedo') y no puedes nombrar las manifestaciones físicas convencionales ('se le hizo un nudo en la garganta'). Esas dos prohibiciones dejan al escritor con la acción pura, el entorno, el diálogo, los objetos.

La clave es la especificidad: no 'buscó algo que hacer' sino 'recogió la taza, la lavó, la secó, la puso en el armario y volvió a sacarla'. Los gestos específicos son los que revelan el estado interior.

**Fragmento de referencia:**
*Fue a la ventana. Las palomas estaban en el alero como siempre. Las contó: once. Volvió a la mesa. La carta seguía ahí. La dobló. La desdobló. Fue otra vez a la ventana. Trece palomas.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Anton Chéjov — *Cuentos completos*
- Raymond Carver — *Catedral*
- Ernest Hemingway — *Las colinas como elefantes blancos*
- Grace Paley — *Enormous Changes at the Last Minute*
- Mavis Gallant — *The Collected Stories*`},
  {id:"r28",familia:"Descripción y mundo sensorial",titulo:"El entorno que reacciona",goal:500,mode:"tunel",desc:`El estado interior de un personaje se refleja solo en lo que le rodea. Sin introspección directa.`,teoria:`La pathetic fallacy —proyectar emociones en la naturaleza— puede ser un instrumento poderoso cuando se usa con conciencia. Hardy en *El retorno del indígena* convirtió el páramo de Egdon en un personaje que refleja el estado emocional de los personajes. El paisaje nunca es neutral.

La diferencia entre la pathetic fallacy torpe y la eficaz está en la sutileza. El cielo que se pone negro exactamente cuando el protagonista siente ira es demasiado literal. Pero el cielo que acumula nubes durante páginas, mientras la tensión interior también se acumula, produce un efecto atmosférico mucho más rico.

Lo que un personaje angustiado nota en una habitación es completamente distinto de lo que nota un personaje en paz. Esa selección perceptiva es la técnica.

**Fragmento de referencia:**
*El cielo tenía ese color de metal oxidado que precede a las tormentas de verano. Ella contó los pasos hasta la puerta. Doce. Siempre doce. Los pájaros habían dejado de cantar.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Emily Brontë — *Cumbres borrascosas*
- Thomas Hardy — *El retorno del indígena*
- Virginia Woolf — *Al faro*
- Toni Morrison — *Beloved*
- Joan Didion — *Play It As It Lays*`},
  {id:"r29",familia:"Descripción y mundo sensorial",titulo:"La ekfrasis",goal:500,mode:"normal",desc:`Describe una obra de arte imaginaria: cuadro, escultura, instalación. Que el lector la vea.`,teoria:`La ekfrasis es la descripción verbal de una obra de arte visual. Desde el escudo de Aquiles en la *Ilíada* hasta los poemas de Auden sobre Brueghel, la tradición es rica. Pero la ekfrasis de una obra imaginaria convierte al escritor en artista visual y crítico simultáneamente.

Keats en 'Ode on a Grecian Urn' describe una urna con tal precisión que se convierte en un argumento sobre el tiempo y el arte.

Para este reto, inventa una obra de arte. La descripción debe ser suficientemente concreta para que el lector la vea, pero debe también sugerir algo más: una idea, una emoción, una pregunta. La trampa es la descripción puramente formal sin ninguna dimensión interpretativa.

**Fragmento de referencia:**
*El cuadro no tenía título. Una mujer de espaldas miraba una ventana que daba a un muro. No había paisaje detrás del muro. La mujer no miraba el muro: miraba algo que el pintor, deliberadamente, había decidido no pintar.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- John Keats — *Ode on a Grecian Urn*
- W. H. Auden — *Musée des Beaux Arts*
- Tracy Chevalier — *La joven de la perla*
- Donna Tartt — *El jilguero*
- Orhan Pamuk — *Me llamo Rojo*`},
  {id:"r30",familia:"Descripción y mundo sensorial",titulo:"El catálogo",goal:400,mode:"normal",desc:`Una lista de objetos que, juntos, retratan a alguien sin describirlo directamente.`,teoria:`Los objetos que una persona elige guardar son una autobiografía involuntaria. Perec en *La vida instrucciones de uso* convirtió el inventario de un edificio entero en el retrato colectivo de una comunidad.

Para este reto, elige a un personaje y enumera sus objetos. No los describas: listalos. Confía en que la acumulación y la selección digan todo lo que necesitan decir. La revelación ocurre en el conjunto, no en los elementos individuales.

Una clave: la mezcla de lo mundano y lo íntimo, de lo caro y lo insignificante, es lo que hace que el catálogo sea un retrato.

**Fragmento de referencia:**
*En el cajón: una linterna sin pilas, tres fotos de una mujer que no es la mujer actual, un adaptador de enchufe italiano, un rosario, cuatro bolígrafos de los que ninguno funcionaba, una llave que nadie recordaba a qué cerradura pertenecía.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Georges Perec — *La vida instrucciones de uso*
- Walt Whitman — *Song of Myself*
- Don DeLillo — *Submundo*
- Nicholson Baker — *La mezzanine*
- Sei Shōnagon — *El libro de la almohada*`},
  {id:"r31",familia:"Descripción y mundo sensorial",titulo:"La ciudad a una hora",goal:450,mode:"normal",desc:`Un barrio, una calle, a una hora concreta del día. Solo lo sensorial, nada narrativo.`,teoria:`La escritura del lugar puro —sin personaje que lo filtre, sin historia que lo ancle— requiere una atención sin propósito narrativo inmediato: ver por ver, escuchar por escuchar.

Perec realizó el experimento más sistemático en su *Tentativa de agotar un lugar parisino*: durante tres días, sentado en un café de la Place Saint-Sulpice, escribió todo lo que veía pasar. No lo que era significativo: todo.

La hora importa. Un barrio a las seis de la mañana es un lugar completamente distinto a ese mismo barrio a mediodía. Esa especificidad temporal es parte del ejercicio.

Para el escritor acostumbrado a narrar, la dificultad está en resistir la tentación de añadir historia, de convertir cada observación en el inicio de una trama.

**Fragmento de referencia:**
*Las siete y cuarto de la mañana. El primer autobús abre las puertas sin que nadie baje. La panadera echa el cerrojo por dentro. Tres palomas en el alero. El sonido de algo metálico que arrastra alguien invisible.*
— Fragmento de trabajo (inspirado en Perec)

**Libros y autores recomendados:**
- Georges Perec — *Tentativa de agotar un lugar parisino*
- Virginia Woolf — *Mrs Dalloway*
- James Joyce — *Ulises*
- Elizabeth Bishop — *A Cold Spring*
- Rebecca Solnit — *Wanderlust*`},
  {id:"r32",familia:"Personaje",titulo:"La primera mentira",goal:450,mode:"normal",desc:`La primera vez que un personaje nuevo miente en la historia. Qué revela esa mentira.`,teoria:`La primera mentira de un personaje es una declaración de principios. No importa si es grande o pequeña: revela algo estructural sobre la relación que ese personaje tiene con la verdad.

En *Crimen y castigo*, Raskolnikov miente desde las primeras páginas: su relación con la mentira —cuándo miente, cómo miente, cómo falla al mentir— es parte central de la estructura del personaje. Dostoievski usa la mentira como radiografía moral.

Para este reto, la mentira debe ser la primera: presente en el texto, observada por el lector. Puede ser dicha a otro personaje, a sí mismo, o incluso al lector. Y debe revelar algo que el personaje preferiría ocultar sobre su carácter.

**Fragmento de referencia:**
*—¿Sabes algo de esto? —preguntó el inspector. Dijo que no. Lo dijo con la voz correcta, mirando al lugar correcto. Llevaba años practicando esa clase de verdades.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Fiódor Dostoievski — *Crimen y castigo*
- Patricia Highsmith — *El talento de Mr. Ripley*
- Gillian Flynn — *Perdida*
- Henry Green — *Lying*
- Ian McEwan — *Expiación*`},
  {id:"r33",familia:"Personaje",titulo:"Lo que nunca diría",goal:400,mode:"normal",desc:`Escribe lo que un personaje piensa pero nunca verbalizaría. El texto que no existe en la novela.`,teoria:`Todo personaje tiene una vida interior que la novela convencional no muestra: los pensamientos que no verbalizaría nunca, las fantasías de las que se avergüenza.

Woolf inventó el flujo de conciencia para capturar el pensamiento antes de ser censurado. Joyce en el monólogo de Molly Bloom lleva esto al límite: cuarenta y cinco páginas sin puntuación, el pensamiento de Molly fluyendo sin autocensura.

Lo más interesante suele ser la contradicción entre lo que el personaje cree de sí mismo y lo que revela sin querer al pensar sin censura.

**Fragmento de referencia:**
*Decía que lo entendía. Y en cierta forma lo entendía. Pero en la parte de abajo pensaba: ¿cómo puede ser tan estúpido? ¿Y cómo no se da cuenta de que yo lo pienso?*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Virginia Woolf — *Las olas*
- James Joyce — *Ulises* (episodio de Molly Bloom)
- Fyodor Dostoievski — *Memorias del subsuelo*
- Knut Hamsun — *Hambre*
- Saul Bellow — *Herzog*`},
  {id:"r34",familia:"Personaje",titulo:"El obituario",goal:400,mode:"normal",desc:`Escribe el obituario de un personaje. Qué recordarán, qué omitirán, qué distorsionarán.`,teoria:`Los obituarios tienden a santificar a los muertos, a organizar una vida desordenada en una narrativa con sentido. Esta distorsión estructural hace del obituario un instrumento para revelar no solo al muerto sino a quienes lo sobreviven.

Edgar Lee Masters en *La antología de Spoon River* desmontó el obituario convencional: los muertos cuentan lo que el obituario nunca diría. Sobre traiciones, fracasos, amores ocultos, resentimientos.

Para este reto, escribe un obituario con las capas que los obituarios reales suelen suprimir. La versión pública y la versión verdadera. Esta contradicción puede estar en los silencios, en las frases que parecen elogios pero no lo son del todo.

**Fragmento de referencia:**
*Fue un hombre de fuertes convicciones que nunca abandonó sus principios. Toda la ciudad lo sabía. También toda la ciudad sabía cuáles eran esos principios y cuánto habían costado a los demás.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Edgar Lee Masters — *La antología de Spoon River*
- Muriel Spark — *Memento Mori*
- Julian Barnes — *Nada que temer*
- Evelyn Waugh — *El amado*
- Don DeLillo — *White Noise*`},
  {id:"r35",familia:"Personaje",titulo:"Dos versiones del mismo",goal:500,mode:"normal",desc:`Cómo se ve el personaje a sí mismo y cómo lo ven los demás. Sin que coincidan del todo.`,teoria:`La distancia entre la imagen que una persona tiene de sí misma y la que los demás tienen de ella es una fuente inagotable de drama narrativo. Cualquier persona se ve a sí misma desde dentro —con acceso a sus motivaciones— mientras los demás la ven desde afuera.

En *Lo que queda del día*, Ishiguro produce exactamente este efecto sin cambiar de narrador: Stevens habla sobre su devoción profesional mientras el texto muestra a un hombre que se ha mentido a sí mismo durante décadas. El lector ve al personaje de una manera que el personaje no puede ver.

Para este reto, la estructura más sencilla es la dualidad explícita: un texto en dos partes, la primera narrada desde el personaje, la segunda desde alguien que lo conoce. La tercera versión —la que el lector construye comparando las dos— es la más verdadera.

**Fragmento de referencia:**
*Él creía que era directo. Sus amigos sabían que era brusco. Ninguno se lo había dicho. Todos habían aprendido, de una forma u otra, a rodear esa diferencia.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Kazuo Ishiguro — *Lo que queda del día*
- Gustave Flaubert — *Madame Bovary*
- Henry James — *Los embajadores*
- Penelope Fitzgerald — *The Gate of Angels*
- Marilynne Robinson — *Gilead*`},
  {id:"r36",familia:"Personaje",titulo:"El bolsillo",goal:400,mode:"normal",desc:`Lo que lleva encima un personaje. Solo eso. Que el lector construya al personaje desde los objetos.`,teoria:`Los objetos que una persona lleva consigo son una autobiografía involuntaria. El bolsillo o el bolso dice cosas que esa persona no sabe que está diciendo: sus rituales, sus miedos, su relación con el futuro y el pasado.

En *Madame Bovary*, la descripción del sombrero de Charles Bovary en la primera página es un retrato completo del personaje a través de un solo objeto.

Para este reto, elige a un personaje y enumera sus objetos. No los describas: listalos. La mezcla de lo práctico y lo íntimo, de lo reciente y lo antiguo, de lo que se guarda intencionadamente y lo que se ha acumulado sin querer, es lo que hace que el inventario sea un retrato.

**Fragmento de referencia:**
*En el bolso: un cargador para un teléfono que ya no tiene, dos tampones que lleva desde hace seis meses, el número de alguien en un papel doblado, las llaves de una casa en la que ya no vive, tres recibos del mismo supermercado.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Anton Chéjov — *Cuentos completos*
- Gustave Flaubert — *Madame Bovary*
- Don DeLillo — *Submundo*
- Georges Perec — *La vida instrucciones de uso*
- Raymond Carver — *Catedral*`},
  {id:"r37",familia:"Personaje",titulo:"El día de su vida",goal:500,mode:"normal",desc:`No el más dramático: el más ordinario. Lo que hace un personaje un martes cualquiera.`,teoria:`La narrativa convencional selecciona los momentos de excepción: el día del crimen, el día del descubrimiento. Pero los personajes también existen los martes ordinarios, y esos martes dicen tanto sobre quiénes son como los momentos excepcionales.

Joyce en el *Ulises* eligió este principio como estructura de la novela más ambiciosa del siglo XX: el 16 de junio de 1904 no es un día especial en la vida de Bloom. Es un martes. Y sin embargo, seguir a Bloom en ese martes produce un retrato de la conciencia humana que ningún día excepcional podría.

Woolf en *La señora Dalloway* hace algo similar: Clarissa prepara una fiesta. Nada más. Ese es el argumento. Y en esa jornada, Woolf despliega toda la complejidad de una conciencia y un período histórico.

El reto es resistir la tentación de hacer que algo excepcional ocurra. El día debe ser, hasta el final, un día cualquiera. La dignidad narrativa de lo ordinario es la apuesta.

**Fragmento de referencia:**
*Se levantó a las siete. Desayunó lo de siempre. El autobús llegó tarde. En la oficina encontró tres correos que no respondió. Comió solo. A las seis volvió.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- James Joyce — *Ulises*
- Virginia Woolf — *La señora Dalloway*
- Nicholson Baker — *La mezzanine*
- Richard Yates — *Easter Parade*
- Anne Tyler — *Breathing Lessons*`},
  {id:"r38",familia:"Personaje",titulo:"El personaje secundario",goal:450,mode:"normal",desc:`Toma a alguien que aparece de fondo en una historia tuya y dale su propia escena.`,teoria:`Los personajes secundarios de las grandes novelas tienen a veces una vida tan intensa en sus pocas apariciones que generan su propio deseo narrativo: ¿quién es esa mujer que aparece en el capítulo tres y no vuelve?

*Wide Sargasso Sea* de Jean Rhys es el ejemplo más célebre: Rhys tomó a Bertha Mason, la 'loca del ático' de *Jane Eyre*, un personaje demonizado, y le dio su propia novela. El resultado existe en conversación permanente con Brontë pero también funciona completamente solo.

Este procedimiento tiene consecuencias narrativas e ideológicas. Narrativas porque obliga a imaginar la historia desde un punto de vista que el texto original ignoraba. Ideológicas porque revela qué perspectivas considera centrales la narrativa convencional.

Para este reto, no hace falta trabajar con un texto preexistente: puedes trabajar con tus propios textos. Elige un personaje que hayas creado para un papel menor y dale una escena propia.

**Fragmento de referencia:**
*El camarero que no habla en mi novela: lo vemos tres veces, siempre en el momento de mayor tensión entre los protagonistas. ¿Qué escucha? ¿Qué piensa? ¿A qué vuelve cuando termina su turno?*

**Libros y autores recomendados:**
- Jean Rhys — *Wide Sargasso Sea*
- Tom Stoppard — *Rosencrantz y Guildenstern han muerto*
- John Gardner — *Grendel*
- Gregory Maguire — *Wicked*
- Alice Randall — *The Wind Done Gone*`},
  {id:"r39",familia:"Personaje",titulo:"El antagonista justo",goal:500,mode:"normal",desc:`Escribe desde el punto de vista del antagonista, pero sin hacerlo simpático artificialmente.`,teoria:`El antagonista bien escrito no es el villano de cómic que hace el mal porque es malvado. Es una persona que tiene sus propias razones, su propia lógica, sus propias justificaciones. La diferencia entre el antagonista plano y el complejo no es que el segundo sea 'simpático': es que tiene coherencia interna.

Dostoievski es el maestro indiscutible. El Gran Inquisidor en *Los hermanos Karamázov* es quizás el antagonista más poderoso de la literatura occidental: sus argumentos contra Cristo son tan sólidos que el lector queda perturbado aunque los rechace moralmente. Dostoievski no hace que el Inquisidor tenga razón: hace que tenga una lógica irrefutable dentro de su sistema de valores.

La tentación al escribir desde el antagonista es la redención fácil: el antagonista que resulta que en realidad tenía buenas razones. Esa redención artificial evita la incomodidad real del antagonista auténtico: puede tener lógica sin tener razón, puede ser comprensible sin ser justificable.

**Fragmento de referencia:**
*Él creía, genuinamente, que lo que hacía era necesario. No lo hacía con placer. Lo hacía con la satisfacción del que cumple su deber en circunstancias que otros no tendrían el valor de enfrentar.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Fiódor Dostoievski — *Los hermanos Karamázov*
- John Milton — *El paraíso perdido*
- Cormac McCarthy — *No es país para viejos*
- Vladimir Nabokov — *Lolita*
- Hannah Arendt — *Eichmann en Jerusalén*`},
  {id:"r40",familia:"Tiempo y estructura",titulo:"In medias res",goal:500,mode:"tunel",desc:`Empieza por el momento de mayor tensión. Luego retrocede. El lector llega al principio al final.`,teoria:`El consejo horaciano de comenzar la narrativa 'en medio de las cosas' es uno de los más antiguos y más productivos de la poética occidental. *La Ilíada* no empieza en el rapto de Helena: empieza en el año diez de la guerra, en el momento de mayor tensión entre Aquiles y Agamenón.

El in medias res tiene una función clara: captura la atención del lector antes de que haya tenido tiempo de decidir si le interesa la historia. Cuando empezamos por el momento de mayor tensión, el lector ya está comprometido antes de entender por qué llegaron los personajes a ese punto.

García Márquez en *Cien años de soledad* hace esto de forma magistral: la primera frase proyecta al lector hacia el futuro y hacia el pasado simultáneamente, creando una tensión temporal que sostiene toda la novela.

Para este reto, la habilidad está en dosificar el pasado: no darlo todo de golpe, sino en fragmentos que el lector recibe cuando los necesita para entender el presente.

**Fragmento de referencia:**
*Muchos años después, frente al pelotón de fusilamiento, el coronel Aureliano Buendía había de recordar aquella tarde remota en que su padre lo llevó a conocer el hielo.*
— García Márquez, *Cien años de soledad*

**Libros y autores recomendados:**
- Gabriel García Márquez — *Cien años de soledad*
- Joseph Heller — *Trampa 22*
- Donna Tartt — *El secreto*
- Dennis Lehane — *Mystic River*
- Tim O'Brien — *The Things They Carried*`},
  {id:"r41",familia:"Tiempo y estructura",titulo:"La elipsis extrema",goal:450,mode:"normal",desc:`Diez años en diez líneas. Sin resumen: solo los cortes precisos.`,teoria:`La elipsis es el tiempo que la narrativa salta. Toda ficción hace elipsis. Pero la elipsis extrema —años o décadas comprimidos en pocas líneas— requiere una habilidad específica: elegir qué mostrar de esos años en lugar de resumirlos.

El resumen ('Pasaron diez años en los que las cosas cambiaron') es la forma más débil. La elipsis como procedimiento artístico no resume: selecciona un destello, un detalle, un momento concreto que contiene metonímicamente todo el período. Un solo desayuno puede contener diez años de un matrimonio.

Alice Munro es la maestra contemporánea. Sus cuentos abarcan décadas de vida en veinte o treinta páginas, no porque resuma sino porque elige con precisión quirúrgica los momentos que contienen los años intermedios.

Para este reto: elige diez años de un personaje o una relación. No los resumas: elige cinco o seis momentos concretos, cada uno de pocas líneas, que juntos den la sensación de haber vivido esos diez años.

**Fragmento de referencia:**
*Año uno: él trajo flores sin razón. / Año tres: dejó de llevarlas pero ella no dijo nada. / Año siete: hubo una conversación que ninguno mencionó después. / Año diez: compraron un sofá nuevo.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Alice Munro — *Las lunas de Júpiter*
- David Nichols — *Un día*
- Penelope Fitzgerald — *The Bookshop*
- Julian Barnes — *El loro de Flaubert*
- E. Annie Proulx — *The Shipping News*`},
  {id:"r42",familia:"Tiempo y estructura",titulo:"Hacia atrás",goal:500,mode:"normal",desc:`El mismo evento contado en orden inverso. El final es el principio.`,teoria:`Harold Pinter en *Traición* exploró el potencial del tiempo invertido: la historia empieza con el final de una aventura amorosa y retrocede hasta su inicio. El efecto es completamente distinto al de la narrativa cronológica: el lector llega al principio —el momento en que el amor todavía existe— después de haber visto ya las consecuencias. Esa llegada al origen es más melancólica que el final cronológico.

El tiempo invertido produce una ironía especial: el lector sabe lo que los personajes no saben todavía. Cada gesto esperanzador del pasado llega cargado de lo que el lector ya sabe que vendrá.

Martin Amis en *La flecha del tiempo* fue más lejos: no solo la narración sino el tiempo físico de la novela corre al revés. El personaje muere primero y nace al final. Las consecuencias preceden a las causas.

Para este reto, no es necesario ir tan lejos. Basta con elegir una secuencia de cuatro o cinco momentos y contarlos en orden inverso, dejando que el lector construya la narrativa cronológica.

**Fragmento de referencia:**
*El final: recoge sus cosas en silencio. / Antes del final: una cena sin mucha conversación. / Mucho antes: una carta que prometía todo. / El principio: una pregunta que nadie sabe ya quién hizo primero.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Harold Pinter — *Traición*
- Martin Amis — *La flecha del tiempo*
- F. Scott Fitzgerald — *El curioso caso de Benjamin Button*
- Sébastien Japrisot — *Un largo domingo de noviazgo*
- Christopher Nolan — *Memento* (cine, referencia narrativa)`},
  {id:"r43",familia:"Tiempo y estructura",titulo:"El flash-forward",goal:450,mode:"normal",desc:`El personaje sabe cómo termina esto. Escribe desde esa certeza.`,teoria:`*Crónica de una muerte anunciada* de García Márquez está construida enteramente sobre este principio: el lector sabe desde la primera frase que Santiago Nasar va a morir ese día. Toda la novela es el relato de cómo sucedió lo que ya sabemos. El suspense convencional —¿qué pasará?— es reemplazado por una pregunta más perturbadora: ¿cómo fue posible que ocurriera? ¿Cómo es que nadie lo evitó?

Este tipo de suspense —el de la anticipación, no el de la sorpresa— es en muchos casos más poderoso porque implica al lector de una manera distinta: ya no se trata de descubrir, sino de entender.

Para este reto, el personaje o el narrador sabe lo que vendrá. Esa certeza puede ser explícita o implícita (el narrador del futuro cuenta el pasado sabiendo ya el desenlace). El conocimiento del final debe impregnar la descripción del presente sin que el texto lo subraye en cada momento.

**Fragmento de referencia:**
*El día que todo cambió fue un miércoles de agosto. Entonces no lo sabíamos. Ahora sé que esa mañana, cuando él desayunó como siempre, ya no había nada que hacer.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Gabriel García Márquez — *Crónica de una muerte anunciada*
- Kazuo Ishiguro — *Lo que queda del día*
- Tom Perrotta — *Little Children*
- Ian McEwan — *Sábado*
- Thornton Wilder — *El puente de San Luis Rey*`},
  {id:"r44",familia:"Tiempo y estructura",titulo:"Tiempo real",goal:400,mode:"tunel",desc:`Un minuto de acción que dura un minuto de lectura. La cámara lenta narrativa.`,teoria:`El tiempo narrativo y el tiempo cronológico son independientes. Una novela puede comprimir décadas en un párrafo o expandir un segundo en páginas enteras. El 'tiempo real' —donde la duración de la lectura se aproxima a la duración del evento— crea efectos específicos: la sensación de estar presente, de vivir el momento junto al personaje.

Woolf dilató un momento de percepción hasta hacerlo casi infinito. Nabokov en *La defensa Luzhin* expande los momentos de crisis mental hasta que el tiempo psicológico y el cronológico pierden toda relación.

La clave técnica es la acumulación de detalle. Un minuto de acción narrado en 'tiempo real' requiere que el escritor encuentre todo lo que ocurre en ese minuto: no solo las acciones visibles sino los pensamientos que las acompañan, las percepciones sensoriales, los recuerdos que se activan.

**Fragmento de referencia:**
*Puso la taza en la mesa. La taza hizo un pequeño ruido. Vio que había dejado un anillo húmedo en el mantel. Pensó en limpiarlo. No lo hizo. Miró por la ventana. El autobús aún no había llegado. Calculó: tres minutos. Pensó que podría tomar el siguiente.*
— Fragmento de trabajo (treinta segundos expandidos)

**Libros y autores recomendados:**
- Virginia Woolf — *Mrs. Dalloway*
- Vladimir Nabokov — *La defensa Luzhin*
- Nicholson Baker — *La mezzanine*
- Don DeLillo — *Submundo*
- James Joyce — *Ulises*`},
  {id:"r45",familia:"Tiempo y estructura",titulo:"Tres momentos",goal:550,mode:"normal",desc:`Tres escenas separadas por años. Sin explicar el tiempo entre ellas: que el lector lo infiera.`,teoria:`La estructura en tres tiempos —tres momentos distintos del pasado sin transición explicada— es poderosa cuando se usa bien porque los años no narrados son los que el lector debe inferir a partir de los cambios que percibe entre las escenas.

Carver usó esta estructura en algunos de sus cuentos más memorables: tres escenas, sin transición, donde el lector percibe el tiempo transcurrido por la diferencia entre ellas. Los personajes han envejecido, las relaciones han cambiado. Carver nunca explica lo que ocurrió entre las escenas.

La clave es que cada escena tenga suficiente especificidad para anclar al lector en un momento preciso, pero también suficiente espacio para que el tiempo que falta sea imaginable. Los detalles que cambian entre escenas deben ser concretos pero no comentados.

**Fragmento de referencia:**
*Escena 1: se infiere que son jóvenes por el diálogo, la energía, los planes.
Escena 2: los mismos dos personajes, pero ahora hablan de sus hijos, no de sus sueños.
Escena 3: los mismos. El pelo. Las pausas. Lo que ya no necesitan explicarse.*
— Estructura de trabajo

**Libros y autores recomendados:**
- Raymond Carver — *Catedral*
- Alice Munro — *Escapada*
- Colm Tóibín — *The Blackwater Lightship*
- E. M. Forster — *Howards End*
- Graham Swift — *Waterland*`},
  {id:"r46",familia:"Tiempo y estructura",titulo:"El bucle",goal:500,mode:"normal",desc:`La historia termina volviendo a donde empezó, pero algo ha cambiado.`,teoria:`La estructura circular —donde el final remite al principio— tiene una larga tradición narrativa. Pero la estructura circular más interesante no es la que simplemente vuelve al principio: es la que vuelve al mismo punto con la certeza de que ese punto ya no es el mismo porque el lector ha cambiado.

*Pedro Páramo* de Rulfo comienza y termina con la llegada a Comala: Juan Preciado llega buscando a su padre, y al final entendemos que ha llegado a un lugar de muertos y que él mismo está muerto. El círculo se cierra sobre una revelación que recontextualiza todo.

La primera frase de *Cien años de soledad* es el ejemplo más célebre: cuando el lector la relee al final, contiene todo lo que el libro ha desarrollado.

Para este reto: comienza con una imagen o una frase que parezca sencilla. Desarrolla la historia. Regresa a esa imagen o frase al final. Que la repetición revele algo que la primera vez no estaba.

**Fragmento de referencia:**
*Primera frase: 'La casa siempre había tenido esa ventana rota.'
Última frase: 'La casa siempre había tenido esa ventana rota. Ahora sabíamos por qué nadie la había reparado.'*

**Libros y autores recomendados:**
- Juan Rulfo — *Pedro Páramo*
- Toni Morrison — *Beloved*
- Gabriel García Márquez — *Cien años de soledad*
- José Saramago — *Ensayo sobre la ceguera*
- Samuel Beckett — *Esperando a Godot*`},
  {id:"r47",familia:"Conflicto y tensión",titulo:"El querer incompatible",goal:500,mode:"normal",desc:`Un personaje quiere dos cosas que se excluyen mutuamente. Sin resolución fácil.`,teoria:`El conflicto más rico de la narrativa no es el que enfrenta a dos personajes: es el que enfrenta a un personaje consigo mismo. Emma Bovary quiere la vida romántica que ha leído en las novelas y la seguridad de su matrimonio burgués. Gatsby quiere a Daisy y quiere la versión de Daisy que existe en su imaginación, que no es la misma persona.

El conflicto de los deseos incompatibles es democrático: no requiere circunstancias extraordinarias. Un padre que quiere el éxito de su hijo y también quiere que su hijo siga necesitándolo. Una artista que quiere ser reconocida y también quiere ser libre del reconocimiento.

La trampa que hay que evitar es la resolución fácil: el personaje que finalmente 'aprende' a elegir. El deseo incompatible más honesto es el que no se resuelve, o se resuelve con pérdida.

**Fragmento de referencia:**
*Quería que se quedara. Quería que se fuera. Las dos cosas con igual intensidad. Por eso no dijo nada cuando empezó a hacer las maletas.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Gustave Flaubert — *Madame Bovary*
- Henry James — *La copa dorada*
- Edith Wharton — *La edad de la inocencia*
- Richard Ford — *Independence Day*
- Elizabeth Strout — *Oh William!*`},
  {id:"r48",familia:"Conflicto y tensión",titulo:"El conflicto sin antagonista",goal:450,mode:"normal",desc:`El enemigo es el tiempo, una enfermedad, una circunstancia. Nadie tiene la culpa.`,teoria:`La narrativa más simple asigna culpas: hay un antagonista, hay un protagonista. Pero la experiencia humana incluye también conflictos sin culpable: la enfermedad, el tiempo que pasa, el accidente. Estos conflictos son a menudo más difíciles de narrar pero más honestos con la realidad de muchas vidas.

*La muerte de Iván Ilyich* de Tolstói es el ejemplo más perfecto: Iván Ilyich se enferma y muere. No hay villano. No hay conspiración. Y sin embargo la novella produce una de las exploraciones más profundas de la angustia existencial en la literatura.

La dificultad narrativa de este tipo de conflicto es sostener el interés sin el motor del antagonismo interpersonal. La solución está en el conflicto interior: incluso cuando el enemigo es externo e inhumano, el personaje tiene que tomar decisiones, tiene que luchar o rendirse.

**Fragmento de referencia:**
*No había nadie a quien culpar. Eso era lo peor. Había aprendido a manejar la culpa, incluso la injusticia. Pero ¿cómo manejas algo que simplemente ocurre?*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Lev Tolstói — *La muerte de Iván Ilyich*
- Franz Kafka — *El proceso*
- John Steinbeck — *Las uvas de la ira*
- Primo Levi — *Si esto es un hombre*
- Susan Sontag — *La enfermedad y sus metáforas*`},
  {id:"r49",familia:"Conflicto y tensión",titulo:"La espera",goal:400,mode:"tunel",desc:`Una sala, un silencio, algo que no llega. Tensión sin acción visible.`,teoria:`La espera es uno de los estados de mayor tensión de la experiencia humana, y uno de los más difíciles de traducir a la narrativa. La acción la resuelve. La espera la sostiene sin resolución visible.

Beckett convirtió la espera en el tema central de *Esperando a Godot*: dos personajes esperan a alguien que no llega. La espera es el drama. No hay más trama que esa. Y sin embargo la obra sostiene la atención porque Beckett entiende que la espera no es pasividad: es actividad interior intensa, es la mente trabajando en el vacío.

Para escribir la espera bien, hay que entender que quien espera no está quieto: su mente corre. Los recuerdos, las anticipaciones, los miedos, los cálculos. La tensión entre la quietud exterior y la actividad interior es la energía narrativa.

**Fragmento de referencia:**
*A las tres y cuarto ya no sonó el teléfono. A las cuatro tampoco. Reordenó los objetos del escritorio. Los volvió a desordenar. A las cinco decidió que esperaría hasta las seis.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Samuel Beckett — *Esperando a Godot*
- Franz Kafka — *El proceso*
- William Trevor — *Felicia's Journey*
- Muriel Spark — *The Driver's Seat*
- Patricia Highsmith — *La celda de cristal*`},
  {id:"r50",familia:"Conflicto y tensión",titulo:"El secreto compartido",goal:450,mode:"tunel",desc:`Dos personajes saben algo que ninguno nombra. El lector lo descubre con ellos o antes.`,teoria:`El secreto compartido pero no verbalizado es una de las estructuras de mayor carga dramática. Cuando dos personajes saben algo que no dicen —y el texto insinúa que ambos lo saben— el lector queda suspendido en una tensión que ningún secreto individual podría producir.

Para que funcione, el texto debe indicar que ambos personajes saben, sin decirlo explícitamente. Los pequeños gestos de evasión, los cambios de tema, las reacciones desproporcionadas a cosas aparentemente menores: todo eso señala el secreto sin nombrarlo.

Henry James exploró este territorio en casi toda su obra: los personajes de James saben más de lo que dicen y dicen más de lo que creen decir. La información circula entre ellos de formas oblicuas que el lector debe descifrar.

**Fragmento de referencia:**
*—¿Cómo estuvo la cena de ayer? —Bien. Tranquila. —¿Vinieron todos? —Sí, todos. Ninguno de los dos mencionó a Clara. Los dos sabían por qué.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Henry James — *Las bostonianas*
- Edith Wharton — *La edad de la inocencia*
- Ian McEwan — *Expiación*
- John le Carré — *El topo*
- Muriel Spark — *El primer hombre de Roma*`},
  {id:"r51",familia:"Conflicto y tensión",titulo:"La decisión aplazada",goal:400,mode:"tunel",desc:`Todo el texto es el momento antes de decidir. La decisión no llega.`,teoria:`Hay narraciones cuya energía dramática principal no es la acción sino su antesala: el momento antes de decidir. Este tipo de escritura requiere sostener una tensión estática que puede resultar hipnótica cuando lo que está en juego es claro.

Lo que sostiene la tensión no es la esperanza de que el personaje decida: es la exploración de lo que está en juego. Mientras el personaje no decide, el texto tiene espacio para examinar todos los miedos y deseos que rodean ese momento.

Woolf en muchos momentos de *Las olas* hace exactamente esto: el personaje está a punto de decir algo, de hacer algo, y el texto se detiene en ese umbral para explorar lo que ese algo significa.

Para este reto, el texto no debe concluir con la decisión. La decisión, si ocurre, ocurre fuera del texto, en el espacio posterior a la última frase.

**Fragmento de referencia:**
*Levantó el auricular. Lo dejó. Lo volvió a levantar. Marcó los primeros tres números. Colgó. Pensó que podía dejarlo para mañana. Mañana estaría más claro. Lo había pensado ya la semana pasada.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Virginia Woolf — *Las olas*
- Henry James — *Los papeles de Aspern*
- Franz Kafka — *La condena*
- Albert Camus — *El extranjero*
- Bernard Cooper — *Maps to Anywhere*`},
  {id:"r52",familia:"Conflicto y tensión",titulo:"El malentendido real",goal:450,mode:"normal",desc:`Un conflicto que surge de una interpretación errónea. Sin que ninguno tenga razón completa.`,teoria:`El malentendido —cuando dos personas interpretan de forma distinta la misma situación, ambas con buenas razones— es una estructura dramática de una honestidad particular: no hay villano, no hay víctima completa.

Austen dominó esta estructura en sus novelas: muchos de los conflictos de *Orgullo y prejuicio* surgen de malentendidos que son perfectamente comprensibles dado lo que cada personaje sabe. El malentendido austeano no es producto de la estupidez sino de las limitaciones de la información disponible.

El malentendido más rico es el que no se resuelve fácilmente con una conversación: porque incluso cuando los hechos se aclaran, las interpretaciones pueden seguir siendo distintas. Dos personas pueden conocer los mismos hechos y seguir interpretándolos de forma diferente porque sus marcos de referencia son distintos.

**Fragmento de referencia:**
*Él había pensado que el silencio era comprensión. Ella había pensado que el silencio era indiferencia. Los dos tenían razón sobre el silencio. Ninguno tenía razón sobre el otro.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Jane Austen — *Orgullo y prejuicio*
- Ian McEwan — *Amor perdurable*
- Kazuo Ishiguro — *Nunca me abandones*
- Elizabeth Strout — *Olive Kitteridge*
- Richard Russo — *Imperio Falls*`},
  {id:"r53",familia:"Géneros y restricciones formales",titulo:"La carta sin destinatario",goal:400,mode:"normal",desc:`Una carta que nunca se enviará. Que el motivo por el que no se envía sea parte del texto.`,teoria:`La carta no enviada permite la honestidad que la carta enviada no puede permitirse. El que escribe sin intención de mandar puede decir lo que no diría si supiera que hay un receptor: puede ser feroz, vulnerable, contradecirse. Esta honestidad sin consecuencias es el espacio narrativo específico.

Pero el reto propone algo más: que el motivo por el que la carta no se envía sea parte del texto. La carta que no se puede enviar porque lo que dice es demasiado verdadero. La que no se puede enviar porque el destinatario ha muerto. La que no se puede enviar porque el remitente no sabe dónde está el destinatario.

Saul Bellow en *Herzog* construyó toda una novela sobre un hombre que escribe cartas que nunca enviará: a Dios, a Eisenhower, a su exmujer, a filósofos muertos. Esas cartas no enviadas son el retrato de una mente en crisis.

**Fragmento de referencia:**
*Querido ____: Empecé esta carta tres veces con tu nombre y las tres veces lo borré. No porque no sepa cómo te llamas. Porque no sé ya cómo llamarte.*
— Fragmento de trabajo

**Libros y autores recomendados:**
- Saul Bellow — *Herzog*
- Rainer Maria Rilke — *Cartas a un joven poeta*
- C. S. Lewis — *Una pena en observación*
- Sylvia Plath — *Las campanas de cristal*
- Alice Walker — *El color púrpura*`},
  {id:"r54",familia:"Géneros y restricciones formales",titulo:"El informe",goal:450,mode:"normal",desc:`Una escena narrada como informe oficial, denuncia o acta. Lo que el formato oculta o deforma.`,teoria:`El lenguaje burocrático es uno de los más poderosos y más violentos de la cultura contemporánea, precisamente porque su violencia es invisible: se esconde detrás de la neutralidad aparente del formulario. Cuando una experiencia humana se traduce al lenguaje burocrático, algo se pierde: la subjetividad, la emoción, la singularidad.

Kafka fue el primero en explorar esta violencia sistemáticamente: sus novelas están llenas de formularios, de procedimientos, de autoridades anónimas que ejercen un poder incomprensible a través del lenguaje administrativo.

El informe como forma narrativa revela por contraste: lo que el informe dice y lo que la experiencia real fue son dos versiones de la realidad que el texto puede poner en tensión. Un informe policial sobre una pelea dice ciertos hechos con cierto vocabulario. La misma pelea vivida desde dentro dice algo completamente distinto.

**Fragmento de referencia:**
*'A las 22:47 del día de autos, la unidad recibió aviso de alteración del orden en el domicilio indicado. A su llegada, el agente observó a la ciudadana en estado de agitación y al ciudadano sentado en la cocina. No se apreció violencia física.'*
— Fragmento de trabajo (lo que el informe no dice es la historia)

**Libros y autores recomendados:**
- Franz Kafka — *El proceso*
- Primo Levi — *Si esto es un hombre*
- J. M. Coetzee — *Esperando a los bárbaros*
- Hannah Arendt — *Eichmann en Jerusalén*
- Don DeLillo — *Libra*`},
  {id:"r55",familia:"Géneros y restricciones formales",titulo:"La lista que se convierte en historia",goal:400,mode:"normal",desc:`Empieza siendo un inventario de objetos o tareas. Termina siendo otra cosa.`,teoria:`La lista puede transformarse. Puede comenzar como inventario y terminar como poema. Puede comenzar como agenda y terminar como lamento. La transformación no necesita ser anunciada: puede ocurrir gradualmente, elemento por elemento, hasta que el lector se da cuenta de que ya no está leyendo lo que creía leer.

Whitman en *Song of Myself* convirtió la enumeración en un método de celebración del mundo: cada elemento de la lista es una forma de decir 'sí' a la existencia. Leonard Cohen en sus canciones usó la lista como forma de construir una intimidad específica.

Para este reto, comienza con una lista genuina —de objetos, de tareas, de recuerdos— y deja que la lista se transforme. No expliques la transformación. Deja que ocurra en el ritmo de los elementos.

**Fragmento de referencia:**
*Leche. Pan. Naranjas. El número de teléfono de alguien que murió hace tres años. Aceite. Sal. Las palabras exactas que dije el último día. Papel higiénico.*
— Fragmento de trabajo (una lista que ya no es solo una lista)

**Libros y autores recomendados:**
- Georges Perec — *Je me souviens*
- Walt Whitman — *Song of Myself*
- Sei Shōnagon — *El libro de la almohada*
- Umberto Eco — *El vértigo de las listas*
- Lydia Davis — *Cuentos completos*`},
  {id:"r56",familia:"Géneros y restricciones formales",titulo:"El texto instruccional",goal:400,mode:"normal",desc:`'Cómo hacer algo' con voz técnica, pero el 'algo' es emocional o absurdo.`,teoria:`Las instrucciones son el género más impersonal de la escritura: no tienen 'yo', no tienen historia. Esta impersonalidad es precisamente lo que el uso literario del género puede subvertir con mayor efecto.

Cortázar fue un maestro de esta subversión: en *Instrucciones para llorar* o *Instrucciones para matar hormigas en Roma*, usó el formato instruccional para explorar territorios completamente ajenos al uso funcional. Las instrucciones de Cortázar tienen una lógica interna perfecta —son técnicamente coherentes con el formato— pero el contenido es absurdo, emocional, inquietante.

El humor que produce la colisión entre el formato técnico y el contenido emocional no es un fin en sí mismo: es el vehículo de una revelación sobre el absurdo de intentar sistematizar la experiencia humana.

**Fragmento de referencia:**
